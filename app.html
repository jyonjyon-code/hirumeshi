<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>ひるめしえらんで | ねこたスタジオ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; text-align: center; background: #f9f1e6; padding: 20px; color: #333; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: inline-block; width: 90%; max-width: 380px; border: 4px solid #d9534f; margin-top: 20px; box-sizing: border-box; }
        h2 { color: #d9534f; margin-bottom: 20px; font-size: 26px; letter-spacing: 2px; }
        #omikuji-box { font-size: 100px; cursor: pointer; margin: 20px 0; transition: transform 0.1s; user-select: none; }
        .shake { animation: shake 0.5s infinite; }
        @keyframes shake {
            0% { transform: rotate(0deg); } 25% { transform: rotate(8deg); }
            50% { transform: rotate(0deg); } 75% { transform: rotate(-8deg); }
            100% { transform: rotate(0deg); }
        }
        .mode-selector { margin-bottom: 25px; display: flex; justify-content: center; }
        .mode-btn { border: 2px solid #d9534f; padding: 10px 15px; cursor: pointer; background: white; border-radius: 25px; font-size: 14px; margin: 0 5px; color: #d9534f; font-weight: bold; flex: 1; transition: 0.3s; }
        .active-mode { background: #d9534f; color: white; }
        #result-area { display: none; background: #fffcf0; border: 2px dashed #f0ad4e; padding: 20px; border-radius: 15px; margin-top: 20px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .btn { color: white; border: none; padding: 15px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block; margin-top: 15px; font-size: 16px; width: 100%; box-sizing: border-box; }
        .btn-map { background: #4285F4; }
        .btn-uber { background: #06C167; }
        .btn-retry { background: #f0ad4e; }
        .btn-x { background: #000; }
        
        .lucky-item { color: #e67e22; font-weight: bold; font-size: 0.95em; margin-top: 15px; background: #fff; border-radius: 10px; padding: 5px; }
        #hint { font-size: 14px; color: #888; margin-top: 10px; }

        .studio-nav { margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; width: 100%; }
        .btn-back { background: #888; color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block; font-size: 14px; margin-bottom: 10px; width: 100%; box-sizing: border-box; }
        .sns-group { display: flex; gap: 10px; }
        .btn-sns { color: white; border: none; padding: 10px; border-radius: 50px; cursor: pointer; font-weight: bold; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 13px; flex: 1; }
        .btn-insta { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        
        .promo-tag { font-size: 10px; color: #999; margin: 20px 0 -10px 0; text-align: center; }
        .uber-note { font-size: 9px; color: #aaa; margin-top: 5px; line-height: 1.3; }
    </style>
</head>
<body>
    
<div class="card">
    <h2>ひるめしえらんで</h2>
    <div class="mode-selector">
        <button id="normal-btn" class="mode-btn active-mode" onclick="setMode('normal')">みせをえらぶ</button>
        <button id="conveni-btn" class="mode-btn" onclick="setMode('conveni')">コンビニ</button>
    </div>

    <div id="main-view">
        <div id="omikuji-box" onclick="draw()">🍱</div>
        <p id="hint">タップして おみくじを ふる！</p>
    </div>

    <div id="result-area">
        <div id="luck" style="font-size: 22px; font-weight: bold; color: #d9534f;"></div>
        <h2 id="food" style="margin: 15px 0; font-size: 24px;"></h2>
        <p id="desc" style="font-size: 15px; color: #555; line-height: 1.6;"></p>
        <div class="lucky-item">✨ラッキー買い足し: <span id="add-on"></span></div>
        
        <a id="map-link" class="btn btn-map" target="_blank" rel="noopener noreferrer">
            <i class="fas fa-map-marker-alt"></i> 近くの店をさがす
        </a>

        <p class="promo-tag">本ページはプロモーションです</p>
        <a id="uber-link" href="https://www.ubereats.com/jp" class="btn btn-uber" target="_blank" rel="nofollow noopener">
            <i class="fas fa-motorcycle"></i> Uber Eats(ウーバーイーツ)
        </a>
        <p class="uber-note">
            Uber Eats(ウーバーイーツ)なら、アプリやウェブサイトから簡単にお好きな料理を注文できます。レストランから配達パートナーがお届けします。
            <br>※配送手数料等、詳細はカート内でご確認ください。
        </p>

        <button class="btn btn-retry" onclick="reset()">
            <i class="fas fa-redo"></i> もういちど ひく
        </button>

        <a id="x-share-btn" class="btn btn-x" target="_blank">
            <i class="fa-brands fa-x-twitter"></i> 結果を報告する
        </a>
    </div>

    <div class="studio-nav">
        <a href="index.html" class="btn-back">ねこたスタジオへ戻る</a>
        <div class="sns-group">
            <a href="https://x.com/necotatu2" target="_blank" class="btn-sns btn-x">公式X</a>
            <a href="https://www.instagram.com/necotastudio" target="_blank" class="btn-sns btn-insta">公式Insta</a>
        </div>
    </div>
</div>

<script>
    const APP_URL = "https://necotastudio.com/app.html"; 
    let currentMode = 'normal';

    const normalMenus = [
        { luck: "大大吉", food: "特選！厚切りステーキ", keyword: "ステーキ", desc: "自分へのご褒美！午後も無敵のパワーです。", add: "ガーリックライス" },
        { luck: "大大吉", food: "回らないお寿司", keyword: "寿司", desc: "旬のネタで贅沢に。至福のひとときを。", add: "あおさの味噌汁" },
        { luck: "大吉", food: "肉汁あふれるハンバーグ", keyword: "ハンバーグ", desc: "鉄板の熱々を楽しんで！", add: "目玉焼き" },
        { luck: "大吉", food: "本格スパイスカレー", keyword: "カレー", desc: "五感を刺激して午後もシャキッと！", add: "ナン" },
        { luck: "大吉", food: "揚げたて天丼", keyword: "天丼", desc: "大きなエビが運気を上げます。", add: "小うどん" },
        { luck: "大吉", food: "特上うな重", keyword: "うなぎ", desc: "スタミナ全開！今日は特別な日ですね。", add: "肝吸い" },
        { luck: "中吉", food: "濃厚こってりラーメン", keyword: "ラーメン", desc: "スープが体に染み渡る一杯。", add: "味付け玉子" },
        { luck: "中吉", food: "とろとろ親子丼", keyword: "親子丼", desc: "出汁の旨味でホッとする時間を。", add: "お漬物" },
        { luck: "中吉", food: "パラパラ黄金チャーハン", keyword: "チャーハン", desc: "強火で炒めたプロの味を。", add: "焼き餃子" },
        { luck: "中吉", food: "本格ガパオライス", keyword: "ガパオライス", desc: "バジルの香りが食欲をそそります。", add: "目玉焼き追加" },
        { luck: "中吉", food: "石焼ビビンバ", keyword: "ビビンバ", desc: "おこげの香ばしさがたまりません！", add: "わかめスープ" },
        { luck: "吉", food: "ジューシー唐揚げ定食", keyword: "唐揚げ", desc: "揚げたてにレモンを搾って！", add: "ポテトサラダ" },
        { luck: "吉", food: "生パスタのボロネーゼ", keyword: "ボロネーゼ", desc: "モチモチ食感がクセになります。", add: "バゲット" },
        { luck: "吉", food: "ふわとろオムライス", keyword: "オムライス", desc: "卵の優しさに包まれてください。", add: "コンソメスープ" },
        { luck: "末吉", food: "サッパリ冷やしうどん", keyword: "うどん", desc: "コシのある麺で軽やかに。", add: "ちくわ天" },
        { luck: "末吉", food: "具だくさんサンドイッチ", keyword: "サンドイッチ", desc: "片手で食べられる、午後への味方。", add: "野菜スープ" },
        { luck: "末吉", food: "ソース焼きそば", keyword: "焼きそば", desc: "屋台のような懐かしい味わい。", add: "紅生姜" }
    ];

    const conveniMenus = [
        { luck: "大大吉", food: "高級幕の内 ＆ デザート", keyword: "コンビニ", desc: "コンビニ界の王族のようなセット。", add: "挽きたてコーヒー" },
        { luck: "大吉", food: "ガッツリ！カツカレー", keyword: "カツカレー", desc: "勝負の日はカツで決まり！", add: "飲むヨーグルト" },
        { luck: "大吉", food: "二郎系まぜそば", keyword: "ラーメン", desc: "コンビニでこのパンチ力。最高です。", add: "生卵" },
        { luck: "中吉", food: "明太クリームパスタ", keyword: "パスタ", desc: "濃厚さと満足感を両立！", add: "サラダチキン" },
        { luck: "中吉", food: "ネギ塩牛タン弁当", keyword: "牛タン", desc: "香ばしい香りが食欲をブースト！", add: "麦茶" },
        { luck: "中吉", food: "具たっぷり海鮮ドリア", keyword: "ドリア", desc: "とろーりチーズで心も温まる。", add: "コールスロー" },
        { luck: "吉", food: "おにぎりとカップ味噌汁", keyword: "おにぎり", desc: "シンプルイズベスト！", add: "半熟ゆで卵" },
        { luck: "吉", food: "旨辛担々麺", keyword: "担々麺", desc: "刺激が欲しいあなたの午後に。", add: "おにぎり（白飯）" },
        { luck: "末吉", food: "新作カップヌードル", keyword: "カップラーメン", desc: "新商品はとりあえず試すのが吉！", add: "食後のアイス" },
        { luck: "末吉", food: "冷製パスタ ＆ スープ", keyword: "パスタ", desc: "オシャレに軽く済ませたい時に。", add: "杏仁豆腐" }
    ];

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('normal-btn').classList.toggle('active-mode', mode === 'normal');
        document.getElementById('conveni-btn').classList.toggle('active-mode', mode === 'conveni');
        reset();
    }

    function draw() {
        const box = document.getElementById('omikuji-box');
        box.classList.add('shake');
        document.getElementById('hint').innerText = "シャカシャカ...";

        setTimeout(() => {
            box.classList.remove('shake');
            const list = currentMode === 'normal' ? normalMenus : conveniMenus;
            const res = list[Math.floor(Math.random() * list.length)];
            
            const luckLabel = `【${res.luck}】`;
            document.getElementById('luck').innerText = luckLabel;
            document.getElementById('food').innerText = res.food;
            document.getElementById('desc').innerText = res.desc;
            document.getElementById('add-on').innerText = res.add;
            
            const tweetText = encodeURIComponent(`今日のおみくじの結果は…\n${luckLabel}ランチは「${res.food}」に決定！\n\n✨ラッキーアイテム: ${res.add}\n\n#ひるめしえらんで #ねこたスタジオ`);
            document.getElementById('x-share-btn').href = `https://twitter.com/intent/tweet?text=${tweetText}&url=${encodeURIComponent(APP_URL)}`;

            const mapKeyword = currentMode === 'conveni' ? "近くのコンビニ" : "近くの" + res.keyword;
            document.getElementById('map-link').href = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(mapKeyword);

            const uberKeyword = encodeURIComponent(res.food);
            document.getElementById('uber-link').href = `https://www.ubereats.com/jp/search?q=${uberKeyword}`;
            
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('main-view').style.display = 'none';
        }, 800);
    }

    function reset() {
        document.getElementById('result-area').style.display = 'none';
        document.getElementById('main-view').style.display = 'block';
        document.getElementById('omikuji-box').innerText = currentMode === 'normal' ? "🍱" : "🏪";
        document.getElementById('hint').innerText = "タップして おみくじを ふる！";
    }
</script>

</body>
</html>
