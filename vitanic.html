<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitanic v1.0 - Bio-Vitamin Mechanics</title>
    <style>
        :root {
            --primary-bg: #f8fafc;
            --vitanic-green: #27ae60;
            --vitanic-blue: #3498db;
            --vitanic-red: #e74c3c;
            --vitanic-gold: #f1c40f;
            --dark-text: #2c3e50;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--primary-bg); padding: 0; color: var(--dark-text); margin: 0; line-height: 1.6; }
        
        /* ナビゲーション */
        .site-header {
            background: #fff;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .site-logo { font-weight: bold; color: var(--dark-text); text-decoration: none; font-size: 1.1em; }
        .site-logo span { color: var(--vitanic-green); }

        .container { max-width: 900px; margin: 30px auto; background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        h1 { text-align: center; color: var(--dark-text); letter-spacing: 2px; margin-bottom: 5px; font-size: 2em; }
        .subtitle { text-align: center; color: #7f8c8d; font-size: 0.9em; margin-bottom: 30px; text-transform: uppercase; }

        /* ABOUTセクションの改行調整 */
        .about-section { background: #fdfefe; border: 1px solid #e5e8e8; padding: 20px; margin-bottom: 30px; border-radius: 12px; font-size: 0.88em; }
        .about-section h3 { margin-top: 0; color: var(--vitanic-blue); font-size: 1.1em; border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 12px; }

        .vitamin-controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .control-group { border: 1px solid #eee; padding: 12px; border-radius: 10px; background: #fff; box-sizing: border-box; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.8em; color: #555; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--vitanic-green); vertical-align: middle; }
        .val-display { float: right; color: var(--vitanic-blue); font-family: 'Courier New', monospace; font-weight: bold; }

        #loading-overlay { display: none; text-align: center; padding: 60px 20px; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--vitanic-green); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .bio-capsule {
            width: 120px; height: 180px; margin: 0 auto 25px;
            border: 4px solid #ddd; border-radius: 60px;
            position: relative; overflow: hidden;
            background: #f0f0f0; box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
        }
        .capsule-fluid { position: absolute; bottom: 0; width: 100%; height: 0%; transition: height 1.5s ease-out, background-color 1.5s; filter: blur(4px); opacity: 0.7; }

        .naming-section { text-align: center; margin: 25px 0; }
        #unit-name { padding: 12px; font-size: 1.1em; border: 2px solid var(--vitanic-green); border-radius: 8px; width: 80%; max-width: 400px; text-align: center; outline: none; }

        #generate-btn { display: block; width: 100%; max-width: 500px; margin: 0 auto; padding: 18px; font-size: 1.2em; font-weight: bold; background: linear-gradient(135deg, var(--vitanic-green), #2ecc71); color: white; border: none; border-radius: 12px; cursor: pointer; transition: transform 0.2s; }
        #generate-btn:active { transform: scale(0.98); }

        #result-area { margin-top: 40px; padding: 30px 20px; border: 4px solid var(--vitanic-green); border-radius: 20px; display: none; background: #fff; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .visual-description-box { background: #fdfefe; border: 1px solid #eee; padding: 15px; margin: 20px 0; border-radius: 10px; font-size: 0.9em; color: #666; }
        
        /* マッチバーの文字重なり防止 */
        .match-bar { height: 30px; background: #eee; border-radius: 15px; margin-bottom: 12px; position: relative; overflow: hidden; }
        .match-bar-fill { height: 100%; border-radius: 15px; width: 0%; transition: width 1s ease-out; }
        .match-text { position: absolute; left: 15px; top: 0; font-size: 0.85em; line-height: 30px; font-weight: bold; color: #2c3e50; text-shadow: 0 0 3px rgba(255,255,255,0.5); }
        
        .share-section { margin-top: 30px; display: flex; gap: 15px; flex-wrap: wrap; }
        .x-share-btn { background: #000; color: #fff; padding: 15px; border-radius: 12px; text-decoration: none; font-size: 0.95em; flex: 1; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .back-btn { background: #95a5a6; color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold; flex: 1; font-size: 0.95em; }

        footer { text-align: center; margin: 50px 0; font-size: 0.85em; color: #95a5a6; }
        footer a { color: var(--vitanic-blue); text-decoration: none; margin: 0 8px; }

        @media (max-width: 600px) {
            .container { margin: 15px; padding: 20px; }
            h1 { font-size: 1.6em; }
            .vitamin-controls { grid-template-columns: 1fr; }
            .share-section { flex-direction: column; }
        }
    </style>
</head>
<body>

<header class="site-header">
    <a href="../index.html" class="site-logo">🐈 ねこたスタジオ <span>御品書き</span></a>
    <div style="font-size: 0.8em; color: #95a5a6; font-weight: bold;">v1.0</div>
</header>

<div class="container">
    <h1>VITANIC</h1>
    <div class="subtitle">Bio-Vitamin Mechanics</div>

    <div class="about-section" id="about-panel">
        <h3>🔬 ABOUT VITANIC</h3>
        Vitanicは、13種類の必須ビタミンパラメータを自在に構成し、新たな生体ユニットを錬成するシミュレーターです。各数値を調整し、あなただけの「バイオユニット」を生成してください。
    </div>

    <div id="input-area">
        <div class="vitamin-controls">
            <div class="control-group"><label>ビタミンA <span id="val-A" class="val-display">500</span></label><input type="range" id="vit-A" min="0" max="3000" value="500" oninput="updateVal('A')"></div>
            <div class="control-group"><label>ビタミンD <span id="val-D" class="val-display">5</span></label><input type="range" id="vit-D" min="0" max="100" value="5" oninput="updateVal('D')"></div>
            <div class="control-group"><label>ビタミンE <span id="val-E" class="val-display">7</span></label><input type="range" id="vit-E" min="0" max="100" value="7" oninput="updateVal('E')"></div>
            <div class="control-group"><label>ビタミンK <span id="val-K" class="val-display">150</span></label><input type="range" id="vit-K" min="0" max="1000" value="150" oninput="updateVal('K')"></div>
            <div class="control-group"><label>ビタミンC <span id="val-C" class="val-display">100</span></label><input type="range" id="vit-C" min="0" max="2000" value="100" oninput="updateVal('C')"></div>
            <div class="control-group"><label>ビタミンB1 <span id="val-B1" class="val-display">1.2</span></label><input type="range" id="vit-B1" min="0" max="10" value="1.2" step="0.1" oninput="updateVal('B1')"></div>
            <div class="control-group"><label>ビタミンB6 <span id="val-B6" class="val-display">1.3</span></label><input type="range" id="vit-B6" min="0" max="10" value="1.3" step="0.1" oninput="updateVal('B6')"></div>
            <div class="control-group"><label>ビタミンB12 <span id="val-B12" class="val-display">2.4</span></label><input type="range" id="vit-B12" min="0" max="50" value="2.4" step="0.1" oninput="updateVal('B12')"></div>
            <div class="control-group"><label>ナイアシン <span id="val-Niacin" class="val-display">15</span></label><input type="range" id="vit-Niacin" min="0" max="100" value="15" oninput="updateVal('Niacin')"></div>
            <div class="control-group"><label>パントテン酸 <span id="val-Panto" class="val-display">5</span></label><input type="range" id="vit-Panto" min="0" max="50" value="5" oninput="updateVal('Panto')"></div>
            <div class="control-group"><label>葉酸 <span id="val-Folate" class="val-display">240</span></label><input type="range" id="vit-Folate" min="0" max="1000" value="240" oninput="updateVal('Folate')"></div>
            <div class="control-group"><label>ビオチン <span id="val-Biotin" class="val-display">50</span></label><input type="range" id="vit-Biotin" min="0" max="500" value="50" oninput="updateVal('Biotin')"></div>
        </div>
        <div class="naming-section"><input type="text" id="unit-name" value="BIO-UNIT-V1" placeholder="ユニット名を入力"></div>
        <button id="generate-btn" onclick="refineWithEffect()">⚡ 錬成プロセスを開始 ⚡</button>
    </div>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text" style="font-weight: bold; color: var(--vitanic-blue);">ゲノム解析中...</div>
    </div>

    <div id="result-area">
        <div class="bio-capsule"><div id="fluid" class="capsule-fluid"></div></div>
        <div style="text-align: center;">
            <h2 id="res-name" style="margin: 0; color: var(--dark-text);"></h2>
            <div id="ai-advice" style="font-size: 0.85em; margin: 10px 0; font-style: italic; color: var(--vitanic-blue);"></div>
            <div id="unit-visual-text" class="visual-description-box"></div>
        </div>
        <div id="match-results"></div>
        <div class="share-section">
            <a id="x-share-link" href="#" target="_blank" class="x-share-btn">𝕏 で報告する</a>
            <button class="back-btn" onclick="goBack()">↺ パラメータを再調整</button>
        </div>
    </div>
</div>

<footer>
    <p>&copy; 2026 ねこたスタジオ</p>
    <div style="margin-top: 10px;">
        <a href="https://github.com/jyonjyon-code/hirumeshi/">GitHub</a>
        <a href="https://www.instagram.com/necotastudio">Instagram</a>
    </div>
</footer>

<script>
    function updateVal(id) { document.getElementById('val-' + id).innerText = document.getElementById('vit-' + id).value; }

    const ref_foods = [
        { name: 'レモン', color: '#f1c40f', vits: { C: 1.0, B6: 0.1 } },
        { name: '人参', color: '#e67e22', vits: { A: 1.0, K: 0.2 } },
        { name: 'ほうれん草', color: '#27ae60', vits: { K: 1.0, A: 0.4, Folate: 0.6 } },
        { name: 'トマト', color: '#e74c3c', vits: { C: 0.3, A: 0.2, E: 0.1 } },
        { name: 'ブロッコリー', color: '#2ecc71', vits: { C: 0.8, K: 0.5, Folate: 0.4 } },
        { name: 'バナナ', color: '#fff176', vits: { B6: 0.5, B1: 0.1 } },
        { name: 'アボカド', color: '#556b2f', vits: { E: 0.8, Panto: 0.5, B6: 0.3 } },
        { name: 'しいたけ', color: '#8d6e63', vits: { D: 1.0, Niacin: 0.5 } },
        { name: 'いちご', color: '#ff4d6d', vits: { C: 0.7, Biotin: 0.1 } },
        { name: 'かぼちゃ', color: '#fb8c00', vits: { A: 0.6, E: 0.5 } },
        { name: 'あさり', color: '#b0bec5', vits: { B12: 1.0 } }
    ];

    async function refineWithEffect() {
        document.getElementById('input-area').style.display = 'none';
        document.getElementById('about-panel').style.display = 'none';
        document.getElementById('result-area').style.display = 'none';
        document.getElementById('loading-overlay').style.display = 'block';
        
        const logs = ["ゲノム配列をスキャン中...", "ビタミンマトリックスを照合...", "バイオ素材を融合中...", "錬成完了！"];
        for(let log of logs) {
            document.getElementById('loading-text').innerText = log;
            await new Promise(r => setTimeout(r, 450));
        }
        document.getElementById('loading-overlay').style.display = 'none';
        renderResult();
    }

    function renderResult() {
        const name = document.getElementById('unit-name').value || "NO-NAME";
        const resultArea = document.getElementById('result-area');
        const fluid = document.getElementById('fluid');
        
        const user = {
            A: document.getElementById('vit-A').value / 3000, D: document.getElementById('vit-D').value / 100,
            E: document.getElementById('vit-E').value / 100, K: document.getElementById('vit-K').value / 1000,
            C: document.getElementById('vit-C').value / 2000, B1: document.getElementById('vit-B1').value / 10,
            B6: document.getElementById('vit-B6').value / 10, B12: document.getElementById('vit-B12').value / 50,
            Niacin: document.getElementById('vit-Niacin').value / 100, Panto: document.getElementById('vit-Panto').value / 50,
            Folate: document.getElementById('vit-Folate').value / 1000, Biotin: document.getElementById('vit-Biotin').value / 500
        };

        let scores = ref_foods.map(f => {
            let s = 0; for(let k in f.vits) s += (user[k] || 0) * f.vits[k];
            return { ...f, score: s + 0.001 };
        }).sort((a,b) => b.score - a.score).slice(0, 5);

        const total = scores.reduce((sum, f) => sum + f.score, 0);
        const main = scores[0];

        resultArea.style.display = 'block';
        resultArea.style.borderColor = main.color;
        fluid.style.backgroundColor = main.color;
        fluid.style.height = '0%';
        setTimeout(() => fluid.style.height = '80%', 50);

        document.getElementById('res-name').innerText = "UNIT: " + name;
        document.getElementById('ai-advice').innerText = `Main DNA: ${main.name} Type`;
        document.getElementById('unit-visual-text').innerText = `分析の結果、生体ユニット「${name}」は「${main.name}」の特性を強く引き継いで錬成されました。現在、${main.color}色のバイオ液内で安定しています。`;

        const matchDiv = document.getElementById('match-results');
        matchDiv.innerHTML = '';
        scores.forEach(s => {
            const p = Math.round((s.score/total)*100);
            matchDiv.innerHTML += `
                <div class="match-bar">
                    <div class="match-bar-fill" style="width:${p}%; background:${s.color}; opacity: 0.8;"></div>
                    <span class="match-text">${s.name} ${p}%</span>
                </div>`;
        });

        // Xシェアリンクの構築（URLを含める）
        const shareText = `【Vitanic】新種ユニット「${name}」を錬成！\nメイン素材：${main.name} (${Math.round((main.score/total)*100)}%)\n#Vitanic #ねこたスタジオ`;
        const shareUrl = window.location.href;
        document.getElementById('x-share-link').href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent(shareUrl)}`;
        
        resultArea.scrollIntoView({ behavior: 'smooth' });
    }

    function goBack() {
        document.getElementById('result-area').style.display = 'none';
        document.getElementById('input-area').style.display = 'block';
        document.getElementById('about-panel').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
</body>
</html>
