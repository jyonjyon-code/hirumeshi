<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>今日イチ | きみは今日いちごを食べたか</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="今日イチ">

    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body { font-family: 'Zen Maru Gothic', sans-serif; text-align: center; background: #fff5f6; padding: 15px; color: #4a1a1a; margin: 0; }
        
        #app-guide { 
            display: none; background: #ff4d6d; color: white; padding: 12px; font-size: 11px; border-radius: 15px; 
            margin: 0 auto 15px auto; line-height: 1.6; text-align: left; max-width: 400px; box-shadow: 0 4px 10px rgba(255, 77, 109, 0.3);
        }

        .card { background: white; padding: 25px 20px; border-radius: 30px; box-shadow: 0 10px 30px rgba(255,100,120,0.15); display: inline-block; width: 100%; max-width: 400px; border: 4px solid #ff4d6d; box-sizing: border-box; }
        
        .main-title { color: #4a1a1a; font-size: 18px; margin-bottom: 5px; font-weight: 700; line-height: 1.3; }
        .brand-badge { 
            font-size: 36px; color: #ff4d6d; margin-bottom: 25px; display: inline-block; font-weight: 900; 
            background: #fff0f3; border-radius: 15px; padding: 5px 30px; border: 4px solid #ff4d6d; 
            letter-spacing: 0.1em; text-shadow: 2px 2px 0px #ffffff; box-shadow: 0 6px 0 #ffcad4;
        }
        
        .auth-section { margin-bottom: 15px; }
        .btn-login { background: white; color: #444; border: 1px solid #ddd; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; font-size: 14px; }
        .user-info { font-size: 12px; color: #ff4d6d; font-weight: bold; margin-bottom: 10px; }

        .counter-group { background: #fffcfc; border-radius: 20px; padding: 10px 15px; margin-bottom: 10px; border: 1px solid #ffe5e9; }
        .item-row { display: flex; align-items: center; justify-content: space-between; margin: 12px 0; padding-bottom: 8px; border-bottom: 1px dashed #ffe5e9; }
        .item-row:last-child { border-bottom: none; }
        
        .item-label { font-size: 14px; font-weight: bold; flex-grow: 1; text-align: left; }
        .sweet-select { font-family: 'Zen Maru Gothic', sans-serif; font-size: 13px; padding: 8px; border-radius: 10px; border: 1px solid #ff4d6d; margin-top: 8px; width: 100%; color: #4a1a1a; background: white; }
        
        .controls { display: flex; align-items: center; gap: 8px; }
        .count-num { font-size: 18px; font-weight: 900; min-width: 25px; }
        .btn-plus { width: 42px; height: 42px; border-radius: 50%; border: none; background: #ff4d6d; color: white; font-size: 22px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 0 #c92a42; transition: 0.1s; }
        .btn-plus:active { transform: translateY(2px); box-shadow: 0 2px 0 #c92a42; }
        .btn-minus { width: 34px; height: 34px; border-radius: 50%; border: 2px solid #ff4d6d; background: white; color: #ff4d6d; font-size: 18px; cursor: pointer; font-weight: bold; }
        
        .btn-main { background: #ff4d6d; color: white; border: none; padding: 18px 30px; border-radius: 50px; cursor: pointer; font-weight: 900; font-size: 20px; width: 100%; margin-top: 15px; box-shadow: 0 6px 0 #c92a42; transition: 0.1s; }
        .btn-main:active { transform: translateY(3px); box-shadow: 0 3px 0 #c92a42; }
        
        #judgment-area { display: none; margin-top: 20px; padding: 20px; background: #fffbf0; border-radius: 20px; border: 2px dashed #ff4d6d; }
        .shogo { font-size: 22px; font-weight: 900; color: #ff4d6d; }
        .rakuten-area { margin-top: 15px; padding: 15px; border-radius: 15px; display: none; }
        .rakuten-link { color: white; font-weight: bold; text-decoration: none; font-size: 13px; display: block; padding: 10px; border-radius: 10px; }
        .rank-gold { background: #fff9e6; border-color: #ffd700; }
        .rank-gold .rakuten-link { background: #d4af37; }
        .rank-normal { background: #fff0f0; border-color: #ffccd5; }
        .rank-normal .rakuten-link { background: #ff4d6d; }

        .studio-nav { margin-top: 20px; border-top: 1px solid #ffe5e9; padding-top: 20px; }
        .btn-nav { display: block; margin-bottom: 10px; color: #ff4d6d; text-decoration: none; font-size: 14px; font-weight: bold; border: 2px solid #ff4d6d; padding: 12px; border-radius: 15px; background: white; transition: 0.2s; }
        .btn-share { background: #000; color: white; border: none; padding: 12px; border-radius: 25px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; font-size: 14px; }
        .sns-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-sns { color: white; border: none; padding: 10px; border-radius: 50px; cursor: pointer; font-weight: bold; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 12px; flex: 1; }
        .btn-x { background: #000; }
        .btn-insta { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
    </style>
</head>
<body>

<div id="app-guide">
    <i class="fa-solid fa-circle-info"></i> <strong>SNS内ブラウザをご利用中の方へ</strong><br>
    記録を同期するために、右上のメニューから<strong>「ブラウザで開く」</strong>を選んでください🍓
</div>

<div class="card">
    <div class="main-title">きみは今日 いちごを食べたか</div>
    <div class="brand-badge">今日イチ</div>

    <div class="auth-section">
        <div id="user-display" class="user-info" style="display:none;"></div>
        <button id="login-btn" class="btn-login">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18"> Googleでログイン
        </button>
    </div>

    <div class="counter-group">
        <div class="item-row">
            <div class="item-label">🍓 生のいちご</div>
            <div class="controls">
                <button class="btn-minus" onclick="change('raw', -1)">−</button>
                <span class="count-num" id="raw-count">0</span>
                <button class="btn-plus" onclick="change('raw', 1)">＋</button>
            </div>
        </div>
        <div class="item-row">
            <div class="item-label">🥄 ジャム(杯)</div>
            <div class="controls">
                <button class="btn-minus" onclick="change('jam', -1)">−</button>
                <span class="count-num" id="jam-count">0</span>
                <button class="btn-plus" onclick="change('jam', 1)">＋</button>
            </div>
        </div>
        <div class="item-row" style="flex-direction: column; align-items: flex-start;">
            <div style="display: flex; width: 100%; justify-content: space-between; align-items: center;">
                <div class="item-label">🍰 スイーツ系</div>
                <div class="controls">
                    <button class="btn-minus" onclick="change('sweet', -1)">−</button>
                    <span class="count-num" id="sweet-count">0</span>
                    <button class="btn-plus" onclick="change('sweet', 1)">＋</button>
                </div>
            </div>
            <select id="sweet-type" class="sweet-select">
                <option value="2.0">ショートケーキ (2.0🍓)</option>
                <option value="3.0">いちごパフェ (3.0🍓)</option>
                <option value="1.5">いちご大福 (1.5🍓)</option>
                <option value="1.2">いちごタルト (1.2🍓)</option>
                <option value="1.0">いちごチョコ (1.0🍓)</option>
                <option value="0.8">いちごアイス (0.8🍓)</option>
                <option value="0.5">いちご飴/グミ (0.5🍓)</option>
                <option value="0.3">いちごオレ/飲料 (0.3🍓)</option>
                <option value="0.1">その他 (0.1🍓)</option>
            </select>
        </div>
    </div>

    <button class="btn-main" onclick="judge()">摂取量を報告する</button>

    <div id="judgment-area">
        <div class="shogo" id="shogo-text"></div>
        <p id="comment-text" style="font-size:14px; color:#7a4a4a; white-space: pre-wrap;"></p>
        <div id="rakuten-box" class="rakuten-area">
            <div id="rakuten-msg" style="font-size:12px; font-weight:bold; margin-bottom:8px;"></div>
            <a id="rakuten-url" href="" class="rakuten-link" target="_blank"></a>
        </div>
        <button onclick="shareOnX()" class="btn-share">
            <i class="fa-brands fa-x-twitter"></i> 結果を報告する
        </button>
    </div>

    <div class="studio-nav">
        <a href="ichigo_log.html" class="btn-nav">🗓️ 記録をみる「いちごよみ」</a>
        <a href="index.html" style="color:#888; font-size:12px; text-decoration:none; display:inline-block; margin-bottom: 10px;">ねこたスタジオへ戻る</a>
        <div class="sns-group">
            <a href="https://x.com/necotatu2" target="_blank" class="btn-sns btn-x">
                <i class="fa-brands fa-x-twitter"></i> 公式X
            </a>
            <a href="https://www.instagram.com/necotastudio" target="_blank" class="btn-sns btn-insta">
                <i class="fa-brands fa-instagram"></i> 公式Insta
            </a>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA7pcr0G4qEx0yLNWueZPdaeQoEBjFuoic",
        authDomain: "necotastudio-app.firebaseapp.com",
        projectId: "necotastudio-app",
        storageBucket: "necotastudio-app.firebasestorage.app",
        messagingSenderId: "1093173509944",
        appId: "1:1093173509944:web:5340935ddffdd49628cbcd"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });

    const loginBtn = document.getElementById('login-btn');
    const userDisplay = document.getElementById('user-display');

    // ログイン処理（ポップアップ方式）
    loginBtn.onclick = async () => {
        try {
            await signInWithPopup(auth, provider);
        } catch (error) {
            console.error("Auth Error:", error);
            if (error.code === 'auth/popup-blocked') {
                alert("ポップアップがブロックされました🍓 標準ブラウザで開くか、設定を確認してください。");
            }
        }
    };

    // 認証状態の監視
    onAuthStateChanged(auth, (user) => {
        if (user) {
            loginBtn.style.display = 'none';
            userDisplay.style.display = 'block';
            userDisplay.innerText = `🍓 ${user.displayName} さん`;
        } else {
            loginBtn.style.display = 'flex';
            userDisplay.style.display = 'none';
        }
    });

    let counts = { raw: 0, jam: 0, sweet: 0 };
    window.change = (type, delta) => { 
        counts[type] = Math.max(0, counts[type] + delta); 
        for(let k in counts) document.getElementById(k + '-count').innerText = counts[k];
    };

    window.judge = async () => {
        const sweetMultiplier = parseFloat(document.getElementById('sweet-type').value);
        let addScore = (Number(counts.raw) * 1.0) + (Number(counts.jam) * 0.5) + (Number(counts.sweet) * sweetMultiplier);
        
        if (addScore === 0) {
            alert("いちごを摂取してから報告してください🍓");
            return;
        }

        const now = new Date();
        const logEntry = { 
            timestamp: now.toISOString(),
            score: Number(addScore)
        };

        let history = JSON.parse(localStorage.getItem('ichigo-history') || '[]');
        history.unshift(logEntry);
        localStorage.setItem('ichigo-history', JSON.stringify(history.slice(0, 100)));

        const user = auth.currentUser;
        if (user) {
            try {
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                if (!userSnap.exists()) {
                    await setDoc(userRef, { history: [logEntry] });
                } else {
                    await updateDoc(userRef, { history: arrayUnion(logEntry) });
                }
            } catch(e) { console.error("Firebase Error:", e); }
        }

        const dayTotal = history.filter(h => {
            const d = new Date(h.timestamp);
            return d.getDate() === now.getDate() && d.getMonth() === now.getMonth();
        }).reduce((sum, item) => sum + item.score, 0);

        let shogo = dayTotal >= 10 ? "いちごの化身" : dayTotal >= 5 ? "いちご騎士" : dayTotal >= 1 ? "いちご愛好家" : "いちご見習い";
        
        document.getElementById('shogo-text').innerText = "【" + shogo + "】";
        document.getElementById('comment-text').innerText = `今回: +${addScore.toFixed(1)}🍓\n今日の合計: ${dayTotal.toFixed(1)}🍓`;
        
        const RAKUTEN_AFID = "51366796.8818598a.51366797.ddbb51d0"; 
        const rBox = document.getElementById('rakuten-box');
        const isGold = dayTotal >= 10;
        
        rBox.className = "rakuten-area " + (isGold ? "rank-gold" : "rank-normal");
        document.getElementById('rakuten-msg').innerText = dayTotal >= 1 ? "素晴らしい摂取量です！" : "もっと徳を積みましょう";
        document.getElementById('rakuten-url').innerText = isGold ? "✨ 最高級苺を楽天で召喚 ✨" : "🍓 楽天でいちごを補給 🍓";
        
        const searchKeyword = isGold ? "あまおう ギフト" : "いちご";
        document.getElementById('rakuten-url').href = `https://hb.afl.rakuten.co.jp/hgc/${RAKUTEN_AFID}/?pc=${encodeURIComponent('https://search.rakuten.co.jp/search/mall/' + encodeURIComponent(searchKeyword) + '/')}`;
        
        document.getElementById('judgment-area').style.display = 'block';
        rBox.style.display = 'block';
        
        counts = { raw: 0, jam: 0, sweet: 0 };
        for(let k in counts) document.getElementById(k + '-count').innerText = 0;
    };

    window.shareOnX = () => {
        const shogo = document.getElementById('shogo-text').innerText;
        const comment = document.getElementById('comment-text').innerText.split('\n')[1]; 
        const url = "https://necotastudio.com/ichigo.html";
        const text = `きみは今日いちごを食べたか？🍓\n\n【今日イチ判定】\n称号：${shogo}\n${comment}\n\n#今日イチ #ねこたスタジオ`;
        window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank');
    };

    const ua = navigator.userAgent.toLowerCase();
    if (ua.indexOf('twitter') > -1 || ua.indexOf('instagram') > -1 || ua.indexOf('line') > -1) {
        document.getElementById('app-guide').style.display = 'block';
    }
</script>
</body>
</html>
