<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leafy Library -葉もの図書館- | necotastudio</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-green: #4CAF50;
            --dark-green: #2E7D32;
            --wood-brown: #5D4037;
            --paper-white: #F5F5DC;
        }
        body { font-family: 'Zen Maru Gothic', sans-serif; background-color: var(--paper-white); color: var(--wood-brown); margin: 0; padding-bottom: 80px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        
        header { background: var(--dark-green); color: white; width: 100%; padding: 15px 0; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: relative; z-index: 10; }
        .back-home { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: white; text-decoration: none; font-size: 0.8rem; border: 1px solid white; padding: 6px 12px; border-radius: 20px; font-weight: bold; background: rgba(0,0,0,0.2); cursor: pointer; display: flex; align-items: center; gap: 5px; }
        
        .container { width: 90%; max-width: 450px; margin: 10px 0; box-sizing: border-box; }
        
        .status-box { background: white; padding: 20px; border-radius: 25px; text-align: center; border: 2px solid #ddd; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; }
        .leaf-display { font-size: 2.5rem; font-weight: 900; color: var(--dark-green); margin: 10px 0; }
        
        .action-btns { display: flex; gap: 10px; margin-top: 10px; }
        .go-library { flex: 2; padding: 15px; background: var(--wood-brown); color: white; border-radius: 15px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .go-calendar { flex: 1; padding: 15px; background: var(--primary-green); color: white; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .login-btn-style { background: #4285F4; color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }

        .card-frame { background: white; padding: 20px; border-radius: 25px; border: 2px solid #ddd; box-sizing: border-box; width: 100%; margin-bottom: 15px; }
        .input-card { border: 3px solid var(--primary-green); }

        .m-btn { flex: 1; padding: 10px; border: 2px solid var(--primary-green); background: white; border-radius: 12px; cursor: pointer; font-weight: bold; font-family: inherit; }
        .m-btn.active { background: var(--primary-green); color: white; }
        
        .log-container { background: #fcfcfc; border-radius: 15px; border: 1px solid #eee; padding: 10px; margin-top: 15px; max-height: 150px; overflow-y: auto; }
        .log-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-bottom: 1px solid #f0f0f0; font-size: 0.85rem; }
        .del-btn { color: #ff5252; background: none; border: none; cursor: pointer; padding: 5px; font-size: 1rem; }

        .radish-btn-top { background: #ff9800; color: white; border: none; padding: 15px 10px; border-radius: 15px; font-weight: bold; width: 100%; box-sizing: border-box; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; box-shadow: 0 4px 0 #e68a00; transition: 0.1s; }
        .radish-btn-top:active { transform: translateY(2px); box-shadow: 0 2px 0 #e68a00; }

        /* Xシェアボタン共通 */
        .x-share-mini { background: #000; color: white; border: none; border-radius: 20px; padding: 8px 15px; font-size: 0.8rem; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 5px; margin: 10px auto; }

        #calendar-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--paper-white); z-index: 1100; display: none; flex-direction: column; overflow-y: auto; align-items: center; padding-bottom: 30px; }
        .cal-nav { display: flex; align-items: center; justify-content: space-between; width: 90%; margin: 20px 0; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; background: white; padding: 10px; border-radius: 20px; border: 2px solid var(--primary-green); width: 90%; max-width: 400px; }
        .cal-day { height: 65px; background: #f9f9f9; border-radius: 8px; font-size: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; cursor: pointer; border: 2px solid transparent; }
        .cal-day.active-day { border-color: var(--primary-green); background: #f0fff0; }
        .cal-header { font-weight: bold; color: var(--dark-green); padding: 5px 0; font-size: 12px; text-align: center; }
        .leaf-dot { color: var(--primary-green); font-size: 12px; margin-top: 2px; }
        .cal-score { font-size: 9px; font-weight: 900; color: var(--dark-green); }

        /* カレンダーの詳細ログ表示用 */
        #cal-detail-area { width: 90%; max-width: 400px; margin-top: 20px; background: white; border-radius: 15px; padding: 15px; border: 2px solid #ddd; }

        footer { margin-top: 30px; padding: 20px; text-align: center; width: 100%; border-top: 1px solid #ddd; background: #fff; }
        .footer-home-btn { background: var(--wood-brown); color: white; border: none; padding: 10px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; margin-bottom: 10px; font-size: 0.9rem; }
        .copyright { font-size: 0.8rem; color: #999; }

        #library-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #3e2723; z-index: 1000; display: none; flex-direction: column; overflow-y: auto; }
        .library-header { background: #2d1b18; color: #d7ccc8; padding: 20px; text-align: center; position: sticky; top: 0; z-index: 11; display: flex; justify-content: space-between; align-items: center; }
        .shelf-container { padding: 20px; display: flex; flex-direction: column; gap: 30px; align-items: center; }
        .shelf-row { background: #5d4037; width: 100%; max-width: 600px; padding: 15px 10px 5px; border-radius: 4px; border-bottom: 12px solid #2d1b18; display: flex; flex-wrap: wrap; gap: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); box-sizing: border-box; }
        .book-spine { width: 22px; height: 80px; border-radius: 2px; cursor: pointer; transition: 0.2s; border-left: 3px solid rgba(255,255,255,0.2); }
        .book-spine:hover { transform: translateY(-15px); }

        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index: 2000; display:none; }
        #panel { position: fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:85%; max-width:400px; background:white; border-radius:30px; padding:30px; z-index: 2001; display:none; text-align:center; border: 6px solid var(--primary-green); }
        .rakuten-btn { background: #bf0000; color: white; border: none; padding: 14px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; font-size: 0.9rem; }

        /* 追加：ヘルプポップアップのスタイル */
        #help-trigger { position: absolute; right: 15px; top: 15px; cursor: pointer; background: var(--primary-green); width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border: 2px solid white; }
        #help-popup { display: none; position: absolute; top: 50px; right: 10px; width: 260px; background: white; border: 2px solid var(--primary-green); border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 1000; padding: 15px; text-align: left; font-size: 13px; color: var(--wood-brown); line-height: 1.5; }
        #help-popup b { color: var(--dark-green); }
    </style>
</head>
<body>

<header>
    <div class="back-home" onclick="location.href='index.html'"><i class="fas fa-home"></i> ホーム</div>
    <h1 style="margin:0; font-size: 1.1rem; letter-spacing: 1px;">Leafy Library -葉もの図書館-</h1>
</header>

<div class="container status-box">
    <!-- 追加：ヘルプボタン -->
    <div id="help-trigger" onclick="toggleHelp()"><i class="fas fa-question"></i></div>
    <!-- 追加：ポップアップ中身 -->
    <div id="help-popup">
        <p style="margin-top:0;">🌿 <b>司書のしおり</b></p>
        <ul style="padding-left: 18px; margin: 0;">
            <li><b>集める：</b>葉っぱ（野菜）を食べて記録すると、通貨の「はっぱ」が貯まります。</li>
            <li><b>交換する：</b>貯まった「はっぱ」を使って、交換所で不思議な本を購入できます。</li>
            <li><b>飾る：</b>購入した本は「図書室」の棚に並び、いつでも閲覧できます。</li>
            <li><b>記録：</b>「はっぱよみ」で過去の収穫履歴を確認・シェアできます。</li>
        </ul>
        <button onclick="toggleHelp()" style="margin-top:12px; width:100%; border:none; background:var(--primary-green); color:white; padding:6px; border-radius:10px; cursor:pointer; font-weight:bold;">閉じる</button>
    </div>

    <div id="user-display" style="font-size: 14px; font-weight: bold; color: #444; margin-bottom: 8px;">読み込み中...</div>
    <div class="leaf-display">🍃 <span id="leaf-total">0</span> <small style="font-size: 1rem;">枚</small></div>
    
    <button class="x-share-mini" onclick="shareTotal()"><i class="fab fa-x-twitter"></i> 蔵書の増築を報告</button>

    <div id="logged-in-actions" style="display:none;">
        <div class="action-btns">
            <button class="go-library" onclick="openLibrary()"><i class="fas fa-book"></i> 図書室へ</button>
            <button class="go-calendar" onclick="openCalendar()"><i class="fas fa-calendar-alt"></i> はっぱよみ</button>
        </div>
    </div>
    <button id="login-btn" class="login-btn-style" style="display:none;" onclick="login()"><i class="fab fa-google"></i> Googleでログイン</button>
</div>

<div class="container card-frame input-card">
    <div style="display:flex; gap:8px; margin-bottom:15px;">
        <button id="m-veg" class="m-btn active" onclick="switchMode('veg')">🥬 種類</button>
        <button id="m-dish" class="m-btn" onclick="switchMode('dish')">🍳 料理</button>
    </div>
    <select id="cat-select" style="width:100%; padding:12px; border-radius:10px; margin-bottom:10px; border:1px solid #ddd;" onchange="updateItemList()"></select>
    <select id="item-select" style="width:100%; padding:12px; border-radius:10px; margin-bottom:10px; border:1px solid #ddd;"></select>
    
    <div style="background: #f8f8f8; padding: 15px; border-radius: 15px; display: flex; align-items: center; justify-content: space-between;">
        <div style="text-align: left;">
            <div style="font-size: 0.7rem; color: #999;">今日の分</div>
            <div id="daily-count-txt" style="font-size: 1.5rem; font-weight: 900;">0</div>
        </div>
        <button onclick="addEntry()" style="background: var(--primary-green); color: white; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; box-shadow: 0 4px 0 #388E3C;">
            <i class="fas fa-plus"></i>
        </button>
    </div>

    <div id="log-list" class="log-container"></div>
</div>

<div class="container card-frame" style="padding: 15px;">
    <a href="https://px.a8.net/svt/ejp?a8mat=4AZBO2+81Y4DU+1YGO+1ZGNQR" target="_blank" class="radish-btn-top">
        <i class="fas fa-leaf"></i> 新鮮な葉っぱを仕入れる (お試しセット)
    </a>
</div>

<div class="container">
    <h3 style="border-left: 5px solid var(--primary-green); padding-left: 10px; margin-top: 0;">交換所</h3>
    <div id="store-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
</div>

<footer>
    <button class="footer-home-btn" onclick="location.href='index.html'"><i class="fas fa-home"></i> ホームへ戻る</button>
    <div class="copyright">© necotastudio</div>
</footer>

<div id="library-page">
    <div class="library-header">
        <button onclick="closeLibrary()" style="background:none; border:1px solid #d7ccc8; color:#d7ccc8; padding:5px 15px; border-radius:20px;">閉じる</button>
        <span style="font-weight:bold; font-size:1.1rem;">Leafy Library 蔵書</span>
        <span>所蔵: <span id="lib-book-count">0</span>冊</span>
    </div>
    <div style="text-align: center; padding-top: 10px;">
        <button class="x-share-mini" onclick="shareLibrary()" style="background: #2d1b18; border: 1px solid #d7ccc8;"><i class="fab fa-x-twitter"></i> 司書報告を公開する</button>
    </div>
    <div class="shelf-container" id="shelf-rows-container"></div>
</div>

<div id="calendar-page">
    <header style="margin-bottom:0; background: var(--primary-green);">
        <div class="back-home" onclick="closeCalendar()"><i class="fas fa-chevron-left"></i> 戻る</div>
        <h1 style="margin:0; font-size: 1.2rem;">収穫履歴</h1>
    </header>
    <div class="cal-nav">
        <button class="m-btn" style="padding:5px 10px;" onclick="changeMonth(-1)">◀</button>
        <b id="cal-title"></b>
        <button class="m-btn" style="padding:5px 10px;" onclick="changeMonth(1)">▶</button>
    </div>
    <div class="calendar-grid" id="calendar-grid"></div>

    <div id="cal-detail-area" style="display:none;">
        <h4 id="cal-detail-date" style="margin-top:0; border-bottom: 2px solid var(--primary-green); padding-bottom: 5px;"></h4>
        <div id="cal-detail-logs" style="font-size: 0.9rem; line-height: 1.6;"></div>
        <button class="x-share-mini" id="cal-share-btn" onclick="shareDaily()"><i class="fab fa-x-twitter"></i> この日の活動をシェア</button>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div id="panel"><div id="panel-content"></div><button class="m-btn" style="margin-top:20px; width:100%;" onclick="closePanel()">閉じる</button></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyA7pcr0G4qEx0yLNWueZPdaeQoEBjFuoic", authDomain: "necotastudio-app.firebaseapp.com", projectId: "necotastudio-app", storageBucket: "necotastudio-app.firebasestorage.app", messagingSenderId: "1093173509944", appId: "1:1093173509944:web:5340935ddffdd49628cbcd" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    const RAKUTEN_AFID = "51366796.8818598a.51366797.ddbb51d0";
    const vData = { "定番葉物": ["キャベツ", "レタス", "白菜", "ほうれん草", "小松菜", "チンゲン菜"], "香味ハーブ": ["大葉", "茗荷", "ニラ", "パクチー", "バジル", "パセリ", "ルッコラ"], "サラダ葉": ["ケール", "水菜", "ベビーリーフ", "トレビス", "サニーレタス"], "その他": ["明日葉", "モロヘイヤ", "豆苗", "春菊", "セロリ"] };
    const dData = { "和風": { "お浸し": 2, "胡麻和え": 2, "浅漬け": 2, "天ぷら": 3, "野菜炒め": 3, "白和え": 3, "筑前煮": 3, "冷奴の大葉のせ": 2, "茗荷の甘酢漬け": 2 }, "洋風": { "サラダ": 2, "ロールキャベツ": 3, "バジルパスタ": 2, "ポトフ": 3, "ほうれん草ソテー": 2, "コールスロー": 2, "ケールチップス": 3, "ラタトゥイユ": 4, "バーニャカウダ": 4 }, "中華・エスニック": { "青椒肉絲": 3, "回鍋肉": 3, "パクチーサラダ": 3, "空芯菜炒め": 3, "餃子（ニラたっぷり）": 4, "八宝菜": 4, "ガパオライス": 3, "生春巻き": 3 }, "スープ・飲み物": { "青汁": 1, "スムージー": 2, "野菜スープ": 2, "ミネストローネ": 3, "味噌汁（葉物入り）": 2, "ポタージュ": 3 } };
    const rarities = { C: { label:"Common", color: "#9e9e9e", price: 20 }, U: { label:"Uncommon", color: "#2196f3", price: 100 }, R: { label:"Rare", color: "#9c27b0", price: 300 }, E: { label:"Epic", color: "#ff9800", price: 800 }, L: { label:"Legendary", color: "#d4af37", price: 2500 } };
    const bookMaster = [ { id: 1, title: "キャベツと鬼退治の旅", rare: "C", desc: "キャベツの昔話。", kw: "キャベツ 絵本" }, { id: 2, title: "森の魔法使いと緑の杖", rare: "U", desc: "ほうれん草の杖。", kw: "ほうれん草 魔法" }, { id: 3, title: "迷宮のレタス姫", rare: "R", desc: "レタス栽培サバイバル。", kw: "レタス 本" }, { id: 4, title: "銀河へ飛ぶハーブ船", rare: "E", desc: "パクチー号のSF。", kw: "パクチー 育て方" }, { id: 5, title: "翡翠の司書と禁断の葉", rare: "L", desc: "世界の真実の記録。", kw: "司書 小説" }, { id: 6, title: "小松菜の騎士道", rare: "C", desc: "鉄分豊富な騎士道。", kw: "小松菜 レシピ" }, { id: 7, title: "バジルと秘密の調味料", rare: "U", desc: "美食の冒険。", kw: "バジル 料理本" }, { id: 8, title: "白菜の降る night に", rare: "R", desc: "冬の奇跡の物語。", kw: "白菜 専門書" }, { id: 9, title: "ケールの巨人と空の庭", rare: "E", desc: "天空の庭園守護記。", kw: "ケール 健康本" }, { id: 10, title: "伝説の野菜使い・第一巻", rare: "L", desc: "野菜を操る戦士の歴史。", kw: "伝説 野菜 歴史" } ];

    let myLeaves = null;
    let myBooks = [];
    let fullHistory = [];
    let currentCalDate = new Date();
    let currentMode = 'veg';
    let selectedCalKey = null; 
    const todayStr = () => new Date().toLocaleDateString("ja-JP");

    // 追加：ヘルプ表示・非表示の関数
    window.toggleHelp = () => {
        const popup = document.getElementById('help-popup');
        popup.style.display = (popup.style.display === 'block') ? 'none' : 'block';
    }

    window.login = async () => { try { await signInWithPopup(auth, provider); } catch (e) { console.error(e); } };
    
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById('login-btn').style.display = 'none';
            document.getElementById('logged-in-actions').style.display = 'block';
            document.getElementById('user-display').innerText = `🌿 ${user.displayName} さん`;
            await loadData(user.uid);
        } else {
            myLeaves = 0; document.getElementById('login-btn').style.display = 'flex';
            document.getElementById('logged-in-actions').style.display = 'none';
            document.getElementById('user-display').innerText = "ログインして保存"; updateUI();
        }
    });

    async function loadData(uid) {
        const docSnap = await getDoc(doc(db, "leafy_library", uid));
        if (docSnap.exists()) {
            const d = docSnap.data();
            myLeaves = d.leaves ?? 0; myBooks = d.books || []; fullHistory = d.fullHistory || [];
        } else { myLeaves = 0; fullHistory = []; }
        updateUI();
    }

    async function sync() {
        const user = auth.currentUser; if (!user) return;
        await setDoc(doc(db, "leafy_library", user.uid), { leaves: myLeaves, books: myBooks, fullHistory: fullHistory }, { merge: true });
    }

    window.addEntry = async () => {
        if (myLeaves === null) return;
        const itemName = document.getElementById('item-select').value;
        const cat = document.getElementById('cat-select').value;
        let points = (currentMode === 'dish') ? (dData[cat][itemName] || 2) : 1;
        const entry = { id: Date.now(), timestamp: new Date().toISOString(), name: itemName, val: points };
        fullHistory.push(entry); myLeaves += points;
        updateUI(); await sync();
    };

    window.deleteEntry = async (id) => {
        const index = fullHistory.findIndex(h => h.id === id);
        if (index > -1) {
            if (!confirm(`「${fullHistory[index].name}」の記録を削除しますか？`)) return;
            myLeaves -= fullHistory[index].val;
            fullHistory.splice(index, 1);
            updateUI(); await sync();
        }
    };

    function updateUI() {
        document.getElementById('leaf-total').innerText = (myLeaves === null) ? "0" : myLeaves;
        const todayLogs = fullHistory.filter(h => new Date(h.timestamp).toLocaleDateString("ja-JP") === todayStr());
        document.getElementById('daily-count-txt').innerText = todayLogs.reduce((sum, log) => sum + log.val, 0);
        renderLog(todayLogs); renderStore();
    }

    function renderLog(logs) {
        const list = document.getElementById('log-list');
        if (logs.length === 0) { list.innerHTML = '<p style="font-size: 0.7rem; color: #ccc; text-align: center;">今日のログはありません</p>'; return; }
        list.innerHTML = logs.slice().reverse().map(log => `
            <div class="log-item">
                <span>${log.val >= 2 ? '🍳' : '🌿'} ${log.name} (+${log.val})</span>
                <button class="del-btn" onclick="deleteEntry(${log.id})"><i class="fas fa-trash-alt"></i></button>
            </div>
        `).join('');
    }

    window.openCalendar = () => { renderCalendar(); document.getElementById('calendar-page').style.display = 'flex'; };
    window.closeCalendar = () => { 
        document.getElementById('calendar-page').style.display = 'none'; 
        document.getElementById('cal-detail-area').style.display = 'none';
        selectedCalKey = null;
    };

    function renderCalendar() {
        const year = currentCalDate.getFullYear(); const month = currentCalDate.getMonth();
        document.getElementById('cal-title').innerText = `${year}年 ${month + 1}月`;
        const dailyTotals = {};
        fullHistory.forEach(h => {
            const d = new Date(h.timestamp); const key = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
            dailyTotals[key] = (dailyTotals[key] || 0) + h.val;
        });
        const firstDay = new Date(year, month, 1).getDay(); const lastDate = new Date(year, month + 1, 0).getDate();
        let html = ''; ['日','月','火','水','木','金','土'].forEach(d => html += `<div class="cal-header">${d}</div>`);
        for(let i=0; i<firstDay; i++) html += '<div></div>';
        for(let d=1; d<=lastDate; d++) {
            const key = `${year}-${month+1}-${d}`; const score = dailyTotals[key] || 0;
            const activeClass = score > 0 ? 'active-day' : '';
            html += `<div class="cal-day ${activeClass}" onclick="showCalDetail('${key}', ${d})">
                ${d}${score > 0 ? `<i class="fas fa-leaf leaf-dot"></i><span class="cal-score">${score}</span>` : ''}
            </div>`;
        }
        document.getElementById('calendar-grid').innerHTML = html;
    }

    window.showCalDetail = (key, dayNum) => {
        selectedCalKey = key;
        const logs = fullHistory.filter(h => {
            const d = new Date(h.timestamp);
            const k = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
            return k === key;
        });
        
        const area = document.getElementById('cal-detail-area');
        if (logs.length === 0) { area.style.display = 'none'; return; }
        
        area.style.display = 'block';
        document.getElementById('cal-detail-date').innerText = `${key.replace(/-/g, '/')} の活動記録`;
        document.getElementById('cal-detail-logs').innerHTML = logs.map(l => `・${l.name} (+${l.val})`).join('<br>');
    };

    window.changeMonth = (delta) => { currentCalDate.setMonth(currentCalDate.getMonth() + delta); renderCalendar(); };

    window.openLibrary = () => { renderLibrary(); document.getElementById('library-page').style.display = 'flex'; };
    window.closeLibrary = () => { document.getElementById('library-page').style.display = 'none'; };
    window.renderLibrary = () => {
        const container = document.getElementById('shelf-rows-container'); container.innerHTML = "";
        let row = document.createElement('div'); row.className = 'shelf-row';
        myBooks.forEach((bid, index) => {
            if (index > 0 && index % 12 === 0) { container.appendChild(row); row = document.createElement('div'); row.className = 'shelf-row'; }
            const b = bookMaster.find(x => x.id === bid);
            const spine = document.createElement('div'); spine.className = `book-spine`;
            spine.style.backgroundColor = rarities[b.rare].color; spine.onclick = () => showPanel(b.id);
            row.appendChild(spine);
        });
        container.appendChild(row); document.getElementById('lib-book-count').innerText = myBooks.length;
    };

    window.renderStore = () => {
        const grid = document.getElementById('store-grid'); grid.innerHTML = "";
        bookMaster.forEach(b => {
            const r = rarities[b.rare]; const isBought = myBooks.includes(b.id); const canBuy = myLeaves >= r.price;
            grid.innerHTML += `<div style="background:white; padding:10px; border-radius:15px; border:2px solid ${r.color}; text-align:center;">
                <b style="font-size:0.7rem;">${b.title}</b><br><span style="color:red; font-size:0.8rem;">${r.price}枚</span><br>
                <button onclick="buyBook(${b.id})" style="width:100%; border:none; border-radius:5px; padding:5px; margin-top:5px; background:${canBuy?r.color:'#ccc'}; color:white;" ${isBought||!canBuy?'disabled':''}>${isBought?'所蔵済':'購入'}</button>
            </div>`;
        });
    };
    window.buyBook = async (id) => {
        const b = bookMaster.find(x => x.id === id);
        if(myLeaves >= rarities[b.rare].price) { myLeaves -= rarities[b.rare].price; myBooks.push(id); updateUI(); await sync(); }
    };

    window.switchMode = (m) => {
        currentMode = m; document.getElementById('m-veg').className = m==='veg' ? 'm-btn active' : 'm-btn';
        document.getElementById('m-dish').className = m==='dish' ? 'm-btn active' : 'm-btn';
        const catS = document.getElementById('cat-select'); catS.innerHTML = "";
        if (m === 'veg') { Object.keys(vData).forEach(c => catS.add(new Option(c, c))); }
        else { Object.keys(dData).forEach(c => catS.add(new Option(c, c))); }
        updateItemList();
    };
    window.updateItemList = () => {
        const cat = document.getElementById('cat-select').value; const itemS = document.getElementById('item-select'); itemS.innerHTML = "";
        if (currentMode === 'veg') { vData[cat].forEach(i => itemS.add(new Option(i, i))); }
        else { Object.keys(dData[cat]).forEach(i => itemS.add(new Option(`${i} (+${dData[cat][i]})`, i))); }
    };
    window.showPanel = (id) => {
        let b = bookMaster.find(x => x.id === id);
        document.getElementById('panel-content').innerHTML = `<h3>『${b.title}』</h3><p style="font-size:0.8rem; color:#999;">Rare: ${rarities[b.rare].label}</p><p>${b.desc}</p><button class="rakuten-btn" onclick="window.open('https://hb.afl.rakuten.co.jp/hgc/${RAKUTEN_AFID}/?pc=${encodeURIComponent('https://search.rakuten.co.jp/search/mall/'+b.kw+'/')}')">楽天で探す</button>`;
        document.getElementById('panel').style.display = 'block'; document.getElementById('overlay').style.display = 'block';
    };
    window.closePanel = () => { document.getElementById('panel').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; };

    window.shareTotal = () => {
        const text = `【Leafy Library 司書日誌】\n\n日々の収穫が実を結び、累計はっぱ数が ${myLeaves} 枚に到達しました。🍃\n少しずつ、図書室が緑に染まっていくのを感じます。\n\n#LeafyLibrary #葉もの図書館 #necotastudio`;
        const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(location.href)}`;
        window.open(url, '_blank');
    };

    window.shareLibrary = () => {
        const text = `【Leafy Library 蔵書報告】\n\n現在の蔵書数は ${myBooks.length} 冊。\n静かな棚には、緑の知恵が詰まった本が並んでいます。📖✨\nぜひ、私の図書室へ遊びに来てください。\n\n#LeafyLibrary #葉もの図書館 #necotastudio`;
        const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(location.href)}`;
        window.open(url, '_blank');
    };

    window.shareDaily = () => {
        if (!selectedCalKey) return;
        const logs = fullHistory.filter(h => {
            const d = new Date(h.timestamp);
            return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}` === selectedCalKey;
        });
        const total = logs.reduce((s, l) => s + l.val, 0);
        const names = Array.from(new Set(logs.map(l => l.name))).join('、');
        
        const text = `【Leafy Library 今日の収穫】\n\n${selectedCalKey.replace(/-/g, '/')} は、${names} などを摂取しました。🥬\n本日のはっぱ獲得数：${total} 枚\n\n健やかな一日を、緑とともに。🍃\n#LeafyLibrary #葉もの図書館 #necotastudio`;
        const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(location.href)}`;
        window.open(url, '_blank');
    };

    switchMode('veg');
</script>
</body>
</html>
