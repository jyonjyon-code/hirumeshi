<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>ゆうはんなにしよ | ねこたスタジオ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; text-align: center; background: #eceff1; padding: 15px; color: #333; margin: 0; }
        .card { background: #ffffff; padding: 30px 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: inline-block; width: 100%; max-width: 400px; border: 4px solid #f39c12; margin-top: 10px; box-sizing: border-box; }
        
        h2 { color: #f39c12; margin-bottom: 20px; font-size: 24px; letter-spacing: 1px; font-weight: 900; }
        
        #slot-display { font-size: 80px; margin: 15px 0; min-height: 140px; display: flex; align-items: center; justify-content: center; background: #fff9f0; border-radius: 20px; border: 2px solid #f3e5d0; }
        
        .mode-selector { margin-bottom: 20px; display: flex; justify-content: center; gap: 6px; }
        .mode-btn { border: 2px solid #f39c12; padding: 12px 5px; cursor: pointer; background: white; border-radius: 15px; font-size: 13px; color: #f39c12; font-weight: bold; flex: 1; transition: 0.2s; outline: none; }
        .active-mode { background: #f39c12; color: white; box-shadow: 0 4px 0 #d35400; transform: translateY(-2px); }
        
        #result-area { display: none; background: #fffcf0; border: 2px dashed #f39c12; padding: 20px 15px; border-radius: 20px; margin-top: 20px; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .btn { color: white; border: none; padding: 16px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block; margin-top: 12px; font-size: 16px; width: 100%; box-sizing: border-box; transition: 0.2s; }
        .btn-action { background: #e67e22; box-shadow: 0 5px 0 #d35400; font-size: 18px; }
        .btn-action:active { transform: translateY(3px); box-shadow: 0 2px 0 #d35400; }
        
        .btn-rakuten { background: #bf0000; font-size: 14px; }
        .btn-search { background: #3498db; font-size: 15px; }
        .btn-retry { background: #95a5a6; font-size: 14px; padding: 10px; margin-top: 20px; }
        .btn-x { background: #000; }
        
        .studio-nav { margin-top: 25px; border-top: 1px solid #ddd; padding-top: 20px; }
        .btn-back { color: #888; text-decoration: none; font-size: 13px; display: inline-block; margin-bottom: 15px; font-weight: bold; }
        .sns-group { display: flex; gap: 10px; }
        .btn-sns { color: white; border: none; padding: 12px; border-radius: 50px; cursor: pointer; font-weight: bold; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 13px; flex: 1; }
        .btn-x { background: #000; }
        .btn-insta { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        
        #hint { font-size: 13px; color: #7f8c8d; margin-top: 12px; line-height: 1.5; }
        #food-desc { font-size: 14px; color: #555; margin-bottom: 15px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="card">
    <h2>ゆうはんなにしよ</h2>
    
    <div class="mode-selector">
        <button id="cook-btn" class="mode-btn active-mode" onclick="setMode('cook')">自炊する</button>
        <button id="buy-btn" class="mode-btn" onclick="setMode('buy')">買ってくる</button>
        <button id="out-btn" class="mode-btn" onclick="setMode('out')">外食する</button>
    </div>

    <div id="slot-display">🍳</div>
    
    <button id="start-btn" class="btn btn-action" onclick="startSlot()">メニューを決める！</button>
    <p id="hint">今夜の気分を選んで<br>ボタンを押してね！</p>
    
    <div id="result-area">
        <div style="font-size: 12px; color: #f39c12; font-weight: bold; margin-bottom: 5px;">今夜のメニューは…</div>
        <h2 id="food-result" style="margin: 0 0 10px; font-size: 30px; color: #e67e22;"></h2>
        <p id="food-desc"></p>
        
        <a id="action-link" class="btn btn-search" target="_blank"></a>
        <a id="rakuten-link" class="btn btn-rakuten" target="_blank" rel="nofollow sponsored noopener"></a>
        
        <a id="x-share-btn" class="btn btn-x" target="_blank" style="margin-top: 20px;">
            <i class="fa-brands fa-x-twitter"></i> 結果を報告する
        </a>
        
        <button class="btn btn-retry" onclick="reset()">もういちど決める</button>
    </div>

    <div class="studio-nav">
        <a href="index.html" class="btn-back"><i class="fa-solid fa-house"></i> ねこたスタジオへ戻る</a>
        <div class="sns-group">
            <a href="https://x.com/necotatu2" target="_blank" class="btn-sns btn-x">
                <i class="fa-brands fa-x-twitter"></i> 公式X
            </a>
            <a href="https://www.instagram.com/necotastudio" target="_blank" class="btn-sns btn-insta">
                <i class="fa-brands fa-instagram"></i> 公式Insta
            </a>
        </div>
    </div>
</div>

<script>
    const RAKUTEN_AFID = "51366796.8818598a.51366797.ddbb51d0"; 
    // ★独自ドメインに変更
    const APP_URL = "https://necotastudio.com/yuhan.html"; 
    let currentMode = 'cook';
    const emojis = ["🍳", "🍱", "🍕", "🍜", "🍛", "🥘", "🍖", "🥗", "🍣", "🍔", "🍝", "🥟"];
    
    const menuData = {
        cook: [
            { name: "ハンバーグ", keyword: "ハンバーグ", desc: "ふっくらジューシーに<br>焼いちゃおう！" },
            { name: "生姜焼き", keyword: "生姜焼き", desc: "ご飯がすすむ<br>最強の定番メニュー！" },
            { name: "麻婆豆腐", keyword: "麻婆豆腐", desc: "ピリ辛ミンチで<br>スタミナアップ！" },
            { name: "カルボナーラ", keyword: "カルボナーラ", desc: "卵とチーズのコクで<br>リッチな気分に。" },
            { name: "オムライス", keyword: "オムライス", desc: "ケチャップで可愛く<br>メッセージを書く？" },
            { name: "親子丼", keyword: "親子丼", desc: "とろとろ卵と鶏肉の<br>優しいハーモニー。" },
            { name: "チャーハン", keyword: "チャーハン", desc: "強火で一気に！<br>パラパラを目指して。" },
            { name: "お好み焼き", keyword: "お好み焼き", desc: "キャベツたっぷりで<br>ヘルシー＆お腹いっぱいに！" },
            { name: "回鍋肉", keyword: "回鍋肉", desc: "甘辛い味噌で<br>野菜もモリモリ食べよう！" }
        ],
        buy: [
            { name: "お惣菜盛り合わせ", keyword: "スーパー お惣菜", desc: "スーパーの特売品を<br>賢くゲットしよう！" },
            { name: "デリバリーピザ", keyword: "ピザ 宅配", desc: "たまには楽して<br>おうちパーティー気分。" },
            { name: "お寿司パック", keyword: "スーパー 寿司", desc: "今日もお疲れ様。<br>ご褒美にお寿司はどう？" },
            { name: "冷凍餃子", keyword: "冷凍 餃子", desc: "今の冷凍食品は<br>プロ級の美味しさ！" },
            { name: "コンビニ弁当", keyword: "コンビニ 弁当", desc: "手軽さNo.1！<br>新作があるかチェック。" },
            { name: "ほか弁", keyword: "弁当屋", desc: "注文してから作る<br>温かさが嬉しい。" },
            { name: "フライドチキン", keyword: "ケンタッキー", desc: "無性に食べたくなる！<br>今夜はジャンキーに。" },
            { name: "牛丼テイクアウト", keyword: "牛丼", desc: "早くて旨い！<br>つゆだくにする？" }
        ],
        out: [
            { name: "焼肉", keyword: "焼肉", desc: "パワー全開！<br>お肉を食べて元気になろう。" },
            { name: "ラーメン", keyword: "ラーメン", desc: "こだわりの一杯を<br>探しに行こう！" },
            { name: "ファミレス", keyword: "ファミレス", desc: "メニューが豊富！<br>今の気分で選んじゃおう。" },
            { name: "イタリアン", keyword: "イタリアン", desc: "おしゃれな空間で<br>ゆっくりディナー。" },
            { name: "回転寿司", keyword: "回転寿司", desc: "好きなネタを<br>好きなだけ楽しもう！" },
            { name: "しゃぶしゃぶ", keyword: "しゃぶしゃぶ", desc: "お肉も野菜もたっぷり！<br>ヘルシーに大満足。" },
            { name: "居酒屋ごはん", keyword: "居酒屋", desc: "おつまみ系を並べて<br>楽しく夕飯タイム！" },
            { name: "とんかつ屋", keyword: "とんかつ", desc: "サクサクの衣と<br>ジューシーな豚肉！" }
        ]
    };

    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active-mode'));
        document.getElementById(mode + '-btn').classList.add('active-mode');
        reset();
    }

    function startSlot() {
        const display = document.getElementById('slot-display');
        const startBtn = document.getElementById('start-btn');
        startBtn.style.display = 'none';
        let count = 0;
        const timer = setInterval(() => {
            display.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            count++;
            if (count > 12) {
                clearInterval(timer);
                showResult();
            }
        }, 100);
    }

    function showResult() {
        const list = menuData[currentMode];
        const res = list[Math.floor(Math.random() * list.length)];
        
        document.getElementById('slot-display').style.display = 'none';
        document.getElementById('hint').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        
        document.getElementById('food-result').innerText = res.name;
        document.getElementById('food-desc').innerHTML = res.desc;

        const actionLink = document.getElementById('action-link');
        
        if (currentMode === 'cook') {
            actionLink.innerText = "🍳 レシピを検索する";
            actionLink.href = "https://www.google.com/search?q=" + encodeURIComponent(res.name + " レシピ");
        } else if (currentMode === 'buy') {
            actionLink.innerText = "🛒 近くの買えるお店を探す";
            actionLink.href = "https://www.google.com/maps/search/" + encodeURIComponent(res.keyword);
        } else if (currentMode === 'out') {
            actionLink.innerText = "🍴 近くの食べられるお店";
            actionLink.href = "https://www.google.com/maps/search/" + encodeURIComponent(res.name);
        }

        const rakutenLink = document.getElementById('rakuten-link');
        const rakutenKeyword = res.name + (currentMode === 'cook' ? " 材料" : " お取り寄せ");
        rakutenLink.href = "https://hb.afl.rakuten.co.jp/hgc/" + RAKUTEN_AFID + "/?pc=" + encodeURIComponent("https://search.rakuten.co.jp/search/mall/" + rakutenKeyword + "/");
        rakutenLink.innerText = `🎁 ${res.name} を楽天で探す`;

        const modeText = currentMode === 'cook' ? '自炊' : currentMode === 'buy' ? '買い出し' : '外食';
        
        // ★Xシェアテキストの改行とフォーマットを修正
        const tweetText = encodeURIComponent(
            `今夜の夕食は…\n` +
            `【 ${res.name} 】に決定！\n\n` +
            `（${modeText}モードで選びました🍴）\n\n` +
            `#ゆうはんなにしよ #ねこたスタジオ`
        );
        document.getElementById('x-share-btn').href = `https://twitter.com/intent/tweet?text=${tweetText}&url=${encodeURIComponent(APP_URL)}`;
    }

    function reset() {
        document.getElementById('result-area').style.display = 'none';
        document.getElementById('slot-display').style.display = 'flex';
        document.getElementById('slot-display').innerText = "🍳";
        document.getElementById('start-btn').style.display = 'inline-block';
        document.getElementById('hint').style.display = 'block';
    }
</script>
</body>
</html>
