<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ゆうはんなにしよ | ねこたスタジオ</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6LK2VK60B1"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-6LK2VK60B1');
    </script>

    <meta name="description" content="献立スロットで今日の夕飯を提案！『ゆうはんなにしよ』は、自炊・買い出し・外食の3モードから今夜のメニューを決定するアプリです。レシピ検索やデリバリー、店舗検索もスムーズにサポート。">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; text-align: center; background: #eceff1; padding: 15px; color: #333; margin: 0; }
        .card { background: #ffffff; padding: 30px 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: inline-block; width: 100%; max-width: 400px; border: 4px solid #f39c12; margin-top: 10px; box-sizing: border-box; position: relative; }
        h2 { color: #f39c12; margin-bottom: 20px; font-size: 24px; letter-spacing: 1px; font-weight: 900; }
        #slot-display { font-size: 80px; margin: 15px 0; min-height: 140px; display: flex; align-items: center; justify-content: center; background: #fff9f0; border-radius: 20px; border: 2px solid #f3e5d0; }
        .mode-selector { margin-bottom: 20px; display: flex; justify-content: center; gap: 6px; }
        .mode-btn { border: 2px solid #f39c12; padding: 12px 5px; cursor: pointer; background: white; border-radius: 15px; font-size: 13px; color: #f39c12; font-weight: bold; flex: 1; transition: 0.2s; outline: none; }
        .active-mode { background: #f39c12; color: white; box-shadow: 0 4px 0 #d35400; transform: translateY(-2px); }
        #result-area { display: none; background: #fffcf0; border: 2px dashed #f39c12; padding: 20px 15px; border-radius: 20px; margin-top: 20px; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn { color: white; border: none; padding: 16px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block; margin-top: 12px; font-size: 16px; width: 100%; box-sizing: border-box; transition: 0.2s; }
        .btn-action { background: #e67e22; box-shadow: 0 5px 0 #d35400; font-size: 18px; }
        .btn-search { background: #3498db; }
        .btn-oisix { background: #769500; }
        .btn-demae { background: #ff3300; } /* 出前館カラー */
        .btn-retry { background: #95a5a6; }
        .btn-x { background: #000; }
        .btn-copy { background: #E1306C; }
        .studio-nav { margin-top: 25px; border-top: 1px solid #ddd; padding-top: 20px; width: 100%; }
        .btn-back { background: #888; color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block; font-size: 14px; margin-bottom: 15px; width: 100%; box-sizing: border-box; }
        .sns-group { display: flex; gap: 10px; }
        .btn-sns { color: white; border: none; padding: 12px; border-radius: 50px; cursor: pointer; font-weight: bold; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 13px; flex: 1; }
        .btn-insta { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .promo-tag { font-size: 10px; color: #999; margin: 20px 0 5px 0; text-align: center; }
        .ad-note { font-size: 10px; color: #aaa; margin-top: 10px; line-height: 1.4; text-align: center; background: #fff; padding: 8px; border-radius: 8px; border: 1px solid #eee; }
        .ad-banner-area { margin-top: 12px; min-height: 60px; display: flex; justify-content: center; align-items: center; }

        #help-trigger { position: absolute; right: 15px; top: 15px; cursor: pointer; background: #f39c12; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #help-popup { display: none; position: absolute; top: 50px; right: 10px; width: 260px; background: white; border: 2px solid #f39c12; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 1000; padding: 15px; text-align: left; font-size: 13px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="card">
    <div id="help-trigger" onclick="toggleHelp()"><i class="fas fa-question"></i></div>
    <div id="help-popup">
        <p style="margin-top:0;">🌃 <b>使いかたの手引き</b></p>
        <ul style="padding-left: 18px; margin: 0;">
            <li><b>モード選択：</b>「自炊」「買う」「外食」を選びます。</li>
            <li><b>メニュー決定：</b>ボタンを押すとスロットが回ります。</li>
            <li><b>お店探し：</b>外食モードなら食べログで人気店をチェック！</li>
        </ul>
        <button onclick="toggleHelp()" style="margin-top:12px; width:100%; border:none; background:#f39c12; color:white; padding:5px; border-radius:10px; cursor:pointer; font-weight:bold;">わかった！</button>
    </div>

    <h2>ゆうはんなにしよ</h2>
    
    <div class="mode-selector">
        <button id="cook-btn" class="mode-btn active-mode" onclick="setMode('cook')">自炊する</button>
        <button id="buy-btn" class="mode-btn" onclick="setMode('buy')">買ってくる</button>
        <button id="out-btn" class="mode-btn" onclick="setMode('out')">外食する</button>
    </div>

    <div id="main-view">
        <div id="slot-display">🍳</div>
        <button id="start-btn" class="btn btn-action" onclick="startSlot()">メニューを決める！</button>
    </div>
    
    <div id="result-area">
        <div style="font-size: 12px; color: #f39c12; font-weight: bold; margin-bottom: 5px;">今夜のメニューは…</div>
        <h2 id="food-result" style="margin: 0 0 10px; font-size: 30px; color: #e67e22;"></h2>
        <p id="food-desc"></p>
        
        <a id="action-link" class="btn btn-search" target="_blank" rel="noopener noreferrer"></a>

        <div id="ad-section">
            <p class="promo-tag">本ページはプロモーションが含まれています</p>
            
            <div id="demae-content" style="display: none;">
                <a href="https://px.a8.net/svt/ejp?a8mat=4B3K2L+2BCPGY+5W08+5ZEMP" class="btn btn-demae" target="_blank" rel="nofollow noopener">
                    <i class="fas fa-motorcycle"></i> 出前館で探す
                    <img border="0" width="1" height="1" src="https://www17.a8.net/0.gif?a8mat=4B3K2L+2BCPGY+5W08+5ZEMP" alt="">
                </a>
            </div>

            <a id="oisix-link" class="btn btn-oisix" target="_blank" rel="nofollow sponsored noopener" style="display: none;">
                <i class="fa-solid fa-leaf"></i> 買い物不要！Oisixでお試し
            </a>

            <div id="tabelog-ad-content" class="ad-banner-area" style="display: none;">
                <script language="javascript" src="//ad.jp.ap.valuecommerce.com/servlet/jsbanner?sid=3767676&pid=892607567"></script>
                <noscript><a href="//ck.jp.ap.valuecommerce.com/servlet/referral?sid=3767676&pid=892607567" rel="nofollow"><img src="//ad.jp.ap.valuecommerce.com/servlet/gifbanner?sid=3767676&pid=892607567" border="0"></a></noscript>
            </div>

            <div class="ad-note">
                ※コンテンツ内容は「ねこたスタジオ」の独自判断に基づき制作されています。
            </div>
        </div>

        <div style="display: flex; gap: 8px; margin-top: 12px;">
            <a id="x-share-btn" class="btn btn-x" target="_blank" style="margin-top: 0; flex: 1;">
                <i class="fa-brands fa-x-twitter"></i> 報告
            </a>
            <button id="copy-btn" class="btn btn-copy" onclick="copyResult()" style="margin-top: 0; flex: 1;">
                <i class="fas fa-copy"></i> 結果をコピー
            </button>
        </div>

        <button class="btn btn-retry" onclick="reset()">
            <i class="fas fa-redo"></i> もういちど引く
        </button>
    </div>

    <div class="studio-nav">
        <a href="index.html" class="btn-back">ねこたスタジオへ戻る</a>
        <div class="sns-group">
            <a href="https://x.com/necotatu2" target="_blank" class="btn-sns btn-x">公式X</a>
            <a href="https://www.instagram.com/necotastudio" target="_blank" class="btn-sns btn-insta">公式Insta</a>
        </div>
    </div>
</div>

<script>
    const APP_URL = "https://necotastudio.com/yuhan.html"; 

    let currentMode = 'cook';
    const emojis = ["🍳", "🍱", "🍕", "🍜", "🍛", "🥘", "🍖", "🥗", "🍣", "🍔", "🍝", "🥟"];
    
    function toggleHelp() {
        const popup = document.getElementById('help-popup');
        popup.style.display = (popup.style.display === 'block') ? 'none' : 'block';
    }

    const menuData = {
        cook: [
            { name: "ハンバーグ", desc: "ふっくらジューシーに<br>焼いちゃおう！" },
            { name: "生姜焼き", desc: "ご飯がすすむ<br>最強の定番メニュー！" },
            { name: "麻婆豆腐", desc: "ピリ辛ミンチで<br>スタミナアップ！" }
        ],
        buy: [
            { name: "お惣菜", keyword: "スーパー お惣菜", desc: "スーパーの特売品を<br>賢くゲットしよう！" },
            { name: "デリバリーピザ", keyword: "ピザ 宅配", desc: "たまには楽して<br>パーティー気分。" }
        ],
        out: [
            { name: "焼肉", keyword: "焼肉", desc: "パワー全開！<br>お肉を食べて元気になろう。" },
            { name: "ラーメン", keyword: "ラーメン", desc: "こだわりの一杯を<br>探しに行こう！" },
            { name: "寿司", keyword: "回転寿司", desc: "好きなネタを<br>好きなだけ楽しもう！" }
        ]
    };

    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active-mode'));
        document.getElementById(mode + '-btn').classList.add('active-mode');
        reset();
    }

    function startSlot() {
        const display = document.getElementById('slot-display');
        document.getElementById('start-btn').style.visibility = 'hidden';
        let count = 0;
        const timer = setInterval(() => {
            display.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            count++;
            if (count > 12) {
                clearInterval(timer);
                showResult();
            }
        }, 65);
    }

    function showResult() {
        const list = menuData[currentMode];
        const res = list[Math.floor(Math.random() * list.length)];
        
        document.getElementById('main-view').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        document.getElementById('food-result').innerText = res.name;
        document.getElementById('food-desc').innerHTML = res.desc;

        const actionLink = document.getElementById('action-link');
        const oisixLink = document.getElementById('oisix-link');
        const demaeContent = document.getElementById('demae-content');
        const tabelogContent = document.getElementById('tabelog-ad-content');

        if (currentMode === 'cook') {
            actionLink.innerHTML = '<i class="fas fa-utensils"></i> レシピを検索する';
            actionLink.href = "https://www.google.com/search?q=" + encodeURIComponent(res.name + " レシピ");
            oisixLink.style.display = 'inline-block';
            demaeContent.style.display = 'none';
            tabelogContent.style.display = 'none';
        } else if (currentMode === 'buy') {
            actionLink.innerHTML = '<i class="fas fa-shopping-cart"></i> 近くの買えるお店';
            actionLink.href = "https://www.google.com/maps/search/" + encodeURIComponent(res.keyword);
            oisixLink.style.display = 'none';
            demaeContent.style.display = 'block';
            tabelogContent.style.display = 'none';
        } else if (currentMode === 'out') {
            actionLink.innerHTML = '<i class="fas fa-map-marker-alt"></i> 近くのお店を地図で見る';
            actionLink.href = "https://www.google.com/maps/search/" + encodeURIComponent(res.name);
            oisixLink.style.display = 'none';
            demaeContent.style.display = 'none';
            tabelogContent.style.display = 'flex';
        }

        const tweetText = encodeURIComponent(`今夜の夕食は…\n【 ${res.name} 】に決定！\n\n#ゆうはんなにしよ #ねこたスタジオ`);
        document.getElementById('x-share-btn').href = `https://twitter.com/intent/tweet?text=${tweetText}&url=${encodeURIComponent(APP_URL)}`;
        
        document.getElementById('copy-btn').innerHTML = '<i class="fas fa-copy"></i> 結果をコピー';
    }

    function copyResult() {
        const food = document.getElementById('food-result').innerText;
        const shareText = `今夜の夕食は【 ${food} 】に決定！✨\n#ゆうはんなにしよ\n${APP_URL}`;
        
        navigator.clipboard.writeText(shareText).then(() => {
            const btn = document.getElementById('copy-btn');
            btn.innerHTML = '<i class="fas fa-check"></i> コピー完了！';
            setTimeout(() => {
                btn.innerHTML = '<i class="fas fa-copy"></i> 結果をコピー';
            }, 2000);
        });
    }

    function reset() {
        document.getElementById('result-area').style.display = 'none';
        document.getElementById('main-view').style.display = 'block';
        document.getElementById('start-btn').style.visibility = 'visible';
        document.getElementById('slot-display').innerText = currentMode === 'cook' ? "🍳" : currentMode === 'buy' ? "🍱" : "🍴";
    }
</script>
</body>
</html>
