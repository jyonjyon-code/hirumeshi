<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JUICY RIDER | necotastudio</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Noto+Sans+JP:wght@900&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --comic-yellow: #ffde00; --comic-red: #e60012; --comic-blue: #00acee; --black: #000; }
        body { background: #ddd; background-image: radial-gradient(var(--black) 10%, transparent 11%); background-size: 15px 15px; font-family: 'Noto Sans JP', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .app-card { background: white; border: 6px solid var(--black); width: 100%; max-width: 450px; box-shadow: 12px 12px 0px var(--black); overflow: hidden; position: relative; min-height: 550px; }
        
        /* ログイン */
        #login-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; padding: 20px; box-sizing: border-box; }
        
        /* ヘッダー */
        .header { background: var(--comic-yellow); border-bottom: 6px solid var(--black); padding: 15px; display: flex; align-items: center; gap: 15px; }
        .user-icon { width: 65px; height: 65px; border: 4px solid var(--black); background: white; box-shadow: 4px 4px 0 var(--black); object-fit: cover; border-radius: 50%; }
        h1 { font-family: 'Bangers', cursive; font-size: 42px; color: var(--comic-red); -webkit-text-stroke: 1.5px var(--black); margin: 0; transform: rotate(-2deg); line-height: 1; }
        .sub-title { font-size: 14px; font-weight: 900; color: var(--black); margin-top: 5px; }

        /* タブ */
        .tab-menu { display: flex; background: var(--black); border-bottom: 4px solid var(--black); }
        .tab-btn { flex: 1; padding: 14px; color: #888; background: #222; border: none; font-weight: 900; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .tab-btn.active { background: white; color: var(--black); }

        /* パネル */
        .content-panel { display: none; padding: 20px; }
        .content-panel.active { display: block; }
        
        .engine-panel { background: #111; color: #00ff00; padding: 12px; font-family: 'Courier New', monospace; font-size: 13px; border: 4px solid var(--black); text-align: center; margin-bottom: 10px; box-shadow: inset 0 0 10px #00ff0033; }
        .status-bar { background: var(--black); color: white; padding: 12px 15px; display: flex; justify-content: space-between; font-size: 16px; font-weight: 900; margin-bottom: 10px; }
        #progress-container { height: 15px; background: #333; border: 4px solid var(--black); margin-bottom: 20px; position: relative; }
        #progress-fill { height: 100%; background: var(--comic-red); width: 0%; transition: width 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        .btn-map { background: var(--comic-blue); color: white; border: 4px solid var(--black); padding: 12px; width: 100%; font-weight: 900; cursor: pointer; box-shadow: 4px 4px 0 var(--black); margin-bottom: 20px; font-size: 15px; }
        .input-row { display: flex; gap: 8px; align-items: center; margin-bottom: 15px; }
        select, input { border: 4px solid var(--black); padding: 12px; font-size: 18px; font-weight: 900; outline: none; border-radius: 0; }
        select { flex: 2; background: #fffceb; }
        input[type="number"] { width: 85px; text-align: center; }
        
        .btn-load { background: var(--comic-red); color: white; border: 4px solid var(--black); padding: 20px 10px; font-family: 'Noto Sans JP', sans-serif; font-weight: 900; font-size: 22px; width: 100%; cursor: pointer; box-shadow: 6px 6px 0 var(--black); transition: 0.1s; }
        .btn-load:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0 var(--black); }
        .btn-load small { display: block; font-family: 'Bangers'; font-size: 16px; opacity: 0.8; letter-spacing: 1px; }

        /* 履歴リスト */
        .history-item { background: white; border: 4px solid var(--black); margin-bottom: 10px; padding: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 5px 5px 0 #bbb; }
        .history-info { display: flex; flex-direction: column; }
        .history-date { font-size: 10px; color: #777; font-weight: bold; }
        .history-fruit { font-weight: 900; font-size: 16px; margin-top: 2px; }
        .delete-btn { background: #fff; border: 3px solid var(--black); width: 32px; height: 32px; cursor: pointer; font-weight: 900; color: var(--comic-red); display: flex; align-items: center; justify-content: center; }

        #alert-box { display: none; background: var(--comic-red); color: white; padding: 12px; border: 4px solid var(--black); font-weight: 900; text-align: center; margin-bottom: 15px; animation: blink 0.6s infinite; font-size: 14px; }
        @keyframes blink { 0%, 100% { transform: scale(1); } 50% { transform: scale(0.98); opacity: 0.8; } }
    </style>
</head>
<body>

<div class="app-card">
    <div id="login-overlay">
        <h2 style="font-family: 'Bangers'; font-size: 55px; color: var(--comic-yellow); -webkit-text-stroke: 1.5px #000; margin-bottom: 10px;">READY TO RIDE?</h2>
        <p style="font-weight: 900; margin-bottom: 30px; line-height: 1.6;">給油データを保存するために<br>Googleでログインしてください</p>
        <div id="g_id_onload"
             data-client_id="1093173509944-ssn8tds7tgcb0r1i5lv1ir5lnk311dvv.apps.googleusercontent.com"
             data-callback="handleCredentialResponse"
             data-auto_select="true">
        </div>
        <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="filled_blue" data-size="large"></div>
    </div>

    <div class="header">
        <img id="user-img" src="juicy.png" alt="ICON" class="user-icon" onerror="this.src='https://placehold.jp/65x65.png'">
        <div>
            <h1>JUICY RIDER</h1>
            <div class="sub-title" id="user-name-display">GUEST RIDER</div>
        </div>
    </div>

    <div class="tab-menu">
        <button class="tab-btn active" id="btn-tab-main" onclick="switchTab('main')">COCKPIT</button>
        <button class="tab-btn" id="btn-tab-history" onclick="switchTab('history')">FUEL LOG</button>
    </div>

    <div id="panel-main" class="content-panel active">
        <div class="engine-panel">
            <span id="engine-name" style="font-size: 20px; color: var(--comic-yellow); display: block; font-weight:900;">50cc MOPED</span>
            <span id="engine-status">STATUS: STANDBY</span>
        </div>
        <div class="status-bar">
            <span>ODO: <span id="dist-val">0.0</span> km</span>
            <span>TODAY: <span id="today-val">0</span> / 200g</span>
        </div>
        <div id="progress-container"><div id="progress-fill"></div></div>
        
        <button class="btn-map" onclick="openMap()">🗺️ 現在地をGoogleマップで確認</button>
        <div id="alert-box">⚠️ OVER-EATING WARNING! (200g OVER)</div>
        
        <div class="input-row">
            <select id="fruit-select" onchange="updateUnitUI()">
                <option value="オレンジ">オレンジ</option>
                <option value="リンゴ">リンゴ</option>
                <option value="ドラゴンフルーツ">ドラゴンフルーツ</option>
                <option value="ドリアン">ドリアン</option>
                <option value="マンゴスチン">マンゴスチン</option>
                <option value="100%ジュース">100%ジュース</option>
            </select>
            <input type="number" id="amount-in" value="1.0" step="0.1" min="0.1">
            <span id="unit-label" style="font-weight: 900; min-width: 35px;">個</span>
        </div>
        <button class="btn-load" onclick="handleLoad()">
            果汁×荷重システム START!
            <small>CALCULATE & IGNITION</small>
        </button>
    </div>

    <div id="panel-history" class="content-panel">
        <div style="font-weight: 900; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border-left: 8px solid var(--comic-red); padding-left: 10px;">
            <span>⛽️ 給油履歴 (FUEL LOG)</span>
            <span id="save-status" style="font-size: 10px; font-weight: normal; color: #888;">Ready</span>
        </div>
        <div id="history-list"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyA7pcr0G4qEx0yLNWueZPdaeQoEBjFuoic", 
        authDomain: "necotastudio-app.firebaseapp.com", 
        projectId: "necotastudio-app", 
        storageBucket: "necotastudio-app.firebasestorage.app", 
        messagingSenderId: "1093173509944", 
        appId: "1:1093173509944:web:5340935ddffdd49628cbcd" 
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let totalDist = parseFloat(localStorage.getItem('juicy_odo')) || 0;
    let todayGrams = 0;
    let history = JSON.parse(localStorage.getItem('juicy_history')) || [];
    let currentUid = null;
    const LIMIT = 200;

    const fruitDB = {
        "オレンジ": { weight: 150, rare: 0.8 },
        "リンゴ": { weight: 300, rare: 0.9 },
        "ドラゴンフルーツ": { weight: 400, rare: 1.5 },
        "ドリアン": { weight: 300, rare: 2.5 },
        "マンゴスチン": { weight: 50, rare: 1.4 },
        "100%ジュース": { weight: 1, rare: 1.0, isLiquid: true }
    };

    window.switchTab = (tab) => {
        document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`panel-${tab}`).classList.add('active');
        document.getElementById(`btn-tab-${tab}`).classList.add('active');
    };

    window.handleCredentialResponse = async (response) => {
        try {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            currentUid = payload.sub; 
            document.getElementById('user-name-display').innerText = payload.name.toUpperCase();
            document.getElementById('user-img').src = payload.picture;
            document.getElementById('login-overlay').style.display = 'none';
            
            const docSnap = await getDoc(doc(db, "juicy_rider", currentUid));
            if (docSnap.exists()) {
                const cloudData = docSnap.data();
                totalDist = cloudData.odo ?? totalDist;
                history = cloudData.history ?? history;
            }
            updateUI();
        } catch (e) { console.error("Login Error:", e); }
    };

    window.updateUnitUI = () => {
        const name = document.getElementById('fruit-select').value;
        document.getElementById('unit-label').innerText = fruitDB[name].isLiquid ? "ml" : "個";
    };

    window.handleLoad = async () => {
        const name = document.getElementById('fruit-select').value;
        const amount = parseFloat(document.getElementById('amount-in').value);
        if (!amount || amount <= 0) return;
        const data = fruitDB[name];
        const grams = data.isLiquid ? amount : (amount * data.weight);

        const boost = totalDist >= 200 ? 2.0 : (totalDist >= 50 ? 1.3 : 1.0);
        const addKM = (grams * data.rare / 10) * boost;
        totalDist += addKM;

        history.unshift({ 
            id: Date.now(),
            date: new Date().toLocaleDateString(),
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}), 
            name: name, amount: amount, grams: grams,
            unit: data.isLiquid ? "ml" : "個", km: addKM.toFixed(1) 
        });
        
        if(history.length > 50) history.pop();
        updateUI();
        saveAll();
    };

    window.deleteItem = (id) => {
        if(!confirm("この記録を削除しますか？\n走行距離も自動で差し引かれます。")) return;
        const index = history.findIndex(item => item.id === id);
        if (index > -1) {
            totalDist = Math.max(0, totalDist - parseFloat(history[index].km));
            history.splice(index, 1);
            updateUI();
            saveAll();
        }
    };

    function updateUI() {
        const todayStr = new Date().toLocaleDateString();
        todayGrams = history
            .filter(item => item.date === todayStr)
            .reduce((sum, item) => sum + item.grams, 0);

        document.getElementById('dist-val').innerText = totalDist.toFixed(1);
        document.getElementById('today-val').innerText = Math.round(todayGrams);
        document.getElementById('alert-box').style.display = todayGrams > LIMIT ? 'block' : 'none';
        
        const engineName = totalDist >= 200 ? "1200cc MONSTER" : (totalDist >= 50 ? "250cc STREET" : "50cc MOPED");
        document.getElementById('engine-name').innerText = engineName;
        document.getElementById('progress-fill').style.width = Math.min((totalDist / 500) * 100, 100) + "%";

        document.getElementById('history-list').innerHTML = history.map(item => `
            <div class="history-item">
                <div class="history-info">
                    <span class="history-date">${item.date} ${item.time}</span>
                    <span class="history-fruit">${item.name} ${item.amount}${item.unit}</span>
                </div>
                <div style="display:flex; align-items:center; gap:12px;">
                    <span style="color:var(--comic-red); font-weight:900; font-size:18px;">+${item.km}<small style="font-size:10px">km</small></span>
                    <button class="delete-btn" onclick="deleteItem(${item.id})">×</button>
                </div>
            </div>
        `).join('');
    }

    async function saveAll() {
        localStorage.setItem('juicy_odo', totalDist);
        localStorage.setItem('juicy_history', JSON.stringify(history));
        if (currentUid) {
            document.getElementById('save-status').innerText = "Syncing...";
            await setDoc(doc(db, "juicy_rider", currentUid), {
                odo: totalDist, history: history
            }, { merge: true });
            document.getElementById('save-status').innerText = "Cloud Saved";
        }
    }

    window.openMap = () => {
        const currentLng = 139.7744 - (totalDist / 90); 
        window.open(`https://www.google.com/maps/@35.6839,${currentLng},15z`, '_blank');
    };

    updateUI();
</script>
</body>
</html>
