<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JUICY RIDER | necotastudio</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Noto+Sans+JP:wght@900&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --comic-yellow: #ffde00; --comic-red: #e60012; --black: #000; --neon-green: #00ff00; }
        body { background: #ddd; background-image: radial-gradient(var(--black) 10%, transparent 11%); background-size: 15px 15px; font-family: 'Noto Sans JP', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .app-card { background: white; border: 6px solid var(--black); width: 100%; max-width: 450px; box-shadow: 12px 12px 0px var(--black); overflow: hidden; position: relative; min-height: 700px; display: flex; flex-direction: column; }
        
        #login-banner { background: var(--black); color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; z-index: 100; }
        .login-btn-small { transform: scale(0.8); transform-origin: right; }

        .header { background: var(--comic-yellow); border-bottom: 6px solid var(--black); padding: 15px; display: flex; align-items: center; gap: 10px; }
        .back-btn { background: var(--black); color: white; border: 2px solid white; padding: 6px 12px; font-size: 12px; font-weight: 900; cursor: pointer; text-decoration: none; border-radius: 4px; }
        .user-icon { width: 55px; height: 55px; border: 3px solid var(--black); background: white; border-radius: 50%; object-fit: cover; }
        h1 { font-family: 'Bangers', cursive; font-size: 42px; color: var(--comic-red); -webkit-text-stroke: 1.5px var(--black); margin: 0; transform: rotate(-1deg); flex-grow: 1; text-align: center; }

        .tab-menu { display: flex; background: var(--black); }
        .tab-btn { flex: 1; padding: 14px; color: #888; background: #222; border: none; font-weight: 900; cursor: pointer; }
        .tab-btn.active { background: white; color: var(--black); }
        .content-panel { display: none; padding: 15px; flex-grow: 1; overflow-y: auto; }
        .content-panel.active { display: block; }

        #map-container { height: 180px; border: 4px solid var(--black); margin-bottom: 10px; background: #eee; }
        #map-iframe { width: 100%; height: 100%; border: 0; }

        .engine-panel { background: #111; color: var(--neon-green); padding: 12px; font-family: 'Courier New', monospace; border: 3px solid var(--black); text-align: center; position: relative; }
        .goal-info { border-top: 1px dashed var(--neon-green); margin-top: 8px; padding-top: 8px; font-size: 11px; color: var(--comic-yellow); }
        
        .guest-warning { background: #440000; color: #ff0000; font-size: 10px; font-weight: 900; padding: 5px; text-align: center; border: 3px solid var(--black); border-top: none; margin-bottom: 10px; }
        .status-bar { background: var(--black); color: white; padding: 12px; display: flex; justify-content: space-between; font-size: 14px; font-weight: 900; }
        #progress-container { height: 15px; background: #333; border: 3px solid var(--black); margin-bottom: 10px; }
        #progress-fill { height: 100%; background: var(--comic-red); width: 0%; transition: width 0.8s; }

        .fruit-select { width: 100%; border: 4px solid var(--black); padding: 12px; font-size: 18px; font-weight: 900; background: #fffceb; margin-bottom: 15px; cursor: pointer; }
        .btn-load { background: var(--comic-red); color: white; border: 4px solid var(--black); padding: 15px; font-weight: 900; font-size: 22px; width: 100%; cursor: pointer; box-shadow: 6px 6px 0 var(--black); }
        .history-item { background: white; border: 3px solid var(--black); margin-bottom: 8px; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { background: #eee; border: 2px solid var(--black); width: 30px; height: 30px; cursor: pointer; color: var(--comic-red); font-weight: 900; }
    </style>
</head>
<body>

<div class="app-card">
    <div id="login-banner">
        <span id="sync-status">☁️ CLOUD SYNC: OFF</span>
        <div id="g_id_onload" data-client_id="1093173509944-ssn8tds7tgcb0r1i5lv1ir5lnk311dvv.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
        <div class="g_id_signin login-btn-small" data-type="standard" data-size="small"></div>
    </div>

    <div class="header">
        <a href="https://necotastudio.github.io" class="back-btn">BACK</a>
        <h1>JUICY RIDER</h1>
        <img id="user-img" src="juicy.png" class="user-icon" onerror="this.src='https://placehold.jp/100x100.png?text=RIDER'">
    </div>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('main', this)">COCKPIT</button>
        <button class="tab-btn" onclick="switchTab('history', this)">FUEL LOG</button>
    </div>

    <div id="panel-main" class="content-panel active">
        <div id="map-container"><iframe id="map-iframe" src=""></iframe></div>

        <div class="engine-panel">
            <span id="engine-name" style="font-size: 18px; color: var(--comic-yellow); display: block; font-weight:900;">50cc MOPED</span>
            <span id="engine-status" style="font-size: 10px;">READY TO RIDE</span>
            <div class="goal-info">
                NEXT: <span id="next-goal-name">浅草寺</span> まで あと <span id="next-goal-dist">--</span> km
            </div>
        </div>
        <div id="guest-alert" class="guest-warning">⚠️ ログインしないと記録がクラウドに保存されません！</div>

        <div class="status-bar">
            <span>ODO: <span id="dist-val">0.0</span> km</span>
            <span>TODAY: <span id="today-val">0</span> g</span>
        </div>
        <div id="progress-container"><div id="progress-fill"></div></div>

        <select id="fruit-select-box" class="fruit-select" onchange="updateUnit()">
            <option value="アサイー">アサイー</option> <option value="アセロラ">アセロラ</option>
            <option value="アボカド">アボカド</option> <option value="アンズ">アンズ</option>
            <option value="イチジク">イチジク</option> <option value="イチゴ">イチゴ</option>
            <option value="イヨカン">イヨカン</option> <option value="ウメ">ウメ</option>
            <option value="オレンジ" selected>オレンジ</option> <option value="カキ">カキ</option>
            <option value="カボス">カボス</option> <option value="カリン">カリン</option>
            <option value="キウイ">キウイ</option> <option value="グアバ">グアバ</option>
            <option value="クランベリー">クランベリー</option> <option value="クリ">クリ</option>
            <option value="グレープフルーツ">グレープフルーツ</option> <option value="サクランボ">サクランボ</option>
            <option value="ザクロ">ザクロ</option> <option value="シークヮーサー">シークヮーサー</option>
            <option value="ジャックフルーツ">ジャックフルーツ</option> <option value="スイカ">スイカ</option>
            <option value="スターフルーツ">スターフルーツ</option> <option value="スモモ">スモモ</option>
            <option value="タイガーナッツ">タイガーナッツ</option> <option value="チェリモヤ">チェリモヤ</option>
            <option value="デコポン">デコポン</option> <option value="ドリアン">ドリアン</option>
            <option value="ドラゴンフルーツ">ドラゴンフルーツ</option> <option value="ナシ">ナシ</option>
            <option value="ナツメグ">ナツメグ</option> <option value="ナナカマド">ナナカマド</option>
            <option value="パッションフルーツ">パッションフルーツ</option> <option value="バナナ">バナナ</option>
            <option value="パパイヤ">パパイヤ</option> <option value="パラミツ">パラミツ</option>
            <option value="ビワ">ビワ</option> <option value="ブドウ">ブドウ</option>
            <option value="ブルーベリー">ブルーベリー</option> <option value="プルーン">プルーン</option>
            <option value="ブンタン">ブンタン</option> <option value="ポメロ">ポメロ</option>
            <option value="ホワイトサポテ">ホワイトサポテ</option> <option value="マンゴー">マンゴー</option>
            <option value="マンゴスチン">マンゴスチン</option> <option value="ミカン">ミカン</option>
            <option value="メロン">メロン</option> <option value="モモ">モモ</option>
            <option value="ユズ">ユズ</option> <option value="ライチ">ライチ</option>
            <option value="ライム">ライム</option> <option value="ラズベリー">ラズベリー</option>
            <option value="リンゴ">リンゴ</option> <option value="レモン">レモン</option>
            <option value="レンブ">レンブ</option> <option value="ロブスタ">ロブスタ</option>
            <option value="100%ジュース">100%ジュース</option>
        </select>

        <div style="display:flex; gap:10px; margin-bottom:15px; align-items:center;">
            <input type="number" id="amount-in" value="1.0" step="0.1" style="border:4px solid #000; padding:12px; width:100px; font-size:20px; font-weight:900; text-align:center;">
            <span id="unit-label" style="font-weight:900; font-size:20px;">個</span>
        </div>
        <button class="btn-load" onclick="handleLoad()">果汁×荷重 START!</button>
    </div>

    <div id="panel-history" class="content-panel">
        <input type="date" id="history-date-picker" style="width:100%; padding:12px; border:4px solid #000; font-weight:900; margin-bottom:10px; box-sizing:border-box;" onchange="updateHistoryUI()">
        <div id="selected-day-summary" style="background:var(--comic-yellow); padding:10px; border:3px solid #000; font-weight:900; text-align:center; margin-bottom:10px;">記録なし</div>
        <div id="history-list"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyA7pcr0G4qEx0yLNWueZPdaeQoEBjFuoic", authDomain: "necotastudio-app.firebaseapp.com", projectId: "necotastudio-app", storageBucket: "necotastudio-app.firebasestorage.app", messagingSenderId: "1093173509944", appId: "1:1093173509944:web:5340935ddffdd49628cbcd" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let totalDist = parseFloat(localStorage.getItem('juicy_odo')) || 0;
    let history = JSON.parse(localStorage.getItem('juicy_history')) || [];
    let currentUid = null;

    const goals = [
        { d: 50, n: "浅草寺 (東京)" }, { d: 100, n: "清水寺 (京都)" }, { d: 300, n: "厳島神社 (広島)" },
        { d: 600, n: "万里の長城 (中国)" }, { d: 1200, n: "アンコールワット (カンボジア)" },
        { d: 3000, n: "タージマハル (インド)" }, { d: 6000, n: "コロッセオ (イタリア)" },
        { d: 8000, n: "エッフェル塔 (フランス)" }, { d: 9500, n: "ビッグベン (イギリス)" },
        { d: 11000, n: "自由の女神 (アメリカ)" }, { d: 15000, n: "マチュピチュ (ペルー)" },
        { d: 20000, n: "ギザのピラミッド (エジプト)" }, { d: 40075, n: "地球一周達成！" }
    ];

    const fruitDB = {
        "アサイー": { weight: 2, rare: 2.5 }, "アセロラ": { weight: 10, rare: 2.0 }, "アボカド": { weight: 200, rare: 1.1 }, "アンズ": { weight: 50, rare: 1.2 },
        "イチジク": { weight: 80, rare: 1.5 }, "イチゴ": { weight: 20, rare: 1.2 }, "イヨカン": { weight: 250, rare: 0.9 }, "ウメ": { weight: 30, rare: 1.0 },
        "オレンジ": { weight: 150, rare: 0.8 }, "カキ": { weight: 200, rare: 1.0 }, "カボス": { weight: 80, rare: 1.3 }, "カリン": { weight: 300, rare: 1.8 },
        "キウイ": { weight: 100, rare: 1.0 }, "グアバ": { weight: 200, rare: 2.2 }, "クランベリー": { weight: 5, rare: 1.8 }, "クリ": { weight: 25, rare: 1.1 },
        "グレープフルーツ": { weight: 400, rare: 0.9 }, "サクランボ": { weight: 10, rare: 1.5 }, "ザクロ": { weight: 250, rare: 2.0 }, "シークヮーサー": { weight: 30, rare: 1.5 },
        "ジャックフルーツ": { weight: 10000, rare: 3.0 }, "スイカ": { weight: 5000, rare: 1.8 }, "スターフルーツ": { weight: 150, rare: 2.5 }, "スモモ": { weight: 100, rare: 1.2 },
        "タイガーナッツ": { weight: 2, rare: 2.8 }, "チェリモヤ": { weight: 400, rare: 3.5 }, "デコポン": { weight: 300, rare: 1.2 }, "ドリアン": { weight: 2500, rare: 5.0 },
        "ドラゴンフルーツ": { weight: 400, rare: 2.3 }, "ナシ": { weight: 350, rare: 0.9 }, "ナツメグ": { weight: 10, rare: 3.0 }, "ナナカマド": { weight: 1, rare: 4.0 },
        "パッションフルーツ": { weight: 80, rare: 2.8 }, "バナナ": { weight: 120, rare: 0.7 }, "パパイヤ": { weight: 500, rare: 1.8 }, "パラミツ": { weight: 5000, rare: 2.5 },
        "ビワ": { weight: 40, rare: 1.6 }, "ブドウ": { weight: 10, rare: 1.1 }, "ブルーベリー": { weight: 2, rare: 1.4 }, "プルーン": { weight: 50, rare: 1.3 },
        "ブンタン": { weight: 1000, rare: 1.5 }, "ポメロ": { weight: 1200, rare: 2.0 }, "ホワイトサポテ": { weight: 200, rare: 3.8 }, "マンゴー": { weight: 400, rare: 2.2 },
        "マンゴスチン": { weight: 100, rare: 4.0 }, "ミカン": { weight: 100, rare: 0.8 }, "メロン": { weight: 1500, rare: 2.0 }, "モモ": { weight: 250, rare: 1.1 },
        "ユズ": { weight: 120, rare: 1.4 }, "ライチ": { weight: 30, rare: 2.5 }, "ライム": { weight: 50, rare: 1.5 }, "ラズベリー": { weight: 5, rare: 1.8 },
        "リンゴ": { weight: 300, rare: 0.9 }, "レモン": { weight: 120, rare: 1.0 }, "レンブ": { weight: 100, rare: 3.2 }, "ロブスタ": { weight: 5, rare: 3.5 },
        "100%ジュース": { weight: 1, rare: 1.0, isLiquid: true }
    };

    function updateMap() {
        const currentLat = 35.6812 + (totalDist * 0.005); const currentLng = 139.7671 + (totalDist * 0.008);
        document.getElementById('map-iframe').src = `https://maps.google.com/maps?q=${currentLat},${currentLng}&output=embed&z=14`;
    }

    function updateUI() {
        document.getElementById('dist-val').innerText = totalDist.toFixed(1);
        const today = new Date().toISOString().split('T')[0];
        const todayG = history.filter(i => i.date === today).reduce((s, i) => s + i.grams, 0);
        document.getElementById('today-val').innerText = Math.round(todayG);
        document.getElementById('progress-fill').style.width = Math.min((totalDist / 1000) * 100, 100) + "%";
        document.getElementById('engine-name').innerText = totalDist >= 500 ? "1200cc MONSTER" : (totalDist >= 100 ? "250cc STREET" : "50cc MOPED");
        
        // 目標更新
        const next = goals.find(g => g.d > totalDist) || { d: 99999, n: "銀河の果て" };
        document.getElementById('next-goal-name').innerText = next.n;
        document.getElementById('next-goal-dist').innerText = (next.d - totalDist).toFixed(1);
        updateMap();
    }

    window.updateUnit = () => {
        const name = document.getElementById('fruit-select-box').value;
        document.getElementById('unit-label').innerText = fruitDB[name].isLiquid ? "ml" : "個";
    };

    window.switchTab = (tab, btn) => {
        document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`panel-${tab}`).classList.add('active');
        btn.classList.add('active');
        if(tab === 'history') updateHistoryUI();
    };

    window.handleLoad = () => {
        const name = document.getElementById('fruit-select-box').value;
        const amount = parseFloat(document.getElementById('amount-in').value);
        if (!amount || amount <= 0) return;
        const data = fruitDB[name];
        const grams = data.isLiquid ? amount : (amount * data.weight);
        const addKM = (grams * data.rare / 100);
        totalDist += addKM;
        history.unshift({ id: Date.now(), date: new Date().toISOString().split('T')[0], time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), name: name, amount: amount, grams: grams, unit: data.isLiquid ? "ml" : "個", km: addKM.toFixed(2), atKm: totalDist.toFixed(1) });
        updateUI(); saveAll();
    };

    window.deleteItem = (id) => {
        const idx = history.findIndex(i => i.id === id);
        if (idx > -1) {
            totalDist = Math.max(0, totalDist - parseFloat(history[idx].km));
            history.splice(idx, 1);
            updateUI(); updateHistoryUI(); saveAll();
        }
    };

    window.updateHistoryUI = () => {
        const target = document.getElementById('history-date-picker').value;
        const filtered = history.filter(i => i.date === target);
        document.getElementById('selected-day-summary').innerText = `${target} 合計: ${Math.round(filtered.reduce((s, i) => s + i.grams, 0))}g`;
        document.getElementById('history-list').innerHTML = filtered.map(i => `<div class="history-item"><div style="font-size:12px;"><small>${i.atKm}km / ${i.time}</small><br><b>${i.name}</b> ${i.amount}${i.unit}</div><div style="display:flex; align-items:center; gap:8px;"><span style="color:var(--comic-red); font-weight:900;">+${i.km}km</span><button class="delete-btn" onclick="deleteItem(${i.id})">×</button></div></div>`).join('') || '<div style="text-align:center; padding:20px; color:#aaa;">記録なし</div>';
    };

    async function saveAll() {
        localStorage.setItem('juicy_odo', totalDist);
        localStorage.setItem('juicy_history', JSON.stringify(history));
        if (currentUid) await setDoc(doc(db, "juicy_rider", currentUid), { odo: totalDist, history: history }, { merge: true });
    }

    window.handleCredentialResponse = async (response) => {
        const base64Url = response.credential.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
        const payload = JSON.parse(jsonPayload);
        currentUid = payload.sub;
        document.getElementById('user-img').src = payload.picture;
        document.getElementById('login-banner').style.display = 'none';
        document.getElementById('guest-alert').style.display = 'none';
        document.getElementById('engine-status').innerText = `RIDER: ${payload.name.toUpperCase()}`;
        document.getElementById('sync-status').innerText = "☁️ CLOUD SYNC: ON";
        const docSnap = await getDoc(doc(db, "juicy_rider", currentUid));
        if (docSnap.exists()) {
            totalDist = Math.max(totalDist, docSnap.data().odo || 0);
            const combined = [...history, ...(docSnap.data().history || [])];
            history = Array.from(new Map(combined.map(item => [item.id, item])).values()).sort((a, b) => b.id - a.id);
        }
        updateUI(); saveAll();
    };

    document.getElementById('history-date-picker').valueAsDate = new Date();
    updateUI();
</script>
</body>
</html>
