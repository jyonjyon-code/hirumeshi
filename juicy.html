<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUICY RIDER | ねこたスタジオ</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Noto+Sans+JP:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --comic-yellow: #ffde00; --comic-red: #e60012; --comic-blue: #00acee; --black: #000;
        }
        body {
            background: #ddd; background-image: radial-gradient(var(--black) 10%, transparent 11%);
            background-size: 15px 15px; font-family: 'Noto Sans JP', sans-serif; margin: 0; padding: 10px;
        }
        .app-card {
            background: white; border: 6px solid var(--black); max-width: 500px; margin: 0 auto;
            box-shadow: 15px 15px 0px var(--black); overflow: hidden; position: relative;
        }
        /* ヘッダー */
        .header {
            background: var(--comic-yellow); border-bottom: 6px solid var(--black);
            padding: 15px; display: flex; align-items: center; gap: 15px;
        }
        .user-icon {
            width: 80px; height: 80px; border: 4px solid var(--black);
            background: white; box-shadow: 4px 4px 0 var(--black); object-fit: cover;
        }
        h1 {
            font-family: 'Bangers', cursive; font-size: 45px; color: var(--comic-red);
            -webkit-text-stroke: 1.5px var(--black); margin: 0; transform: rotate(-2deg);
        }
        /* エンジン表示 */
        .engine-panel {
            background: #222; color: #00ff00; padding: 10px;
            font-family: 'Courier New', monospace; font-size: 12px;
            border-bottom: 6px solid var(--black); text-align: center;
        }
        #engine-name { font-weight: bold; font-size: 18px; color: var(--comic-yellow); display: block; }

        /* 走行ステータス */
        .status-bar {
            background: var(--black); color: white; padding: 10px 15px;
            display: flex; justify-content: space-between; font-size: 14px; font-weight: 900;
        }
        #progress-container { height: 10px; background: #444; }
        #progress-fill { height: 100%; background: var(--comic-red); width: 0%; transition: width 0.5s; }

        /* 入力セクション */
        .panel { padding: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 10px; }
        .row { display: flex; gap: 8px; }
        input { border: 4px solid var(--black); padding: 12px; font-size: 18px; font-weight: 900; outline: none; flex: 1; }
        .btn-load {
            background: var(--comic-red); color: white; border: 4px solid var(--black);
            padding: 15px; font-family: 'Bangers', cursive; font-size: 28px;
            cursor: pointer; box-shadow: 6px 6px 0 var(--black);
        }
        .btn-load:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0 var(--black); }
        .btn-undo {
            background: #666; color: white; border: 2px solid var(--black);
            font-size: 12px; padding: 5px; cursor: pointer; margin-top: 10px; width: 100%;
        }

        /* 警告表示 */
        #alert-box {
            display: none; background: var(--comic-red); color: white;
            padding: 10px; border: 3px solid var(--black); margin-top: 10px;
            font-weight: 900; text-align: center; animation: blink 0.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <img src="juicy.png" alt="ICON" class="user-icon" onerror="this.src='https://placehold.jp/80x80.png?text=ICON'">
        <div>
            <h1>JUICY RIDER</h1>
            <div style="font-size: 11px; font-weight: 900;">WESTBOUND JOURNEY</div>
        </div>
    </div>

    <div class="engine-panel">
        <span id="engine-name">50cc MOPED</span>
        <span id="engine-spec">EFFICIENCY: 1.0x | STATUS: READY</span>
    </div>

    <div id="progress-container"><div id="progress-fill"></div></div>

    <div class="status-bar">
        <span>ODO: <span id="dist-val">0.0</span> km</span>
        <span>TODAY: <span id="today-val">0</span> / 200g</span>
    </div>

    <div class="panel">
        <div id="alert-box">OVER-EATING WARNING!</div>
        <div class="input-group">
            <div class="row">
                <input type="text" id="fruit-in" placeholder="FRUIT NAME..." list="fruit-data">
                <input type="number" id="gram-in" placeholder="GRAMS" style="width: 80px;">
            </div>
            <datalist id="fruit-data">
                <option value="オレンジ"><option value="リンゴ"><option value="ドラゴンフルーツ">
                <option value="ドリアン"><option value="マンゴスチン"><option value="アテモヤ">
                <option value="サラク"><option value="スターフルーツ"><option value="100%ジュース">
            </datalist>
            <button class="btn-load" onclick="handleLoad()">LOAD GASOLINE!</button>
        </div>
        <button class="btn-undo" onclick="undoLast()">間違えて記録した（UNDO）</button>
    </div>
</div>

<script>
    let totalDist = parseFloat(localStorage.getItem('juicy_odo')) || 0;
    let todayGrams = parseFloat(localStorage.getItem('juicy_today')) || 0;
    const LIMIT = 200;

    const engines = [
        { min: 0, name: "50cc MOPED", boost: 1.0 },
        { min: 50, name: "250cc STREET", boost: 1.3 },
        { min: 200, name: "1200cc MONSTER", boost: 2.0 }
    ];

    const fruitDB = {
        "オレンジ": 0.8, "リンゴ": 0.9, "ドラゴンフルーツ": 1.5,
        "ドリアン": 2.5, "アテモヤ": 2.2, "マンゴスチン": 1.4,
        "サラク": 1.9, "スターフルーツ": 1.3, "100%ジュース": 1.0
    };

    updateUI();

    function handleLoad() {
        const name = document.getElementById('fruit-in').value;
        const grams = parseFloat(document.getElementById('gram-in').value);
        if (!name || !grams) return;

        todayGrams += grams;
        if (todayGrams > LIMIT) document.getElementById('alert-box').style.display = 'block';

        const engine = [...engines].reverse().find(e => totalDist >= e.min);
        const rarity = fruitDB[name] || 1.1;
        const addKM = (grams * rarity / 10) * engine.boost;
        
        totalDist += addKM;

        saveData();
        updateUI();

        document.getElementById('fruit-in').value = '';
        document.getElementById('gram-in').value = '';
    }

    function updateUI() {
        document.getElementById('dist-val').innerText = totalDist.toFixed(1);
        document.getElementById('today-val').innerText = todayGrams;
        
        const engine = [...engines].reverse().find(e => totalDist >= e.min);
        document.getElementById('engine-name').innerText = engine.name;
        document.getElementById('engine-spec').innerText = `EFFICIENCY: ${engine.boost}x | STATUS: VROOM!`;

        const next = engines.find(e => e.min > totalDist) || { min: 1000 };
        const progress = (totalDist / next.min) * 100;
        document.getElementById('progress-fill').style.width = Math.min(progress, 100) + "%";
    }

    function saveData() {
        localStorage.setItem('juicy_odo', totalDist);
        localStorage.setItem('juicy_today', todayGrams);
    }

    function undoLast() {
        if (confirm("直前の記録を取り消しますか？")) {
            totalDist = Math.max(0, totalDist - 10);
            todayGrams = Math.max(0, todayGrams - 100);
            saveData();
            updateUI();
            if(todayGrams <= LIMIT) document.getElementById('alert-box').style.display = 'none';
        }
    }
</script>
</body>
</html>
