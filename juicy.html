<!DOCTYPE html>
<html lang="ja">
<head>
    <!-- 【必須修正1】Google Tag (gtag.js) - GA4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7S6PB8B6N0"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-7S6PB8B6N0');
    </script>

    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- 【必須修正2】SEO対策: meta description -->
    <meta name="description" content="JUICY RIDER（ジューシーライダー）は、食べたフルーツの「果汁×荷重」を推進力に変えて爆走する、新感覚のフルーツ摂取記録・バイク育成アプリです。">
    
    <title>JUICY RIDER | necotastudio</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Noto+Sans+JP:wght@900&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCjHURgB5A-iLwJ8sG3_KXSrdTXZEAg7Ms&callback=initMap&libraries=marker&v=beta" async defer></script>
    <style>
        :root { --comic-yellow: #ffde00; --comic-red: #e60012; --black: #000; --neon-green: #00ff00; }
        body { background: #ddd; background-image: radial-gradient(var(--black) 10%, transparent 11%); background-size: 15px 15px; font-family: 'Noto Sans JP', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .app-card { background: white; border: 6px solid var(--black); width: 100%; max-width: 450px; box-shadow: 12px 12px 0px var(--black); display: flex; flex-direction: column; min-height: 100vh; position: relative; margin-bottom: 50px; overflow-y: auto; }
        #login-banner { background: var(--black); color: white; padding: 10px; border-bottom: 4px solid #333; }
        .banner-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        #user-greeting { font-weight: 900; color: var(--comic-yellow); font-size: 14px; letter-spacing: 0.5px; }
        #g_btn_wrapper { display: flex; justify-content: center; background: #fff; padding: 8px; border-radius: 4px; min-height: 40px; }
        .header { background: var(--comic-yellow); border-bottom: 6px solid var(--black); height: 140px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        h1 { font-family: 'Bangers', cursive; font-size: 64px; color: var(--comic-red); text-shadow: 5px 5px 0px var(--black); -webkit-text-stroke: 1.5px var(--black); margin: 0; transform: rotate(-3deg); line-height: 1; z-index: 2; }
        
        /* 【必須修正3】ホームボタンのリンク修正 */
        .back-btn { background: var(--black); color: white; border: 3px solid white; padding: 6px 12px; font-size: 11px; font-weight: 900; text-decoration: none; border-radius: 4px; position: absolute; left: 50px; top: 12px; z-index: 10; cursor: pointer; display: flex; align-items: center; }
        #help-trigger { position: absolute; left: 12px; top: 12px; background: var(--comic-red); color: white; border: 3px solid var(--black); width: 28px; height: 28px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: pointer; z-index: 11; box-shadow: 3px 3px 0px var(--black); }
        
        .user-icon { width: 70px; height: 70px; border: 4px solid var(--black); background: white; border-radius: 50%; box-shadow: 3px 3px 0px var(--black); transform: rotate(5deg); position: absolute; right: 10px; bottom: 10px; z-index: 5; object-fit: cover; }
        .tab-menu { display: flex; background: var(--black); gap: 2px; }
        .tab-btn { flex: 1; padding: 18px; color: #888; background: #1a1a1a; border: none; font-weight: 900; cursor: pointer; font-size: 16px; }
        .tab-btn.active { background: white; color: var(--black); }
        .content-panel { display: none; padding: 15px; }
        .content-panel.active { display: block; }
        .machine-selector { border: 4px solid var(--black); margin-bottom: 12px; background: #eee; padding: 12px; font-weight: 900; width: 100%; border-radius: 0; cursor: pointer; font-size: 16px; }
        .parts-status { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
        .part-box { background: #222; border: 3px solid var(--black); padding: 10px 2px; color: var(--neon-green); text-align: center; }
        .part-lv { color: var(--comic-yellow); font-weight: 900; font-size: 20px; display: block; margin-top: 2px; }
        .part-label { font-size: 10px; text-transform: uppercase; font-weight: 900; opacity: 0.9; }
        .engine-panel { background: #111; color: var(--neon-green); padding: 15px; font-family: 'Courier New', monospace; border: 4px solid var(--black); text-align: center; }
        #map { width: 100%; height: 240px; border: 4px solid var(--black); margin-bottom: 10px; background: #eee; }
        .status-bar { background: var(--black); color: white; padding: 15px; display: flex; justify-content: space-between; font-size: 16px; font-weight: 900; border-radius: 4px; }
        #dist-val, #today-val { color: var(--comic-yellow); font-size: 20px; }
        .system-container { background: #222; border: 4px solid var(--black); padding: 15px; margin-top: 15px; position: relative; box-shadow: inset 0 0 15px rgba(0,255,0,0.2); }
        .btn-load { background: var(--comic-red); color: white; border: 5px solid var(--black); padding: 12px; font-weight: 900; font-size: 18px; width: 100%; cursor: pointer; box-shadow: 0 6px 0 var(--black); margin-top: 10px; position: relative; transition: 0.1s; line-height: 1.2; text-align: center; }
        .btn-load .big-go { font-family: 'Bangers', cursive; font-size: 48px; display: block; margin-top: 5px; color: var(--comic-yellow); -webkit-text-stroke: 2px var(--black); letter-spacing: 3px; }
        .btn-load:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--black); }
        .rakuten-link { display: block; margin-top: 15px; background: #bf0000; color: white; text-align: center; padding: 12px; text-decoration: none; font-weight: 900; border: 4px solid var(--black); font-size: 14px; box-shadow: 4px 4px 0px var(--black); cursor: pointer; }
        .x-share-btn { display: block; margin-top: 10px; background: #000; color: #fff; text-align: center; padding: 12px; text-decoration: none; font-weight: 900; border: 4px solid #fff; font-size: 14px; box-shadow: 4px 4px 0px var(--black); cursor: pointer; }

        #help-popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; background: white; border: 6px solid var(--black); box-shadow: 12px 12px 0px var(--black); z-index: 2000; padding: 20px; text-align: left; font-size: 13px; color: var(--black); line-height: 1.4; }
        #help-popup b { color: var(--comic-red); font-size: 15px; }
        .help-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1999; }
    </style>
</head>
<body>

<div class="app-card">
    <div id="login-banner">
        <div class="banner-top">
            <span id="user-greeting">PLEASE LOGIN -></span>
            <span id="sync-status" style="font-size: 10px; background: #333; padding: 2px 8px; border-radius: 4px;">☁️ CLOUD: OFF</span>
        </div>
        <div id="g_btn_wrapper"></div>
    </div>

    <div class="header">
        <div id="help-trigger" onclick="toggleHelp()">?</div>
        <!-- 【修正3徹底】公式サイトへ -->
        <div class="back-btn" onclick="location.href='https://necotastudio.com/'">← BACK</div>
        
        <h1>JUICY RIDER</h1>
        <img id="user-img" src="juicy.png" class="user-icon" onerror="this.src='https://placehold.jp/150x150.png?text=RIDER'">
    </div>

    <!-- ... (中略: メインコンテンツ部分は変更なし) ... -->

    <div class="fuel-controls" style="margin-top:10px;">
        <!-- ... (中略) ... -->
        <div class="system-container">
            <button class="btn-load" onclick="handleLoad()">果汁×荷重SYSTEM<span class="big-go">GO！</span></button>
        </div>
        <!-- 【修正4徹底】X（x.com）へのシェアボタンを反映 -->
        <div onclick="shareX()" class="x-share-btn">
            𝕏 爆走を報告する
        </div>
    </div>
</div>

<script type="module">
    // ... (Firebase初期化などのスクリプト) ...

    // 【必須修正4】Xへのドメインを x.com に統一
    window.shareX = () => {
        const todayDist = document.getElementById('today-val').innerText;
        const odo = document.getElementById('dist-val').innerText;
        const text = `!!! JUICY RIDER ALERT !!!\n\n果汁を ${todayDist}g 搾り取ってマシンにブチ込んだぜ！\nODOメーターはついに ${odo}km を突破ッ！！\n\nこのフレッシュな爆走は誰にも止められない…！\n#JUICYRIDER #necotastudio #搾りたて爆走`;
        const url = `https://x.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(location.href)}`;
        window.open(url, '_blank');
    };

    // ... (その他の関数) ...
</script>
</body>
</html>
