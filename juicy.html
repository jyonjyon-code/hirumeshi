<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JUICY RIDER | necotastudio</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Noto+Sans+JP:wght@900&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --comic-yellow: #ffde00; --comic-red: #e60012; --comic-blue: #00acee; --black: #000; }
        body { background: #ddd; background-image: radial-gradient(var(--black) 10%, transparent 11%); background-size: 15px 15px; font-family: 'Noto Sans JP', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .app-card { background: white; border: 6px solid var(--black); width: 100%; max-width: 450px; box-shadow: 12px 12px 0px var(--black); overflow: hidden; position: relative; min-height: 600px; display: flex; flex-direction: column; }
        
        /* ログインバナー（オーバーレイから変更） */
        #login-banner { background: var(--black); color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; z-index: 100; }
        .login-btn-small { transform: scale(0.8); transform-origin: right; }

        /* ヘッダー */
        .header { background: var(--comic-yellow); border-bottom: 6px solid var(--black); padding: 12px; display: flex; align-items: center; gap: 10px; }
        .back-btn { background: var(--black); color: white; border: none; padding: 6px 12px; font-size: 10px; font-weight: 900; cursor: pointer; text-decoration: none; border-radius: 4px; border: 2px solid white; }
        .user-icon { width: 45px; height: 45px; border: 3px solid var(--black); background: white; border-radius: 50%; object-fit: cover; }
        h1 { font-family: 'Bangers', cursive; font-size: 30px; color: var(--comic-red); -webkit-text-stroke: 1px var(--black); margin: 0; transform: rotate(-2deg); flex-grow: 1; }

        /* タブ・パネル共通設定（前バージョン踏襲） */
        .tab-menu { display: flex; background: var(--black); border-bottom: 4px solid var(--black); }
        .tab-btn { flex: 1; padding: 14px; color: #888; background: #222; border: none; font-weight: 900; cursor: pointer; }
        .tab-btn.active { background: white; color: var(--black); }
        .content-panel { display: none; padding: 15px; flex-grow: 1; overflow-y: auto; }
        .content-panel.active { display: block; }

        .engine-panel { background: #111; color: #00ff00; padding: 10px; font-family: 'Courier New', monospace; border: 4px solid var(--black); text-align: center; margin-bottom: 10px; }
        .status-bar { background: var(--black); color: white; padding: 12px; display: flex; justify-content: space-between; font-size: 14px; font-weight: 900; margin-bottom: 10px; }
        #progress-container { height: 12px; background: #333; border: 3px solid var(--black); margin-bottom: 15px; }
        #progress-fill { height: 100%; background: var(--comic-red); width: 0%; transition: width 0.8s; }

        /* 検索・入力系 */
        .search-container { position: relative; margin-bottom: 15px; }
        .search-input { width: 100%; border: 4px solid var(--black); padding: 12px; font-size: 18px; font-weight: 900; box-sizing: border-box; background: #fffceb; }
        #search-results { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 4px solid var(--black); z-index: 100; max-height: 200px; overflow-y: auto; display: none; }
        .search-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; font-weight: 900; }
        .search-item:hover { background: var(--comic-yellow); }
        
        .btn-load { background: var(--comic-red); color: white; border: 4px solid var(--black); padding: 15px; font-weight: 900; font-size: 20px; width: 100%; cursor: pointer; box-shadow: 5px 5px 0 var(--black); }
        .history-item { background: white; border: 3px solid var(--black); margin-bottom: 8px; padding: 10px; display: flex; justify-content: space-between; }
        #alert-box { display: none; background: var(--comic-red); color: white; padding: 10px; border: 4px solid var(--black); font-weight: 900; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="app-card">
    <div id="login-banner">
        <span>☁️ クラウド保存未完了</span>
        <div id="g_id_onload" data-client_id="1093173509944-ssn8tds7tgcb0r1i5lv1ir5lnk311dvv.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_select="false"></div>
        <div class="g_id_signin login-btn-small" data-type="standard" data-size="small"></div>
    </div>

    <div class="header">
        <a href="https://necotastudio.github.io" class="back-btn">戻る</a>
        <h1>JUICY RIDER</h1>
        <img id="user-img" src="juicy.png" class="user-icon">
    </div>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('main', this)">COCKPIT</button>
        <button class="tab-btn" onclick="switchTab('history', this)">FUEL LOG</button>
    </div>

    <div id="panel-main" class="content-panel active">
        <div class="engine-panel">
            <span id="engine-name" style="font-size: 18px; color: var(--comic-yellow); display: block; font-weight:900;">50cc MOPED</span>
            <span id="engine-status" style="font-size: 10px;">GUEST MODE: LOCAL SAVE ONLY</span>
        </div>
        <div class="status-bar">
            <span>ODO: <span id="dist-val">0.0</span> km</span>
            <span>TODAY: <span id="today-val">0</span> g</span>
        </div>
        <div id="progress-container"><div id="progress-fill"></div></div>
        <div id="alert-box">⚠️ OVER-EATING WARNING!</div>

        <div class="search-container">
            <input type="text" id="fruit-search" class="search-input" placeholder="フルーツを検索..." oninput="searchFruit()">
            <div id="search-results"></div>
        </div>

        <div class="input-row" style="display:flex; gap:10px; margin-bottom:15px; align-items:center;">
            <input type="number" id="amount-in" value="1.0" step="0.1" style="border:4px solid #000; padding:10px; width:80px; font-weight:900; text-align:center;">
            <span id="unit-label" style="font-weight:900;">個</span>
        </div>
        <button class="btn-load" onclick="handleLoad()">果汁×荷重システム START!</button>
    </div>

    <div id="panel-history" class="content-panel">
        <input type="date" id="history-date-picker" style="width:100%; padding:10px; border:3px solid #000; font-weight:900; margin-bottom:10px;" onchange="updateHistoryUI()">
        <div id="selected-day-summary" style="background:var(--comic-yellow); padding:8px; border:3px solid #000; font-weight:900; text-align:center; margin-bottom:10px;">日付を選択してください</div>
        <div id="history-list"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyA7pcr0G4qEx0yLNWueZPdaeQoEBjFuoic", authDomain: "necotastudio-app.firebaseapp.com", projectId: "necotastudio-app", storageBucket: "necotastudio-app.firebasestorage.app", messagingSenderId: "1093173509944", appId: "1:1093173509944:web:5340935ddffdd49628cbcd" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let totalDist = parseFloat(localStorage.getItem('juicy_odo')) || 0;
    let history = JSON.parse(localStorage.getItem('juicy_history')) || [];
    let currentUid = null;
    let selectedFruit = "オレンジ";

    const fruitDB = {
        "オレンジ": { weight: 150, rare: 0.8 }, "リンゴ": { weight: 300, rare: 0.9 }, "バナナ": { weight: 120, rare: 0.7 },
        "イチゴ": { weight: 20, rare: 1.2 }, "ブドウ": { weight: 10, rare: 1.1 }, "メロン": { weight: 1500, rare: 2.0 },
        "スイカ": { weight: 5000, rare: 1.8 }, "キウイ": { weight: 100, rare: 1.0 }, "マンゴー": { weight: 400, rare: 2.2 },
        "100%ジュース": { weight: 1, rare: 1.0, isLiquid: true }
    };

    document.getElementById('history-date-picker').valueAsDate = new Date();

    window.switchTab = (tab, btn) => {
        document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`panel-${tab}`).classList.add('active');
        btn.classList.add('active');
        if(tab === 'history') updateHistoryUI();
    };

    window.searchFruit = () => {
        const val = document.getElementById('fruit-search').value.toLowerCase();
        const results = document.getElementById('search-results');
        if (!val) { results.style.display = 'none'; return; }
        const filtered = Object.keys(fruitDB).filter(f => f.includes(val));
        results.innerHTML = filtered.map(f => `<div class="search-item" onclick="selectFruit('${f}')">${f}</div>`).join('');
        results.style.display = filtered.length ? 'block' : 'none';
    };

    window.selectFruit = (name) => {
        selectedFruit = name;
        document.getElementById('fruit-search').value = name;
        document.getElementById('search-results').style.display = 'none';
        document.getElementById('unit-label').innerText = fruitDB[name].isLiquid ? "ml" : "個";
    };

    window.handleLoad = async () => {
        const amount = parseFloat(document.getElementById('amount-in').value);
        if (!amount || amount <= 0) return;
        const data = fruitDB[selectedFruit];
        const grams = data.isLiquid ? amount : (amount * data.weight);
        const addKM = (grams * data.rare / 100);
        totalDist += addKM;
        
        const now = new Date();
        history.unshift({ 
            id: Date.now(), 
            date: now.toISOString().split('T')[0],
            time: now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), 
            name: selectedFruit, amount: amount, grams: grams, unit: data.isLiquid ? "ml" : "個", km: addKM.toFixed(2) 
        });
        updateUI();
        saveAll();
    };

    function updateUI() {
        const todayStr = new Date().toISOString().split('T')[0];
        const todayGrams = history.filter(item => item.date === todayStr).reduce((sum, item) => sum + item.grams, 0);
        document.getElementById('dist-val').innerText = totalDist.toFixed(1);
        document.getElementById('today-val').innerText = Math.round(todayGrams);
        document.getElementById('alert-box').style.display = todayGrams > 200 ? 'block' : 'none';
        document.getElementById('progress-fill').style.width = Math.min((totalDist / 500) * 100, 100) + "%";
        const engine = totalDist >= 200 ? "1200cc MONSTER" : (totalDist >= 50 ? "250cc STREET" : "50cc MOPED");
        document.getElementById('engine-name').innerText = engine;
    }

    window.updateHistoryUI = () => {
        const targetDate = document.getElementById('history-date-picker').value;
        const filtered = history.filter(item => item.date === targetDate);
        const dayTotal = Math.round(filtered.reduce((sum, item) => sum + item.grams, 0));
        document.getElementById('selected-day-summary').innerText = `${targetDate} の合計: ${dayTotal} g`;
        document.getElementById('history-list').innerHTML = filtered.map(item => `
            <div class="history-item">
                <div style="font-size:12px;"><b>${item.name}</b> ${item.amount}${item.unit} (${item.time})</div>
                <div style="color:var(--comic-red); font-weight:900;">+${item.km}km</div>
            </div>`).join('') || '<div style="text-align:center; padding:20px; color:#aaa;">記録なし</div>';
    };

    async function saveAll() {
        localStorage.setItem('juicy_odo', totalDist);
        localStorage.setItem('juicy_history', JSON.stringify(history));
        if (currentUid) {
            try {
                await setDoc(doc(db, "juicy_rider", currentUid), { odo: totalDist, history: history }, { merge: true });
            } catch (e) { console.error("Save failed", e); }
        }
    }

    window.handleCredentialResponse = async (response) => {
        try {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            currentUid = payload.sub;
            document.getElementById('user-img').src = payload.picture;
            document.getElementById('login-banner').style.display = 'none';
            document.getElementById('engine-status').innerText = `RIDER: ${payload.name.toUpperCase()}`;

            const docSnap = await getDoc(doc(db, "juicy_rider", currentUid));
            if (docSnap.exists()) {
                // ローカルとサーバーで距離が大きい方を採用（マージ）
                totalDist = Math.max(totalDist, docSnap.data().odo || 0);
                const serverHistory = docSnap.data().history || [];
                // 重複を除いてヒストリを合体
                const combined = [...history, ...serverHistory];
                history = Array.from(new Map(combined.map(item => [item.id, item])).values())
                               .sort((a, b) => b.id - a.id);
            }
            updateUI();
            saveAll();
        } catch (e) {
            console.error("Login Error", e);
            alert("ログインに失敗しました。ゲストモードで継続します。");
        }
    };

    updateUI();
</script>
</body>
</html>
