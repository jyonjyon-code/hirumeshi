<!DOCTYPE html>
<html lang="ja">
<head>
    <!-- 【必須修正1】GA4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7S6PB8B6N0"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-7S6PB8B6N0');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="JUICY RIDER（ジューシーライダー）は、食べたフルーツの「果汁×荷重」を推進力に変えて爆走する、新感覚のフルーツ摂取記録・バイク育成アプリです。">
    <title>JUICY RIDER | necotastudio</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Noto+Sans+JP:wght@900&display=swap" rel="stylesheet">
    
    <!-- Google Maps API (テスト時はキーを有効なものにしてください) -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCjHURgB5A-iLwJ8sG3_KXSrdTXZEAg7Ms&callback=initMap&v=beta" async defer></script>

    <style>
        :root { --comic-yellow: #ffde00; --comic-red: #e60012; --black: #000; --neon-green: #00ff00; }
        body { background: #ddd; background-image: radial-gradient(var(--black) 10%, transparent 11%); background-size: 15px 15px; font-family: 'Noto Sans JP', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .app-card { background: white; border: 6px solid var(--black); width: 100%; max-width: 450px; box-shadow: 12px 12px 0px var(--black); display: flex; flex-direction: column; min-height: 100vh; position: relative; overflow: hidden; }
        
        /* ヘッダー・ナビ */
        .header { background: var(--comic-yellow); border-bottom: 6px solid var(--black); height: 140px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        h1 { font-family: 'Bangers', cursive; font-size: 58px; color: var(--comic-red); text-shadow: 5px 5px 0px var(--black); -webkit-text-stroke: 1.5px var(--black); margin: 0; transform: rotate(-3deg); line-height: 1; z-index: 2; }
        .back-btn { background: var(--black); color: white; border: 3px solid white; padding: 6px 12px; font-size: 11px; font-weight: 900; text-decoration: none; border-radius: 4px; position: absolute; left: 12px; top: 12px; z-index: 10; cursor: pointer; }
        .user-icon { width: 70px; height: 70px; border: 4px solid var(--black); background: white; border-radius: 50%; box-shadow: 3px 3px 0px var(--black); transform: rotate(5deg); position: absolute; right: 10px; bottom: 10px; z-index: 5; object-fit: cover; }

        /* タブ */
        .tab-menu { display: flex; background: var(--black); gap: 2px; }
        .tab-btn { flex: 1; padding: 15px; color: #888; background: #1a1a1a; border: none; font-weight: 900; cursor: pointer; font-size: 16px; }
        .tab-btn.active { background: white; color: var(--black); }
        .content-panel { display: none; padding: 15px; }
        .content-panel.active { display: block; }

        /* ガレージ要素 */
        .machine-selector { border: 4px solid var(--black); margin-bottom: 12px; background: #eee; padding: 12px; font-weight: 900; width: 100%; border-radius: 0; cursor: pointer; font-size: 16px; }
        .parts-status { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
        .part-box { background: #222; border: 3px solid var(--black); padding: 10px 2px; color: var(--neon-green); text-align: center; }
        .part-lv { color: var(--comic-yellow); font-weight: 900; font-size: 20px; display: block; }
        .part-label { font-size: 10px; text-transform: uppercase; font-weight: 900; }

        /* ドライブ要素 */
        #map { width: 100%; height: 300px; border: 4px solid var(--black); margin-bottom: 15px; background: #333; }
        .status-bar { background: var(--black); color: white; padding: 15px; display: flex; justify-content: space-between; font-weight: 900; border-radius: 4px; }
        #dist-val, #today-val { color: var(--comic-yellow); font-size: 20px; }

        /* システムボタン */
        .btn-load { background: var(--comic-red); color: white; border: 5px solid var(--black); padding: 12px; font-weight: 900; width: 100%; cursor: pointer; box-shadow: 0 6px 0 var(--black); margin-top: 10px; }
        .big-go { font-family: 'Bangers', cursive; font-size: 32px; display: block; color: var(--comic-yellow); }
        .x-share-btn { display: block; margin-top: 15px; background: #000; color: #fff; text-align: center; padding: 12px; text-decoration: none; font-weight: 900; border: 4px solid #fff; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <div class="back-btn" onclick="location.href='https://necotastudio.com/'">← HOME</div>
        <h1>JUICY RIDER</h1>
        <img src="https://placehold.jp/150x150.png?text=RIDER" class="user-icon">
    </div>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('garage')">GARAGE</button>
        <button class="tab-btn" onclick="switchTab('drive')">DRIVE</button>
    </div>

    <!-- ガレージパネル -->
    <div id="garage" class="content-panel active">
        <select class="machine-selector">
            <option>🍊 CITRUS-CRUISER V1</option>
            <option>🍓 BERRY-BOOSTER X</option>
            <option>🍈 MELON-MONSTER Z</option>
        </select>
        <div class="parts-status">
            <div class="part-box"><span class="part-label">Engine</span><span class="part-lv">Lv.12</span></div>
            <div class="part-box"><span class="part-label">Tank</span><span class="part-lv">Lv.08</span></div>
            <div class="part-box"><span class="part-label">Tire</span><span class="part-lv">Lv.15</span></div>
        </div>
        <div style="background:#eee; padding:15px; border:2px dashed #999; text-align:center; font-size:12px;">
            果汁を絞ってマシンを強化しろ！
        </div>
    </div>

    <!-- ドライブパネル -->
    <div id="drive" class="content-panel">
        <div id="map"></div>
        <div class="status-bar">
            <div>TOTAL: <span id="dist-val">124.5</span> km</div>
            <div>TODAY: <span id="today-val">0.0</span> g</div>
        </div>
        <div class="system-container">
            <button class="btn-load" onclick="handleLoad()">果汁×荷重SYSTEM<span class="big-go">GO！</span></button>
        </div>
        <div onclick="shareX()" class="x-share-btn">𝕏 爆走を報告する</div>
    </div>
</div>

<script>
    // タブ切り替え
    function switchTab(tabId) {
        document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        // マップの再描画が必要な場合があるため
        if(tabId === 'drive') initMap();
    }

    // マップ初期化
    function initMap() {
        const mapDiv = document.getElementById('map');
        if (!mapDiv) return;
        const map = new google.maps.Map(mapDiv, {
            center: { lat: 35.6812, lng: 139.7671 },
            zoom: 15,
            disableDefaultUI: true,
            styles: [{ featureType: "all", elementType: "labels", stylers: [{ visibility: "on" }] }]
        });
    }

    // 果汁注入アクション
    function handleLoad() {
        alert("果汁を注入！荷重システムが起動しました！");
        const todayVal = document.getElementById('today-val');
        todayVal.innerText = (parseFloat(todayVal.innerText) + 150).toFixed(1);
    }

    // Xシェア
    window.shareX = () => {
        const todayDist = document.getElementById('today-val').innerText;
        const odo = document.getElementById('dist-val').innerText;
        const text = `!!! JUICY RIDER ALERT !!!\n\n果汁を ${todayDist}g 搾り取ってマシンにブチ込んだぜ！\nODOメーターはついに ${odo}km を突破ッ！！\n\n#JUICYRIDER #necotastudio #搾りたて爆走`;
        const url = `https://x.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(location.href)}`;
        window.open(url, '_blank');
    };
</script>
</body>
</html>
