<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JUICY RIDER | necotastudio</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Noto+Sans+JP:wght@900&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --comic-yellow: #ffde00; --comic-red: #e60012; --black: #000; --neon-green: #00ff00; }
        body { background: #ddd; background-image: radial-gradient(var(--black) 10%, transparent 11%); background-size: 15px 15px; font-family: 'Noto Sans JP', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .app-card { background: white; border: 6px solid var(--black); width: 100%; max-width: 450px; box-shadow: 12px 12px 0px var(--black); overflow: hidden; position: relative; min-height: 900px; display: flex; flex-direction: column; }
        
        /* ログイン名表示エリア */
        #login-banner { background: var(--black); color: white; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; z-index: 100; border-bottom: 2px solid #333; }
        #user-greeting { font-weight: 900; color: var(--comic-yellow); }

        /* 巨大タイトル */
        .header { background: var(--comic-yellow); border-bottom: 6px solid var(--black); padding: 35px 15px; display: flex; align-items: center; gap: 10px; position: relative; }
        h1 { font-family: 'Bangers', cursive; font-size: 72px; color: var(--comic-red); text-shadow: 6px 6px 0px var(--black); -webkit-text-stroke: 2px var(--black); margin: 0; transform: rotate(-4deg) scale(1.1); flex-grow: 1; text-align: center; line-height: 0.75; z-index: 2; }
        
        .back-btn { background: var(--black); color: white; border: 2px solid white; padding: 8px 12px; font-size: 12px; font-weight: 900; cursor: pointer; text-decoration: none; border-radius: 4px; z-index: 10; }
        .user-icon { width: 75px; height: 75px; border: 5px solid var(--black); background: white; border-radius: 50%; object-fit: cover; box-shadow: 4px 4px 0px var(--black); transform: rotate(5deg); }

        .tab-menu { display: flex; background: var(--black); }
        .tab-btn { flex: 1; padding: 16px; color: #888; background: #222; border: none; font-weight: 900; cursor: pointer; }
        .tab-btn.active { background: white; color: var(--black); }
        .content-panel { display: none; padding: 15px; flex-grow: 1; overflow-y: auto; }
        .content-panel.active { display: block; }

        /* パーツステータス */
        .parts-status { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 10px; }
        .part-box { background: #222; border: 2px solid var(--black); padding: 5px; color: var(--neon-green); font-size: 10px; text-align: center; }
        .part-lv { color: var(--comic-yellow); font-weight: 900; font-size: 14px; display: block; }

        /* カレンダー(🍊スタンプ) */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); border: 4px solid var(--black); background: #fff; margin-bottom: 15px; }
        .cal-day { aspect-ratio: 1; border: 1px solid #eee; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; position: relative; cursor: pointer; }
        .cal-day.has-data::after { content: '🍊'; font-size: 18px; position: absolute; bottom: 1px; }
        .cal-day.selected { background: var(--comic-yellow); border: 3px solid var(--black); z-index: 5; font-weight: 900; }
        .cal-header { background: var(--black); color: white; font-size: 12px; text-align: center; padding: 6px 0; }

        .engine-panel { background: #111; color: var(--neon-green); padding: 12px; font-family: 'Courier New', monospace; border: 3px solid var(--black); text-align: center; margin-bottom: 10px; }
        .status-bar { background: var(--black); color: white; padding: 12px; display: flex; justify-content: space-between; font-size: 14px; font-weight: 900; }
        .btn-load { background: var(--comic-red); color: white; border: 4px solid var(--black); padding: 20px; font-weight: 900; font-size: 26px; width: 100%; cursor: pointer; box-shadow: 8px 8px 0 var(--black); margin-top: 5px; }
        .btn-load:disabled { background: #555 !important; color: #888 !important; cursor: not-allowed; box-shadow: none !important; }
        #alert-box { display: none; background: var(--comic-red); color: white; padding: 10px; border: 4px solid var(--black); font-weight: 900; text-align: center; margin-bottom: 10px; animation: blink 0.5s infinite alternate; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.6; } }
    </style>
</head>
<body>

<div class="app-card">
    <div id="login-banner">
        <span id="user-greeting">HELLO, RIDER!</span>
        <div style="display: flex; align-items: center; gap: 5px;">
            <div id="g_id_onload" data-client_id="1093173509944-ssn8tds7tgcb0r1i5lv1ir5lnk311dvv.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
            <div class="g_id_signin" data-type="standard" data-size="small"></div>
            <span id="sync-status" style="font-size: 9px; opacity: 0.7;">☁️ OFF</span>
        </div>
    </div>

    <div class="header">
        <a href="https://necotastudio.github.io" class="back-btn">BACK</a>
        <h1>JUICY RIDER</h1>
        <img id="user-img" src="juicy.png" class="user-icon" onerror="this.src='https://placehold.jp/120x120.png?text=RIDER'">
    </div>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('main', this)">COCKPIT</button>
        <button class="tab-btn" onclick="switchTab('history', this)">FUEL LOG</button>
    </div>

    <div id="panel-main" class="content-panel active">
        <div class="parts-status">
            <div class="part-box">ENG<span id="lv-eng" class="part-lv">Lv.1</span><small>Citrus</small></div>
            <div class="part-box">TIRE<span id="lv-tire" class="part-lv">Lv.1</span><small>Smooth</small></div>
            <div class="part-box">MUFF<span id="lv-muff" class="part-lv">Lv.1</span><small>Wild</small></div>
        </div>

        <div class="engine-panel">
            <span id="engine-name" style="font-size: 20px; color: var(--comic-yellow); font-weight:900;">50cc MOPED</span><br>
            NEXT: <span id="next-goal-name">--</span> まで <span id="next-goal-dist">--</span> km
        </div>
        
        <div class="status-bar">
            <span>ODO: <span id="dist-val">0.0</span> km</span>
            <span>TODAY: <span id="today-val">0</span> / 500g</span>
        </div>
        <div id="alert-box">⚠️ OVER-EATING WARNING! (LOCKED)</div>

        <select id="fruit-select-box" class="fruit-select" onchange="updateUnit()" style="width:100%; border:4px solid #000; padding:14px; margin:10px 0; font-size:20px; font-weight:900;">
            <option value="アサイー">アサイー</option> <option value="アセロラ">アセロラ</option> <option value="アボカド">アボカド</option>
            <option value="アンズ">アンズ</option> <option value="イチジク">イチジク</option> <option value="イチゴ">イチゴ</option>
            <option value="イヨカン">イヨカン</option> <option value="ウメ">ウメ</option> <option value="オレンジ" selected>オレンジ</option>
            <option value="カキ">カキ</option> <option value="カボス">カボス</option> <option value="カリン">カリン</option>
            <option value="キウイ">キウイ</option> <option value="グアバ">グアバ</option> <option value="クランベリー">クランベリー</option>
            <option value="クリ">クリ</option> <option value="グレープフルーツ">グレープフルーツ</option> <option value="サクランボ">サクランボ</option>
            <option value="ザクロ">ザクロ</option> <option value="シークヮーサー">シークヮーサー</option> <option value="ジャックフルーツ">ジャックフルーツ</option>
            <option value="スイカ">スイカ</option> <option value="スターフルーツ">スターフルーツ</option> <option value="スモモ">スモモ</option>
            <option value="デコポン">デコポン</option> <option value="ドリアン">ドリアン</option> <option value="ドラゴンフルーツ">ドラゴンフルーツ</option>
            <option value="ナシ">ナシ</option> <option value="バナナ">バナナ</option> <option value="パパイヤ">パパイヤ</option>
            <option value="ビワ">ビワ</option> <option value="ブドウ">ブドウ</option> <option value="ブルーベリー">ブルーベリー</option>
            <option value="プルーン">プルーン</option> <option value="ブンタン">ブンタン</option> <option value="マンゴー">マンゴー</option>
            <option value="マンゴスチン">マンゴスチン</option> <option value="ミカン">ミカン</option> <option value="メロン">メロン</option>
            <option value="モモ">モモ</option> <option value="ユズ">ユズ</option> <option value="ライチ">ライチ</option>
            <option value="ライム">ライム</option> <option value="ラズベリー">ラズベリー</option> <option value="リンゴ">リンゴ</option>
            <option value="レモン">レモン</option> <option value="100%ジュース">100%ジュース</option>
        </select>

        <div style="display:flex; gap:15px; align-items:center;">
            <input type="number" id="amount-in" value="1.0" step="0.1" style="border:4px solid #000; padding:15px; width:110px; font-size:24px; font-weight:900; text-align:center;">
            <span id="unit-label" style="font-weight:900; font-size:22px;">個</span>
        </div>
        <button id="start-btn" class="btn-load" onclick="handleLoad()">果汁×荷重 START!</button>
    </div>

    <div id="panel-history" class="content-panel">
        <div id="calendar-area"></div>
        <div id="selected-day-summary" style="background:var(--comic-yellow); padding:10px; border:4px solid #000; font-weight:900; text-align:center; margin-bottom:15px;">日付を選択</div>
        <div id="history-list"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyA7pcr0G4qEx0yLNWueZPdaeQoEBjFuoic", authDomain: "necotastudio-app.firebaseapp.com", projectId: "necotastudio-app", storageBucket: "necotastudio-app.firebasestorage.app", messagingSenderId: "1093173509944", appId: "1:1093173509944:web:5340935ddffdd49628cbcd" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let totalDist = parseFloat(localStorage.getItem('juicy_odo')) || 0;
    let history = JSON.parse(localStorage.getItem('juicy_history')) || [];
    let currentUid = null;
    let selectedDate = new Date().toISOString().split('T')[0];

    // パーツアップグレード定義
    const fruitDB = {
        "オレンジ": { weight: 150, rare: 0.8, part: "eng" }, "レモン": { weight: 120, rare: 1.0, part: "eng" }, "ミカン": { weight: 100, rare: 0.8, part: "eng" }, "ユズ": { weight: 120, rare: 1.4, part: "eng" }, "グレープフルーツ": { weight: 400, rare: 0.9, part: "eng" },
        "バナナ": { weight: 120, rare: 0.7, part: "tire" }, "アボカド": { weight: 200, rare: 1.1, part: "tire" }, "マンゴー": { weight: 400, rare: 2.2, part: "tire" }, "メロン": { weight: 1500, rare: 2.0, part: "tire" }, "モモ": { weight: 250, rare: 1.1, part: "tire" },
        "イチゴ": { weight: 20, rare: 1.2, part: "muff" }, "アさいー": { weight: 2, rare: 2.5, part: "muff" }, "ドリアン": { weight: 2500, rare: 5.0, part: "muff" }, "ブルーベリー": { weight: 2, rare: 1.4, part: "muff" }, "ドラゴンフルーツ": { weight: 400, rare: 2.3, part: "muff" },
        "100%ジュース": { weight: 1, rare: 1.0, isLiquid: true, part: "none" }
    };
    const defaultData = { weight: 100, rare: 1.0, part: "none" };
    const goals = [ { d: 50, n: "浅草寺" }, { d: 300, n: "厳島神社" }, { d: 8000, n: "エッフェル塔" }, { d: 40075, n: "地球一周" } ];

    function updateUI() {
        const today = new Date().toISOString().split('T')[0];
        const todayG = history.filter(i => i.date === today).reduce((s, i) => s + i.grams, 0);
        document.getElementById('dist-val').innerText = totalDist.toFixed(1);
        document.getElementById('today-val').innerText = Math.round(todayG);

        const isOver = todayG >= 500;
        document.getElementById('alert-box').style.display = isOver ? 'block' : 'none';
        document.getElementById('start-btn').disabled = isOver;
        if(isOver) document.getElementById('start-btn').innerText = "OVER LIMIT (REST)";
        else document.getElementById('start-btn').innerText = "果汁×荷重 START!";

        // Lv計算
        const calcLv = (p) => Math.floor(history.filter(h => (fruitDB[h.name]||defaultData).part === p).reduce((s, h) => s + h.grams, 0) / 1000) + 1;
        document.getElementById('lv-eng').innerText = `Lv.${calcLv('eng')}`;
        document.getElementById('lv-tire').innerText = `Lv.${calcLv('tire')}`;
        document.getElementById('lv-muff').innerText = `Lv.${calcLv('muff')}`;

        const next = goals.find(g => g.d > totalDist) || { d: 40075, n: "銀河" };
        document.getElementById('next-goal-name').innerText = next.n;
        document.getElementById('next-goal-dist').innerText = (next.d - totalDist).toFixed(1);
    }

    window.updateUnit = () => {
        const name = document.getElementById('fruit-select-box').value;
        document.getElementById('unit-label').innerText = fruitDB[name]?.isLiquid ? "ml" : "個";
    };

    window.handleLoad = () => {
        const name = document.getElementById('fruit-select-box').value;
        const amount = parseFloat(document.getElementById('amount-in').value);
        if (!amount || amount <= 0) return;
        const data = fruitDB[name] || defaultData;
        const grams = data.isLiquid ? amount : (amount * (data.weight || 100));
        const addKM = (grams * (data.rare || 1.0) / 100);
        totalDist += addKM;
        history.unshift({ id: Date.now(), date: new Date().toISOString().split('T')[0], name: name, grams: grams, km: addKM.toFixed(2), atKm: totalDist.toFixed(1) });
        updateUI(); saveAll();
    };

    window.switchTab = (tab, btn) => {
        document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`panel-${tab}`).classList.add('active');
        btn.classList.add('active');
        if(tab === 'history') renderCalendar();
    };

    function renderCalendar() {
        const now = new Date(); const y = now.getFullYear(); const m = now.getMonth();
        const firstDay = new Date(y, m, 1).getDay();
        const lastDate = new Date(y, m + 1, 0).getDate();
        let html = `<div style="text-align:center; font-weight:900; margin-bottom:10px;">${y} / ${m+1}</div><div class="calendar-grid">`;
        ['日','月','火','水','木','金','土'].forEach(d => html += `<div class="cal-header">${d}</div>`);
        for (let i = 0; i < firstDay; i++) html += '<div class="cal-day"></div>';
        for (let d = 1; d <= lastDate; d++) {
            const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const hasData = history.some(h => h.date === ds);
            const isSel = selectedDate === ds ? 'selected' : '';
            html += `<div class="cal-day ${hasData?'has-data':''} ${isSel}" onclick="selectDate('${ds}')">${d}</div>`;
        }
        document.getElementById('calendar-area').innerHTML = html + '</div>';
        updateHistoryUI();
    }

    window.selectDate = (date) => { selectedDate = date; renderCalendar(); };

    function updateHistoryUI() {
        const filtered = history.filter(i => i.date === selectedDate);
        document.getElementById('selected-day-summary').innerText = `${selectedDate} 合計: ${Math.round(filtered.reduce((s,i)=>s+i.grams,0))}g`;
        document.getElementById('history-list').innerHTML = filtered.map(i => `<div style="border:2px solid #000; margin-bottom:5px; padding:10px; display:flex; justify-content:space-between; background:white;"><b>${i.name}</b><span style="color:red; font-weight:900;">+${i.km}km</span><button onclick="deleteItem(${i.id})" style="border:none; background:none; cursor:pointer;">×</button></div>`).join('') || '記録なし';
    }

    window.deleteItem = (id) => {
        const idx = history.findIndex(i => i.id === id);
        if (idx > -1) {
            totalDist = Math.max(0, totalDist - parseFloat(history[idx].km));
            history.splice(idx, 1);
            updateUI(); updateHistoryUI(); renderCalendar(); saveAll();
        }
    };

    async function saveAll() {
        localStorage.setItem('juicy_odo', totalDist);
        localStorage.setItem('juicy_history', JSON.stringify(history));
        if (currentUid) await setDoc(doc(db, "juicy_rider", currentUid), { odo: totalDist, history: history }, { merge: true });
    }

    window.handleCredentialResponse = async (response) => {
        const payload = JSON.parse(decodeURIComponent(escape(atob(response.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')))));
        currentUid = payload.sub;
        document.getElementById('user-img').src = payload.picture;
        // ユーザー名を表示
        document.getElementById('user-greeting').innerText = `HI, ${payload.name.toUpperCase()} RIDER!`;
        document.getElementById('sync-status').innerText = "☁️ ON";
        const docSnap = await getDoc(doc(db, "juicy_rider", currentUid));
        if (docSnap.exists()) {
            totalDist = Math.max(totalDist, docSnap.data().odo || 0);
            history = docSnap.data().history || history;
        }
        updateUI(); saveAll();
    };

    updateUI();
</script>
</body>
</html>
