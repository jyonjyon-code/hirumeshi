<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JUICY RIDER | necotastudio</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Noto+Sans+JP:wght@900&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCjHURgB5A-iLwJ8sG3_KXSrdTXZEAg7Ms&callback=initMap&libraries=marker&v=beta" async defer></script>
    <style>
        :root { --comic-yellow: #ffde00; --comic-red: #e60012; --black: #000; --neon-green: #00ff00; }
        body { background: #ddd; background-image: radial-gradient(var(--black) 10%, transparent 11%); background-size: 15px 15px; font-family: 'Noto Sans JP', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .app-card { background: white; border: 6px solid var(--black); width: 100%; max-width: 450px; box-shadow: 12px 12px 0px var(--black); display: flex; flex-direction: column; min-height: 100vh; position: relative; margin-bottom: 50px; overflow-y: auto; }
        #login-banner { background: var(--black); color: white; padding: 10px; border-bottom: 4px solid #333; }
        .banner-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        #user-greeting { font-weight: 900; color: var(--comic-yellow); font-size: 14px; letter-spacing: 0.5px; }
        #g_btn_wrapper { display: flex; justify-content: center; background: #fff; padding: 8px; border-radius: 4px; min-height: 40px; }
        .header { background: var(--comic-yellow); border-bottom: 6px solid var(--black); height: 140px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        h1 { font-family: 'Bangers', cursive; font-size: 64px; color: var(--comic-red); text-shadow: 5px 5px 0px var(--black); -webkit-text-stroke: 1.5px var(--black); margin: 0; transform: rotate(-3deg); line-height: 1; z-index: 2; }
        .back-btn { background: var(--black); color: white; border: 3px solid white; padding: 8px 12px; font-size: 12px; font-weight: 900; text-decoration: none; border-radius: 4px; position: absolute; left: 10px; top: 10px; z-index: 10; cursor: pointer; }
        .user-icon { width: 70px; height: 70px; border: 4px solid var(--black); background: white; border-radius: 50%; box-shadow: 3px 3px 0px var(--black); transform: rotate(5deg); position: absolute; right: 10px; bottom: 10px; z-index: 5; object-fit: cover; }
        .tab-menu { display: flex; background: var(--black); gap: 2px; }
        .tab-btn { flex: 1; padding: 18px; color: #888; background: #1a1a1a; border: none; font-weight: 900; cursor: pointer; font-size: 16px; }
        .tab-btn.active { background: white; color: var(--black); }
        .content-panel { display: none; padding: 15px; }
        .content-panel.active { display: block; }
        .machine-selector { border: 4px solid var(--black); margin-bottom: 12px; background: #eee; padding: 12px; font-weight: 900; width: 100%; border-radius: 0; cursor: pointer; font-size: 16px; }
        .parts-status { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
        .part-box { background: #222; border: 3px solid var(--black); padding: 10px 2px; color: var(--neon-green); text-align: center; }
        .part-lv { color: var(--comic-yellow); font-weight: 900; font-size: 20px; display: block; margin-top: 2px; }
        .part-label { font-size: 10px; text-transform: uppercase; font-weight: 900; opacity: 0.9; }
        .engine-panel { background: #111; color: var(--neon-green); padding: 15px; font-family: 'Courier New', monospace; border: 4px solid var(--black); text-align: center; }
        #map { width: 100%; height: 240px; border: 4px solid var(--black); margin-bottom: 10px; background: #eee; }
        .status-bar { background: var(--black); color: white; padding: 15px; display: flex; justify-content: space-between; font-size: 16px; font-weight: 900; border-radius: 4px; }
        #dist-val, #today-val { color: var(--comic-yellow); font-size: 20px; }
        .system-container { background: #222; border: 4px solid var(--black); padding: 15px; margin-top: 15px; position: relative; box-shadow: inset 0 0 15px rgba(0,255,0,0.2); }
        .btn-load { background: var(--comic-red); color: white; border: 5px solid var(--black); padding: 12px; font-weight: 900; font-size: 18px; width: 100%; cursor: pointer; box-shadow: 0 6px 0 var(--black); margin-top: 10px; position: relative; transition: 0.1s; line-height: 1.2; text-align: center; }
        .btn-load .big-go { font-family: 'Bangers', cursive; font-size: 48px; display: block; margin-top: 5px; color: var(--comic-yellow); -webkit-text-stroke: 2px var(--black); letter-spacing: 3px; }
        .btn-load:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--black); }
        .rakuten-link { display: block; margin-top: 15px; background: #bf0000; color: white; text-align: center; padding: 12px; text-decoration: none; font-weight: 900; border: 4px solid var(--black); font-size: 14px; box-shadow: 4px 4px 0px var(--black); cursor: pointer; }
        .cal-nav { display: flex; justify-content: space-between; align-items: center; background: #000; color: #fff; padding: 12px; font-weight: 900; font-size: 18px; }
        .cal-nav button { background: var(--comic-yellow); border: 2px solid #000; font-weight: 900; cursor: pointer; padding: 8px 15px; font-size: 16px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); border: 4px solid var(--black); background: #fff; }
        .cal-day { aspect-ratio: 1; border: 1px solid #eee; display: flex; align-items: center; justify-content: center; font-size: 16px; position: relative; font-weight: 900; cursor: pointer; }
        .cal-day.has-data::after { content: '🍊'; font-size: 10px; position: absolute; bottom: 2px; }
        .cal-day.selected { background: var(--comic-yellow); outline: 4px solid var(--black); z-index: 5; }
        #goal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; color: var(--comic-yellow); text-align: center; font-family: 'Bangers', cursive; }
        .history-item { border: 4px solid #000; margin-bottom: 8px; padding: 14px; display: flex; justify-content: space-between; align-items: center; background: white; font-weight: 900; font-size: 16px; }
    </style>
</head>
<body>

<div id="goal-overlay" onclick="this.style.display='none'">
    <div style="font-size: 50px; -webkit-text-stroke: 2px #000;">DESTINATION REACHED!</div>
    <div id="goal-place-name" style="font-size: 34px; margin: 20px; font-family: 'Noto Sans JP';">--</div>
</div>

<div class="app-card">
    <div id="login-banner">
        <div class="banner-top">
            <span id="user-greeting">PLEASE LOGIN -></span>
            <span id="sync-status" style="font-size: 10px; background: #333; padding: 2px 8px; border-radius: 4px;">☁️ CLOUD: OFF</span>
        </div>
        <div id="g_btn_wrapper"></div>
    </div>

    <div class="header">
        <div class="back-btn" onclick="location.href='https://necotastudio.com/'">← BACK</div>
        <h1>JUICY RIDER</h1>
        <img id="user-img" src="juicy.png" class="user-icon" onerror="this.src='https://placehold.jp/150x150.png?text=RIDER'">
    </div>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('main', this)">COCKPIT</button>
        <button class="tab-btn" onclick="switchTab('history', this)">FUEL LOG</button>
    </div>

    <div id="panel-main" class="content-panel active">
        <select id="machine-select" class="machine-selector" onchange="updateMachine()">
            <option value="0" data-img="juicy.png">50cc MOPED</option>
            <option value="1" data-img="bike_250.png" disabled>250cc STREET</option>
            <option value="2" data-img="bike_1000.png" disabled>1000cc SUPER BIKE</option>
            <option value="3" data-img="space_rider.png" disabled>SPACE RIDER</option>
        </select>

        <div class="parts-status">
            <div class="part-box"><span class="part-label">Engine</span><span id="lv-eng" class="part-lv">Lv.1</span></div>
            <div class="part-box"><span class="part-label">Tire</span><span id="lv-tire" class="part-lv">Lv.1</span></div>
            <div class="part-box"><span class="part-label">Muffler</span><span id="lv-muff" class="part-lv">Lv.1</span></div>
        </div>

        <div class="engine-panel">
            <span id="engine-name" style="font-size: 24px; color: var(--comic-yellow); font-weight:900;">50cc MOPED</span><br>
            <span style="font-size: 12px; color: #fff;">NEXT GOAL: <span id="next-goal-name" style="color:var(--comic-yellow);">--</span></span><br>
            <span style="font-size: 20px; font-weight: 900; color: #fff;">あと <span id="next-goal-dist" style="color:var(--neon-green);">--</span> km</span>
        </div>
        
        <div id="map"></div>
        
        <div class="status-bar">
            <span>ODO: <span id="dist-val">0.0</span> km</span>
            <span>TODAY: <span id="today-val">0</span> / 500g</span>
        </div>

        <div class="fuel-controls" style="margin-top:10px;">
            <select id="fruit-select-box" style="width:100%; padding:14px; font-weight:900; border:4px solid #000; font-size:18px;" onchange="updateUnit()"></select>
            <div style="display:flex; align-items:center; margin-top:10px;">
                <input type="number" id="amount-in" value="1.0" step="0.1" style="flex:1; padding:14px; border:4px solid #000; font-weight:900; font-size:20px;">
                <span id="unit-label" style="font-weight:900; margin-left:10px; width:40px;">個</span>
            </div>
            <div class="system-container">
                <button class="btn-load" onclick="handleLoad()">果汁×荷重SYSTEM<span class="big-go">GO！</span></button>
            </div>
            <div onclick="openRakuten()" class="rakuten-link">
                🛒 果汁給油（楽天で <span id="current-fruit-name">果物</span> を探す）
            </div>
        </div>
    </div>

    <div id="panel-history" class="content-panel">
        <div id="calendar-area"></div>
        <div id="selected-day-summary" style="background:var(--comic-yellow); padding:12px; border:4px solid #000; font-weight:900; text-align:center; margin-top:10px;">日付を選択</div>
        <div id="history-list" style="margin-top:10px; padding-bottom:100px;"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyA7pcr0G4qEx0yLNWueZPdaeQoEBjFuoic", authDomain: "necotastudio-app.firebaseapp.com", projectId: "necotastudio-app", storageBucket: "necotastudio-app.firebasestorage.app", messagingSenderId: "1093173509944", appId: "1:1093173509944:web:5340935ddffdd49628cbcd" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const fruitDB = {
        "オレンジ": { weight: 150, rare: 0.8, part: "eng" }, "レモン": { weight: 120, rare: 1.0, part: "eng" }, "ミカン": { weight: 100, rare: 0.8, part: "eng" }, "グレープフルーツ": { weight: 400, rare: 1.1, part: "eng" }, "ライム": { weight: 80, rare: 1.2, part: "eng" }, "ユズ": { weight: 120, rare: 1.5, part: "eng" }, "デコポン": { weight: 300, rare: 1.0, part: "eng" }, "リンゴ": { weight: 300, rare: 0.9, part: "eng" }, "和梨": { weight: 350, rare: 1.1, part: "eng" }, "柿": { weight: 250, rare: 1.0, part: "eng" },
        "バナナ": { weight: 120, rare: 0.7, part: "tire" }, "アボカド": { weight: 200, rare: 1.1, part: "tire" }, "マンゴー": { weight: 400, rare: 2.2, part: "tire" }, "メロン": { weight: 1500, rare: 2.0, part: "tire" }, "スイカ": { weight: 5000, rare: 1.5, part: "tire" }, "パイナップル": { weight: 1200, rare: 1.8, part: "tire" }, "キウイ": { weight: 100, rare: 1.4, part: "tire" },
        "イチゴ": { weight: 20, rare: 1.2, part: "muff" }, "ブルーベリー": { weight: 2, rare: 1.5, part: "muff" }, "ブドウ": { weight: 15, rare: 1.3, part: "muff" }, "ライチ": { weight: 30, rare: 2.4, part: "muff" }, "ドリアン": { weight: 2500, rare: 5.0, part: "muff" },
        "100%ジュース": { weight: 1, rare: 1.0, isLiquid: true, part: "none" }
    };

    let totalDist = parseFloat(localStorage.getItem('juicy_odo')) || 0;
    let history = JSON.parse(localStorage.getItem('juicy_history')) || [];
    let achievedGoals = JSON.parse(localStorage.getItem('juicy_achieved')) || [];
    let currentUid = null;
    let selectedDate = new Date().toISOString().split('T')[0];
    let viewMonth = new Date().getMonth();
    let viewYear = new Date().getFullYear();
    let map, marker;

    const goals = [ { d: 50, n: "浅草寺" }, { d: 300, n: "厳島神社" }, { d: 8000, n: "エッフェル塔" }, { d: 40075, n: "地球一周" } ];
    const machines = ["50cc MOPED", "250cc STREET", "1000cc SUPER BIKE", "SPACE RIDER"];

    window.initMap = async function() {
        if (!window.google || !google.maps.importLibrary) return;
        const { Map } = await google.maps.importLibrary("maps");
        const { AdvancedMarkerElement } = await google.maps.importLibrary("marker");
        const startPos = { lat: 35.6812, lng: 139.7671 };
        try {
            map = new Map(document.getElementById("map"), { center: startPos, zoom: 12, disableDefaultUI: true, mapId: "DEMO_MAP_ID" });
            marker = new AdvancedMarkerElement({ position: startPos, map: map });
            updateMapPosition();
        } catch(e) { console.error(e); }
    };

    function updateMapPosition() {
        if (!map || !marker) return;
        const newPos = { lat: 35.6812 + (totalDist * 0.009), lng: 139.7671 };
        map.setCenter(newPos); marker.position = newPos;
    }

    function updateUI() {
        const today = new Date().toISOString().split('T')[0];
        const todayG = history.filter(i => i.date === today).reduce((s, i) => s + i.grams, 0);
        document.getElementById('dist-val').innerText = totalDist.toFixed(1);
        document.getElementById('today-val').innerText = Math.round(todayG);
        
        const calcLv = (p) => Math.floor(history.filter(h => (fruitDB[h.name]||{part:"none"}).part === p).reduce((s, h) => s + h.grams, 0) / 1000) + 1;
        document.getElementById('lv-eng').innerText = `Lv.${calcLv('eng')}`;
        document.getElementById('lv-tire').innerText = `Lv.${calcLv('tire')}`;
        document.getElementById('lv-muff').innerText = `Lv.${calcLv('muff')}`;
        
        const next = goals.find(g => g.d > totalDist) || { d: 40075, n: "GALAXY" };
        document.getElementById('next-goal-name').innerText = next.n;
        document.getElementById('next-goal-dist').innerText = (next.d - totalDist).toFixed(1);

        const mSelect = document.getElementById('machine-select');
        for(let i=1; i<=3; i++) mSelect.options[i].disabled = totalDist < [100, 1000, 10000][i-1];
        updateMapPosition();
    }

    window.updateMachine = () => {
        const select = document.getElementById('machine-select');
        document.getElementById('engine-name').innerText = machines[select.value];
        document.getElementById('user-img').src = select.options[select.selectedIndex].dataset.img;
    };

    window.handleLoad = () => {
        const name = document.getElementById('fruit-select-box').value;
        const amount = parseFloat(document.getElementById('amount-in').value);
        if (!amount || amount <= 0) return;

        // ★ 給油した果物名を確定表示
        document.getElementById('current-fruit-name').innerText = name;

        const data = fruitDB[name] || { weight: 100, rare: 1.0, part: "none" };
        const grams = data.isLiquid ? amount : (amount * data.weight);
        const addKM = (grams * data.rare / 100);
        totalDist += addKM;
        history.unshift({ id: Date.now(), date: new Date().toISOString().split('T')[0], name: name, grams: grams, km: addKM.toFixed(2) });
        updateUI(); saveAll();
    };

    window.updateUnit = () => {
        const name = document.getElementById('fruit-select-box').value;
        document.getElementById('unit-label').innerText = fruitDB[name]?.isLiquid ? "ml" : "個";
    };

    // ★ 楽天リンク：楽天の推奨する「検索結果への直接リンク」形式に変更
    window.openRakuten = () => {
        const name = document.getElementById('current-fruit-name').innerText;
        const RAKUTEN_AFID = "3f2089b0.6cc33df8.3f2089b1.1896894d";
        
        let keyword = name;
        if (name === "イチゴ") keyword = "あまおう いちご ギフト";
        if (name === "メロン") keyword = "クラウンメロン 訳あり";

        // 【最重要】楽天アフィリエイトのカスタムリンク形式
        // pcパラメータに渡す検索URLは、https://search.rakuten.co.jp/search/mall/キーワード/
        const targetSearchUrl = "https://search.rakuten.co.jp/search/mall/" + encodeURIComponent(keyword) + "/";
        
        // 楽天のゲートウェイURLを組み立て
        // pc= 以下のURLは、さらに全体をエンコードする必要がある
        const finalUrl = "https://hb.afl.rakuten.co.jp/hgc/" + RAKUTEN_AFID + "/?pc=" + encodeURIComponent(targetSearchUrl);
        
        window.open(finalUrl, '_blank');
    };

    window.switchTab = (tab, btn) => {
        document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`panel-${tab}`).classList.add('active');
        btn.classList.add('active');
        if(tab === 'history') renderCalendar();
    };

    window.changeMonth = (diff) => { viewMonth += diff; if (viewMonth < 0) { viewMonth = 11; viewYear--; } if (viewMonth > 11) { viewMonth = 0; viewYear++; } renderCalendar(); };
    window.selectDate = (date) => { selectedDate = date; renderCalendar(); };

    function renderCalendar() {
        const firstDay = new Date(viewYear, viewMonth, 1).getDay();
        const lastDate = new Date(viewYear, viewMonth + 1, 0).getDate();
        let html = `<div class="cal-nav"><button onclick="changeMonth(-1)">◀</button><span>${viewYear} / ${viewMonth+1}</span><button onclick="changeMonth(1)">▶</button></div><div class="calendar-grid">`;
        ['日','月','火','水','木','金','土'].forEach(d => html += `<div style="background:#000; color:#fff; text-align:center; padding:8px; font-size:12px;">${d}</div>`);
        for (let i = 0; i < firstDay; i++) html += '<div class="cal-day"></div>';
        for (let d = 1; d <= lastDate; d++) {
            const ds = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isSel = selectedDate === ds ? 'selected' : '';
            const hasData = history.some(h => h.date === ds);
            html += `<div class="cal-day ${hasData?'has-data':''} ${isSel}" onclick="selectDate('${ds}')">${d}</div>`;
        }
        document.getElementById('calendar-area').innerHTML = html + '</div>';
        updateHistoryUI();
    }

    function updateHistoryUI() {
        const filtered = history.filter(i => i.date === selectedDate);
        document.getElementById('selected-day-summary').innerText = `${selectedDate} : ${Math.round(filtered.reduce((s,i)=>s+i.grams,0))}g`;
        document.getElementById('history-list').innerHTML = filtered.map(i => `<div class="history-item"><div>${i.name} <span style="color:red; margin-left:10px;">+${i.km}km</span></div><div onclick="deleteItem(${i.id})" style="cursor:pointer; color:red; font-size:20px;">×</div></div>`).join('') || '<div style="text-align:center; opacity:0.5; padding:30px;">記録なし</div>';
    }

    window.deleteItem = (id) => {
        const idx = history.findIndex(i => i.id === id);
        if (idx > -1) { totalDist = Math.max(0, totalDist - parseFloat(history[idx].km)); history.splice(idx, 1); updateUI(); renderCalendar(); saveAll(); }
    };

    async function saveAll() {
        localStorage.setItem('juicy_odo', totalDist);
        localStorage.setItem('juicy_history', JSON.stringify(history));
        if (currentUid) { await setDoc(doc(db, "juicy_rider", currentUid), { odo: totalDist, history: history }, { merge: true }); document.getElementById('sync-status').innerText = "☁️ CLOUD: ON"; }
    }

    window.handleCredentialResponse = async (response) => {
        const payload = JSON.parse(decodeURIComponent(escape(atob(response.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')))));
        currentUid = payload.sub;
        document.getElementById('user-greeting').innerText = `HI, ${payload.given_name?.toUpperCase()}!`;
        const docSnap = await getDoc(doc(db, "juicy_rider", currentUid));
        if (docSnap.exists()) { totalDist = Math.max(totalDist, docSnap.data().odo || 0); history = docSnap.data().history || history; }
        updateUI(); saveAll();
    };

    window.initGoogleBtn = () => {
        if (window.google && google.accounts) {
            google.accounts.id.initialize({ client_id: "1093173509944-ssn8tds7tgcb0r1i5lv1ir5lnk311dvv.apps.googleusercontent.com", callback: window.handleCredentialResponse });
            google.accounts.id.renderButton(document.getElementById("g_btn_wrapper"), { theme: "outline", size: "large" });
        } else { setTimeout(window.initGoogleBtn, 500); }
    };

    window.onload = () => {
        const select = document.getElementById('fruit-select-box');
        Object.keys(fruitDB).forEach(f => {
            const opt = document.createElement('option'); opt.value = f; opt.innerText = f; select.appendChild(opt);
        });
        updateUI(); updateUnit(); window.initGoogleBtn();
    };
</script>
</body>
</html>
