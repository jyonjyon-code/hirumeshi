<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JUICY RIDER | necotastudio</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Noto+Sans+JP:wght@900&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --comic-yellow: #ffde00; --comic-red: #e60012; --black: #000; --neon-green: #00ff00; }
        body { background: #ddd; background-image: radial-gradient(var(--black) 10%, transparent 11%); background-size: 15px 15px; font-family: 'Noto Sans JP', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .app-card { background: white; border: 6px solid var(--black); width: 100%; max-width: 450px; box-shadow: 12px 12px 0px var(--black); overflow: hidden; display: flex; flex-direction: column; min-height: 950px; position: relative; }
        
        /* ログインバナー */
        #login-banner { background: var(--black); color: white; padding: 10px; border-bottom: 4px solid #333; }
        .banner-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        #user-greeting { font-weight: 900; color: var(--comic-yellow); font-size: 12px; }
        .sync-badge { font-size: 9px; background: #333; padding: 2px 6px; border-radius: 4px; }
        #g_btn_wrapper { display: flex; justify-content: center; background: #fff; padding: 8px; border-radius: 4px; min-height: 40px; }

        /* ヘッダー */
        .header { background: var(--comic-yellow); border-bottom: 6px solid var(--black); height: 140px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        h1 { font-family: 'Bangers', cursive; font-size: 60px; color: var(--comic-red); text-shadow: 5px 5px 0px var(--black); -webkit-text-stroke: 1.5px var(--black); margin: 0; transform: rotate(-3deg); line-height: 1; z-index: 2; }
        .back-btn { background: var(--black); color: white; border: 2px solid white; padding: 5px 8px; font-size: 10px; font-weight: 900; text-decoration: none; border-radius: 4px; position: absolute; left: 10px; top: 10px; z-index: 10; }
        .user-icon { width: 70px; height: 70px; border: 4px solid var(--black); background: white; border-radius: 50%; box-shadow: 3px 3px 0px var(--black); transform: rotate(5deg); position: absolute; right: 10px; bottom: 10px; z-index: 5; object-fit: cover; }

        .tab-menu { display: flex; background: var(--black); gap: 2px; }
        .tab-btn { flex: 1; padding: 15px; color: #888; background: #1a1a1a; border: none; font-weight: 900; cursor: pointer; font-size: 14px; }
        .tab-btn.active { background: white; color: var(--black); }

        .content-panel { display: none; padding: 15px; flex-grow: 1; }
        .content-panel.active { display: block; }

        .parts-status { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
        .part-box { background: #222; border: 3px solid var(--black); padding: 8px 2px; color: var(--neon-green); text-align: center; }
        .part-lv { color: var(--comic-yellow); font-weight: 900; font-size: 16px; display: block; margin-top: 2px; }
        .part-label { font-size: 9px; text-transform: uppercase; font-weight: 900; opacity: 0.8; }

        .engine-panel { background: #111; color: var(--neon-green); padding: 12px; font-family: 'Courier New', monospace; border: 4px solid var(--black); text-align: center; margin-bottom: 10px; }
        .status-bar { background: var(--black); color: white; padding: 12px; display: flex; justify-content: space-between; font-size: 14px; font-weight: 900; border-radius: 4px; }
        
        .fuel-controls { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
        select, input { border: 4px solid var(--black); padding: 12px; font-size: 18px; font-weight: 900; width: 100%; box-sizing: border-box; }
        .amount-row { display: flex; gap: 10px; align-items: center; }
        
        .btn-load { background: var(--comic-red); color: white; border: 5px solid var(--black); padding: 20px; font-weight: 900; font-size: 24px; width: 100%; cursor: pointer; box-shadow: 8px 8px 0 var(--black); margin-top: 10px; }
        .btn-load:active { transform: translate(2px, 2px); box-shadow: 6px 6px 0 var(--black); }
        .btn-load:disabled { background: #555 !important; box-shadow: none; color: #888; }

        #alert-box { display: none; background: var(--comic-red); color: white; padding: 10px; border: 4px solid var(--black); font-weight: 900; text-align: center; margin-bottom: 10px; animation: blink 0.5s infinite alternate; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.7; } }

        .history-item { border: 4px solid #000; margin-bottom: 8px; padding: 12px; display: flex; justify-content: space-between; align-items: center; background: white; font-weight: 900; }
        .del-btn { background: var(--comic-red); color: white; border: 2px solid #000; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 4px; font-size: 20px; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); border: 4px solid var(--black); background: #fff; }
        .cal-day { aspect-ratio: 1; border: 1px solid #eee; display: flex; align-items: center; justify-content: center; font-size: 14px; position: relative; font-weight: 900; cursor: pointer; }
        .cal-day.has-data::after { content: '🍊'; font-size: 16px; position: absolute; bottom: 2px; }
        .cal-day.selected { background: var(--comic-yellow); outline: 3px solid var(--black); z-index: 5; }
        .cal-header { background: var(--black); color: white; font-size: 11px; text-align: center; padding: 8px 0; }
    </style>
</head>
<body>

<div class="app-card">
    <div id="login-banner">
        <div class="banner-top">
            <span id="user-greeting">PLEASE LOGIN -></span>
            <span id="sync-status" class="sync-badge">☁️ CLOUD: OFF</span>
        </div>
        <div id="g_btn_wrapper">
            </div>
    </div>

    <div class="header">
        <a href="https://necotastudio.github.io" class="back-btn">BACK</a>
        <h1 id="main-logo">JUICY RIDER</h1>
        <img id="user-img" src="juicy.png" class="user-icon" onerror="this.src='https://placehold.jp/150x150.png?text=RIDER'">
    </div>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('main', this)">COCKPIT</button>
        <button class="tab-btn" onclick="switchTab('history', this)">FUEL LOG</button>
    </div>

    <div id="panel-main" class="content-panel active">
        <div class="parts-status">
            <div class="part-box"><span class="part-label">Engine</span><span id="lv-eng" class="part-lv">Lv.1</span></div>
            <div class="part-box"><span class="part-label">Tire</span><span id="lv-tire" class="part-lv">Lv.1</span></div>
            <div class="part-box"><span class="part-label">Muffler</span><span id="lv-muff" class="part-lv">Lv.1</span></div>
        </div>

        <div class="engine-panel">
            <span id="engine-name" style="font-size: 20px; color: var(--comic-yellow); font-weight:900;">50cc MOPED</span><br>
            <span style="font-size: 11px; opacity: 0.8;">NEXT GOAL: <span id="next-goal-name">--</span></span><br>
            <span style="font-size: 16px; font-weight: 900;"><span id="next-goal-dist">--</span> km</span>
        </div>
        
        <div class="status-bar">
            <span>ODO: <span id="dist-val">0.0</span> km</span>
            <span>TODAY: <span id="today-val">0</span> / 500g</span>
        </div>

        <div id="alert-box">⚠️ OVER-EATING WARNING!</div>

        <div class="fuel-controls">
            <select id="fruit-select-box" onchange="updateUnit()">
                <option value="アサイー">アサイー</option> <option value="アセロラ">アセロラ</option> <option value="アボカド">アボカド</option>
                <option value="アンズ">アンズ</option> <option value="イチジク">イチジク</option> <option value="イチゴ">イチゴ</option>
                <option value="イヨカン">イヨカン</option> <option value="ウメ">ウメ</option> <option value="オレンジ" selected>オレンジ</option>
                <option value="カキ">カキ</option> <option value="カボス">カボス</option> <option value="カリン">カリン</option>
                <option value="キウイ">キウイ</option> <option value="グアバ">グアバ</option> <option value="クランベリー">クランベリー</option>
                <option value="クリ">クリ</option> <option value="グレープフルーツ">グレープフルーツ</option> <option value="サクランボ">サクランボ</option>
                <option value="ザクロ">ザクロ</option> <option value="シークヮーサー">シークヮーサー</option> <option value="ジャックフルーツ">ジャックフルーツ</option>
                <option value="スイカ">スイカ</option> <option value="スターフルーツ">スターフルーツ</option> <option value="スモモ">スモモ</option>
                <option value="デコポン">デコポン</option> <option value="ドリアン">ドリアン</option> <option value="ドラゴンフルーツ">ドラゴンフルーツ</option>
                <option value="ナシ">ナシ</option> <option value="バナナ">バナナ</option> <option value="パパイヤ">パパイヤ</option>
                <option value="ビワ">ビワ</option> <option value="ブドウ">ブドウ</option> <option value="ブルーベリー">ブルーベリー</option>
                <option value="プルーン">プルーン</option> <option value="ブンタン">ブンタン</option> <option value="マンゴー">マンゴー</option>
                <option value="マンゴスチン">マンゴスチン</option> <option value="ミカン">ミカン</option> <option value="メロン">メロン</option>
                <option value="モモ">モモ</option> <option value="ユズ">ユズ</option> <option value="ライチ">ライチ</option>
                <option value="ライム">ライム</option> <option value="ラズベリー">ラズベリー</option> <option value="リンゴ">リンゴ</option>
                <option value="レモン">レモン</option> <option value="100%ジュース">100%ジュース</option>
            </select>
            <div class="amount-row">
                <input type="number" id="amount-in" value="1.0" step="0.1">
                <span id="unit-label" style="font-weight:900; margin-left:5px;">個</span>
            </div>
            <button id="start-btn" class="btn-load" onclick="handleLoad()">果汁×荷重 START!</button>
        </div>
    </div>

    <div id="panel-history" class="content-panel">
        <div id="calendar-area"></div>
        <div id="selected-day-summary" style="background:var(--comic-yellow); padding:10px; border:4px solid #000; font-weight:900; text-align:center; margin-top:10px;">日付を選択</div>
        <div id="history-list" style="margin-top:10px;"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyA7pcr0G4qEx0yLNWueZPdaeQoEBjFuoic", authDomain: "necotastudio-app.firebaseapp.com", projectId: "necotastudio-app", storageBucket: "necotastudio-app.firebasestorage.app", messagingSenderId: "1093173509944", appId: "1:1093173509944:web:5340935ddffdd49628cbcd" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let totalDist = parseFloat(localStorage.getItem('juicy_odo')) || 0;
    let history = JSON.parse(localStorage.getItem('juicy_history')) || [];
    let currentUid = null;
    let selectedDate = new Date().toISOString().split('T')[0];

    const fruitDB = {
        "オレンジ": { weight: 150, rare: 0.8, part: "eng" }, "レモン": { weight: 120, rare: 1.0, part: "eng" }, "ミカン": { weight: 100, rare: 0.8, part: "eng" }, "ユズ": { weight: 120, rare: 1.4, part: "eng" }, "グレープフルーツ": { weight: 400, rare: 0.9, part: "eng" },
        "バナナ": { weight: 120, rare: 0.7, part: "tire" }, "アボカド": { weight: 200, rare: 1.1, part: "tire" }, "マンゴー": { weight: 400, rare: 2.2, part: "tire" }, "メロン": { weight: 1500, rare: 2.0, part: "tire" }, "モモ": { weight: 250, rare: 1.1, part: "tire" },
        "イチゴ": { weight: 20, rare: 1.2, part: "muff" }, "アサイー": { weight: 2, rare: 2.5, part: "muff" }, "ドリアン": { weight: 2500, rare: 5.0, part: "muff" }, "ブルーベリー": { weight: 2, rare: 1.4, part: "muff" }, "ドラゴンフルーツ": { weight: 400, rare: 2.3, part: "muff" },
        "100%ジュース": { weight: 1, rare: 1.0, isLiquid: true, part: "none" }
    };
    const goals = [ { d: 50, n: "浅草寺" }, { d: 300, n: "厳島神社" }, { d: 8000, n: "エッフェル塔" }, { d: 40075, n: "地球一周" } ];

    function updateUI() {
        const today = new Date().toISOString().split('T')[0];
        const todayG = history.filter(i => i.date === today).reduce((s, i) => s + i.grams, 0);
        document.getElementById('dist-val').innerText = totalDist.toFixed(1);
        document.getElementById('today-val').innerText = Math.round(todayG);
        document.getElementById('alert-box').style.display = todayG >= 500 ? 'block' : 'none';
        document.getElementById('start-btn').disabled = todayG >= 500;
        const calcLv = (p) => Math.floor(history.filter(h => (fruitDB[h.name]||{part:"none"}).part === p).reduce((s, h) => s + h.grams, 0) / 1000) + 1;
        document.getElementById('lv-eng').innerText = `Lv.${calcLv('eng')}`;
        document.getElementById('lv-tire').innerText = `Lv.${calcLv('tire')}`;
        document.getElementById('lv-muff').innerText = `Lv.${calcLv('muff')}`;
        const next = goals.find(g => g.d > totalDist) || { d: 40075, n: "GALAXY" };
        document.getElementById('next-goal-name').innerText = next.n;
        document.getElementById('next-goal-dist').innerText = (next.d - totalDist).toFixed(1);
    }

    // --- Google Login 対策 ---
    window.handleCredentialResponse = async (response) => {
        try {
            const payload = JSON.parse(decodeURIComponent(escape(atob(response.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')))));
            currentUid = payload.sub;
            document.getElementById('user-img').src = payload.picture;
            document.getElementById('user-greeting').innerText = `HI, ${payload.given_name?.toUpperCase() || 'RIDER'}!`;
            document.getElementById('sync-status').innerText = "☁️ CLOUD: ON";
            document.getElementById('g_btn_wrapper').style.display = 'none';
            const docSnap = await getDoc(doc(db, "juicy_rider", currentUid));
            if (docSnap.exists()) {
                totalDist = Math.max(totalDist, docSnap.data().odo || 0);
                history = docSnap.data().history || history;
            }
            updateUI(); saveAll();
        } catch (e) { console.error("Login Error:", e); }
    };

    window.initGoogleBtn = () => {
        if (window.google) {
            google.accounts.id.initialize({
                client_id: "1093173509944-ssn8tds7tgcb0r1i5lv1ir5lnk311dvv.apps.googleusercontent.com",
                callback: window.handleCredentialResponse
            });
            google.accounts.id.renderButton(
                document.getElementById("g_btn_wrapper"),
                { theme: "outline", size: "large" }
            );
        } else { setTimeout(window.initGoogleBtn, 500); }
    };

    // --- 各種操作関数 ---
    window.handleLoad = () => {
        const name = document.getElementById('fruit-select-box').value;
        const amount = parseFloat(document.getElementById('amount-in').value);
        if (!amount || amount <= 0) return;
        const data = fruitDB[name] || { weight: 100, rare: 1.0, part: "none" };
        const grams = data.isLiquid ? amount : (amount * data.weight);
        const addKM = (grams * data.rare / 100);
        totalDist += addKM;
        history.unshift({ id: Date.now(), date: new Date().toISOString().split('T')[0], name: name, grams: grams, km: addKM.toFixed(2) });
        updateUI(); saveAll();
    };

    window.deleteItem = (id) => {
        const idx = history.findIndex(i => i.id === id);
        if (idx > -1) {
            totalDist = Math.max(0, totalDist - parseFloat(history[idx].km));
            history.splice(idx, 1);
            updateUI(); updateHistoryUI(); renderCalendar(); saveAll();
        }
    };

    window.updateUnit = () => {
        const name = document.getElementById('fruit-select-box').value;
        document.getElementById('unit-label').innerText = fruitDB[name]?.isLiquid ? "ml" : "個";
    };

    window.switchTab = (tab, btn) => {
        document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`panel-${tab}`).classList.add('active');
        btn.classList.add('active');
        if(tab === 'history') renderCalendar();
    };

    window.selectDate = (date) => { selectedDate = date; renderCalendar(); };

    function renderCalendar() {
        const now = new Date(); const y = now.getFullYear(); const m = now.getMonth();
        const firstDay = new Date(y, m, 1).getDay();
        const lastDate = new Date(y, m + 1, 0).getDate();
        let html = `<div style="text-align:center; font-weight:900; margin-bottom:12px;">${y} / ${m+1}</div><div class="calendar-grid">`;
        ['SUN','MON','TUE','WED','THU','FRI','SAT'].forEach(d => html += `<div class="cal-header">${d}</div>`);
        for (let i = 0; i < firstDay; i++) html += '<div class="cal-day"></div>';
        for (let d = 1; d <= lastDate; d++) {
            const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isSel = selectedDate === ds ? 'selected' : '';
            const hasData = history.some(h => h.date === ds);
            html += `<div class="cal-day ${hasData?'has-data':''} ${isSel}" onclick="selectDate('${ds}')">${d}</div>`;
        }
        document.getElementById('calendar-area').innerHTML = html + '</div>';
        updateHistoryUI();
    }

    function updateHistoryUI() {
        const filtered = history.filter(i => i.date === selectedDate);
        document.getElementById('selected-day-summary').innerText = `${selectedDate} 合計: ${Math.round(filtered.reduce((s,i)=>s+i.grams,0))}g`;
        document.getElementById('history-list').innerHTML = filtered.map(i => `
            <div class="history-item">
                <div><span>${i.name}</span> <span style="color:var(--comic-red); margin-left:10px;">+${i.km}km</span></div>
                <div class="del-btn" onclick="deleteItem(${i.id})">×</div>
            </div>
        `).join('') || '<div style="text-align:center; opacity:0.5; padding:20px;">記録なし</div>';
    }

    async function saveAll() {
        localStorage.setItem('juicy_odo', totalDist);
        localStorage.setItem('juicy_history', JSON.stringify(history));
        if (currentUid) await setDoc(doc(db, "juicy_rider", currentUid), { odo: totalDist, history: history }, { merge: true });
    }

    // 初期化実行
    updateUI(); updateUnit(); window.initGoogleBtn();
</script>
</body>
</html>
