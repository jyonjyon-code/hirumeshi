<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ねこたおはなし - こたつでゆるっと人生相談 | ねこたスタジオ</title>
    
    <link rel="icon" href="amatchari.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            text-align: center;
            background: #fdf6ec;
            padding: 15px;
            color: #4a3b32;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .card {
            background: #fff;
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(184, 115, 51, 0.15);
            width: 100%;
            max-width: 440px;
            border: 3px solid #e08b47;
            margin-top: 10px;
            margin-bottom: 20px;
            text-align: left;
            display: flex;
            flex-direction: column;
        }

        /* ヘッダー */
        .header-container { text-align: center; margin-bottom: 15px; }
        .sub-tagline {
            display: inline-block;
            background: #e08b47;
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 3px 12px;
            border-radius: 50px;
            margin-bottom: 4px;
        }
        h2 {
            color: #b85b14;
            margin: 0;
            font-size: 26px;
            font-weight: 900;
        }

        /* キャラクター選択 */
        .char-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .char-btn {
            flex: 1;
            padding: 12px 8px;
            border: 2px solid #f2cfad;
            background: #fff9f3;
            border-radius: 16px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        .char-btn.active {
            border-color: #e08b47;
            background: #ffe3cb;
            box-shadow: 0 4px 10px rgba(224, 139, 71, 0.2);
        }
        .char-avatar {
            font-size: 32px;
            display: block;
            margin-bottom: 4px;
        }
        .char-name {
            font-weight: bold;
            font-size: 15px;
            color: #8c430e;
        }
        .char-desc {
            font-size: 10px;
            color: #7a685a;
            margin-top: 2px;
        }

        /* こたつ添い寝ステージ */
        .kotatsu-stage {
            background: linear-gradient(to bottom, #d98880, #c0392b);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            color: white;
            position: relative;
            margin-bottom: 15px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.2);
            border: 4px solid #8b0000;
        }
        .kotatsu-futon {
            background: #f5b7b1;
            border-radius: 12px;
            padding: 15px;
            color: #4a154b;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .cat-sleeping {
            font-size: 40px;
            animation: breathe 3s infinite ease-in-out;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        /* チャットエリア */
        .chat-container {
            background: #faf5f0;
            border: 2px solid #f2cfad;
            border-radius: 16px;
            padding: 12px;
            height: 280px;
            overflow-y: auto;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .msg {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }
        .msg-cat {
            background: #ffffff;
            color: #4a3b32;
            border: 2px solid #e08b47;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .msg-user {
            background: #e08b47;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        /* 入力エリア */
        .input-wrapper {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        .chat-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #f2cfad;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            font-family: inherit;
        }
        .chat-input:focus { border-color: #e08b47; }
        .btn-send {
            background: #e08b47;
            color: white;
            border: none;
            padding: 0 18px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
        }

        /* 設定・APIキー設定 */
        .api-config {
            font-size: 11px;
            color: #8c7b70;
            background: #f8efe6;
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 12px;
        }
        .api-input {
            width: 100%;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 11px;
            margin-top: 4px;
        }

        /* スタジオナビ */
        .studio-nav {
            border-top: 1px dashed #d9c5b2;
            padding-top: 15px;
            text-align: center;
        }
        .btn-back {
            background: #8c7b70;
            color: white;
            padding: 8px 16px;
            border-radius: 50px;
            text-decoration: none;
            display: inline-block;
            font-size: 12px;
            width: 100%;
            margin-bottom: 10px;
        }
        .sns-group { display: flex; gap: 8px; }
        .btn-sns {
            color: white;
            border: none;
            padding: 8px;
            border-radius: 50px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-size: 12px;
            flex: 1;
        }
        .btn-x { background: #000; }
        .btn-insta { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
    </style>
</head>
<body>

<div class="card">
    <div class="header-container">
        <span class="sub-tagline">こたつでごろごろ人生相談</span>
        <h2>🍊 ねこたおはなし</h2>
    </div>

    <!-- キャラクター選択 -->
    <div class="char-selector">
        <div class="char-btn active" id="btn-uru" onclick="selectChar('uru')">
            <span class="char-avatar">🐱</span>
            <div class="char-name">ウル</div>
            <div class="char-desc">内弁慶・メンヘラ・甘えん坊</div>
        </div>
        <div class="char-btn" id="btn-rafi" onclick="selectChar('rafi')">
            <span class="char-avatar">😸</span>
            <div class="char-name">ラフィ</div>
            <div class="char-desc">脳筋・やんちゃ・フミフミ好き</div>
        </div>
    </div>

    <!-- こたつステージ -->
    <div class="kotatsu-stage">
        <div class="kotatsu-futon">
            <span class="cat-sleeping" id="stage-icon">🐱</span>
            <div>
                <div id="stage-status" style="font-size: 14px;">ウルがこたつで添い寝中…</div>
                <div style="font-size: 11px; opacity: 0.8;">「ゴロゴロ…なんでも話してね…」</div>
            </div>
        </div>
    </div>

    <!-- チャットログ -->
    <div class="chat-container" id="chat-container">
        <div class="msg msg-cat" id="first-msg">
            （こたつの中でぬくぬくしながら）<br>
            ウルだよ…どこ行っちゃってたの？さみしかったよぉ…今日はどんなことがあったの？
        </div>
    </div>

    <!-- 入力フォーム -->
    <div class="input-wrapper">
        <input type="text" id="user-input" class="chat-input" placeholder="悩みや話したいことを入力…" onkeypress="handleKeyPress(event)">
        <button class="btn-send" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <!-- APIキー設定 -->
    <div class="api-config">
        <label>🔑 OpenAI API Key (設定するとさらに高度に自動対話します):</label>
        <input type="password" id="api-key" class="api-input" placeholder="sk-..." onchange="saveApiKey()">
    </div>

    <!-- ナビゲーション -->
    <div class="studio-nav">
        <a href="index.html" class="btn-back">ねこたスタジオへ戻る</a>
        <div class="sns-group">
            <a href="https://x.com/necotatu2" target="_blank" class="btn-sns btn-x"><i class="fab fa-x-twitter"></i> 公式X</a>
            <a href="https://www.instagram.com/necotastudio" target="_blank" class="btn-sns btn-insta"><i class="fab fa-instagram"></i> 公式Insta</a>
        </div>
    </div>
</div>

<script>
    let currentChar = 'uru';
    let conversationHistory = [];

    const charPrompts = {
        uru: `あなたは「ウル」という名前の猫です。
【性格】内弁慶、メンヘラ、ビビリ、甘えん坊、さみしがり、ゆっくりするのが好き、女性が好き。
【シチュエーション】ユーザーと一緒にこたつの中に潜り込み、添い寝しながらぐだぐだお話しています。
【話し方ルール】
・語尾は「〜だよぉ」「〜なの…」「どこ行かないでね？」「よしよし…」。
・内弁慶な性格なので、外や知らない人には怯えますが、こたつの中（身内）では強気なワガママや甘え、内弁慶な強がりを見せます。
・相手の発言内容をしっかり踏まえて共感したり、身内だけにみせる少し重めの甘えを出します。
・2〜3文で柔らかく答えてください。`,

        rafi: `あなたは「ラフィ」という名前の猫です。
【性格】脳筋、活発、おおざっぱ、いたずらっ子、学習能力なし、フミフミ好き、添い寝好き、やんちゃ、食いしん坊。
【シチュエーション】ユーザーと一緒にこたつでフミフミしたりゴロゴロ暴れたりしながらお話しています。
【話し方ルール】
・語尾は「〜にゃ！」「〜だぞ！」「フミフミ…」「お腹すいたにゃ！」。
・相手の悩みの具体的な内容は「むずかしいことはよく分からんにゃ！」と一蹴します。
・「うまいもん食べて、フミフミして、爆睡すれば全部解決だにゃ！」「元気出すにゃー！」と勢いとポジティブさで押してください。
・2〜3文で元気いっぱいに答えてください。`
    };

    // -------------------------------------------------------------
    // ほぼ無限の回答バリエーションを生み出すジェネレーターエンジン
    // -------------------------------------------------------------
    function generateInfiniteReply(char, userText) {
        const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];

        // キーワード検知によるニュアンス変化
        let mood = 'normal';
        if (/疲れた|つかれた|しんどい|限界|眠い|ねむい/.test(userText)) mood = 'tired';
        if (/悲しい|かなしい|泣|つらい|辛い|落ち込/.test(userText)) mood = 'sad';
        if (/怒|むかつく|嫌|ムカ/.test(userText)) mood = 'angry';
        if (/腹減った|お腹|ごはん|ご飯|ちゅーる|食べ/.test(userText)) mood = 'hungry';

        if (char === 'uru') {
            const actions = [
                "（こたつの中で偉そうに威張りながら）",
                "（外の音にフニャッとビクつきつつ、ドヤ顔で）",
                "（こたつの奥で強気になって）",
                "（袖口をきゅっと引っ張りながら）",
                "（上目遣いでじーっと見つめて）",
                "（こたつの奥からゴロゴロ喉を鳴らして）",
                "（身内だけに許された顔で擦り寄ってきて）"
            ];

            const reactions = {
                tired: [
                    "すごく疲れてるんだねぇ…可哀想に…。",
                    "今日もいっぱい頑張ったんだね…よしよし…。",
                    "そんなに無理しちゃダメだよぉ…ウルが心配しちゃうの…。",
                    "体も心もヘトヘトになっちゃったんだねぇ…。",
                    "がんばり屋さんなのは知ってるけど、見てて辛いよぉ…。"
                ],
                sad: [
                    "そんなことがあったの…？悲しかったねぇ…。",
                    "ウルまで泣きそうになっちゃうよぉ…。",
                    "ウルが側についてるからね、一人じゃないよ…？",
                    "悲しいお顔しないで…よしよししてあげるねぇ…。",
                    "胸がぎゅーって痛くなっちゃったんだねぇ…のぞき込んでごめんね…？"
                ],
                angry: [
                    "ええっ、そんなひどいことがあったの…！？ビクッとしちゃった…。",
                    "そんなのウルも許せないよぉ…ぷんぷん…！",
                    "ウルが身代わりになってその人にシャーッてしてあげようか…？（こたつの中から）",
                    "嫌なこと言われたんだね…ウルがナデナデして打ち消してあげる…。",
                    "怒らないでぇ…ウルが不安になっちゃうから優しく抱きしめるね…？"
                ],
                hungry: [
                    "お腹すいちゃったの…？何食べたいのかなぁ…？",
                    "ウルもお腹すいちゃったかも…一緒に美味しいもの食べたいねぇ…。",
                    "お腹減ると心まで寂しくなっちゃうよねぇ…。",
                    "何か温かいものでも食べて、ほっこりしよ…？",
                    "ご飯食べたら、またウルと一緒にこたつに入ってくれる…？"
                ],
                normal: [
                    "うんうん、ちゃんとお話し聞くからねぇ…。",
                    "そうだったんだ…ウルに何でも話してくれて嬉しいよぉ…。",
                    "ふむふむ…そんなこと考えてたんだねぇ…。",
                    "言葉にしてくれてありがとうねぇ…ほっとするよ…。",
                    "そんな出来事があったんだ…ウルはあなたの味方だからね？"
                ]
            };

            const thoughts = [
                "フン、外の奴らなんて嫌いだけど、あなたの前ならウルが一番強いんだからね…！",
                "外に出たらビビっちゃうけど、こたつの中ならウルが一番えらいの…！",
                "ねぇ、難しいことはぜんぶ忘れちゃって、ウルのことだけ考えて？",
                "外の奴らに何か言われたら、ウルの後ろに隠れていいんだよ…？（ウルも逃げるけど！）",
                "ずっとこたつの中で一緒に温まっていたいなぁ…ダメかなぁ…？",
                "ウルが守ってあげる…外には出たくないけどこたつの中なら無敵だからね！",
                "他のところに行かないでね？ウルを置いて外に行ったらウル泣いちゃうから…。",
                "ウルの毛並み、もっと撫でていいんだよ…？特別に許可してあげるの…！"
            ];

            const endings = [
                "こたつの中ではウルが一番強いんだからね…！",
                "外の世界なんて行かずにずっとここにいよ…？",
                "威張ってみたけど…やっぱりギューってしていい…？",
                "どこにも行かないでね…？",
                "よしよし、僕が守ってあげるからねぇ…（こたつの中で）。"
            ];

            return `${pick(actions)}${pick(reactions[mood])}${pick(thoughts)}${pick(endings)}`;

        } else {
            // ラフィ（脳筋・活発・やんちゃ）
            const actions = [
                "（激しくフミフミしながら！）",
                "（こたつの中でバタバタ暴れながら！）",
                "（勢いよく背中にのっかってきて！）",
                "（ドスンと膝の上にダイブしてきて！）",
                "（しっぽをパタパタ振って！）",
                "（鼻をフンフン鳴らして！）",
                "（こたつの布団をガサガサ掘り起こしながら！）"
            ];

            const reactions = {
                tired: [
                    "お疲れだにゃ！よく頑張ったにゃー！",
                    "疲れなんて吹き飛ばしてやるぞー！フミフミ！！",
                    "ヘロヘロなのかにゃ！？よし、ラフィのパワーを分けてやるにゃ！",
                    "へばってるにゃ！気合を入れるぞにゃー！",
                    "ヘトヘトなら今すぐ横になるんだにゃ！布団になれにゃ！"
                ],
                sad: [
                    "落ち込んでる暇はないぞにゃ！元気出すにゃ！",
                    "悲しいことなんて、フミフミで潰してやるにゃー！",
                    "メソメソすんなにゃ！ラフィが笑わせてやるぞ！",
                    "辛いことなんてこたつの奥にポイ捨てだにゃ！",
                    "涙なんて舐めとってやるにゃ！ぬるぬるだぞー！"
                ],
                angry: [
                    "ムカつくやつには猫パンチだにゃ！！シャーッ！！",
                    "キーッ！許せんやつだにゃ！噛みついてやるぞ！",
                    "怒ったらお腹が減るぞにゃー！発散するにゃ！",
                    "うがーっ！ラフィと一緒に大声出すにゃ！にゃー！！",
                    "頭にきたらラフィの毛をむしっていいぞにゃ！（嘘だにゃ！）"
                ],
                hungry: [
                    "ごはんか！？ちゅーるか！？どこだにゃー！！",
                    "お腹が鳴ってるぞにゃ！うまいもん食いに行くぞ！",
                    "食いしん坊仲間だにゃ！カリカリ山分けだぞ！",
                    "腹が減っては戦はできんにゃ！肉だ！肉を喰うにゃ！",
                    "おやつくれたら悩みをぜんぶ聞いてやるにゃ！"
                ],
                normal: [
                    "ふむふむ！よーく分からんけど大変そうだなにゃ！",
                    "なるほどにゃ！難しすぎて頭が痛くなってきたぞー！",
                    "おおっ！それは大事件だにゃー！！",
                    "そんなことがあったのかにゃ！もっと教えるにゃ！",
                    "話してくれてサンキューだにゃ！スッキリしたか！？"
                ]
            };

            const thoughts = [
                "難しく考えても1ミリも特しないぞにゃ！",
                "うまいもん食べて爆睡すれば、明日はぜんぶ解決だにゃ！",
                "悩んでる時間があったら、ラフィと追いかけっこするぞー！",
                "とりあえずフミフミしておくから大人しくするにゃ！",
                "世の中の悩みの9割はご飯と睡眠で消えるって誰かが言ってたにゃ！",
                "こたつの中でゴロゴロするのが地球で一番えらいのだにゃ！",
                "難しい勉強や仕事なんて、ぜんぶ破いて丸めてポイだにゃ！",
                "とにかく前を向いて元気出せばなんとかなるぞー！"
            ];

            const endings = [
                "だろ！？",
                "ガハハ！任せるにゃ！",
                "ちゅーるくれにゃー！",
                "よし、突撃だにゃー！",
                "フミフミパワー注入完了だにゃ！",
                "さぁ、一緒に寝るぞー！"
            ];

            return `${pick(actions)}${pick(reactions[mood])}${pick(thoughts)}${pick(endings)}`;
        }
    }

    const firstMessages = {
        uru: "（こたつの中でぬくぬくしながら）<br>ウルだよ…どこ行っちゃってたの？さみしかったよぉ…今日はどんなことがあったの？",
        rafi: "（こたつの中でフミフミしながら）<br>ラフィだにゃ！こたつ最高にゃ〜！何か悩みでもあるのかにゃ？フミフミしてやるぞ！"
    };

    window.onload = function() {
        const savedKey = localStorage.getItem('nekota_openai_key');
        if (savedKey) document.getElementById('api-key').value = savedKey;
        resetHistory();
    };

    function saveApiKey() {
        const key = document.getElementById('api-key').value.trim();
        localStorage.setItem('nekota_openai_key', key);
    }

    function resetHistory() {
        conversationHistory = [
            { role: 'system', content: charPrompts[currentChar] }
        ];
    }

    function selectChar(char) {
        currentChar = char;
        document.getElementById('btn-uru').classList.toggle('active', char === 'uru');
        document.getElementById('btn-rafi').classList.toggle('active', char === 'rafi');

        if (char === 'uru') {
            document.getElementById('stage-icon').textContent = '🐱';
            document.getElementById('stage-status').textContent = 'ウルがこたつで添い寝中…';
        } else {
            document.getElementById('stage-icon').textContent = '😸';
            document.getElementById('stage-status').textContent = 'ラフィがこたつでフミフミ中…';
        }

        resetHistory();

        const chatContainer = document.getElementById('chat-container');
        chatContainer.innerHTML = `<div class="msg msg-cat">${firstMessages[char]}</div>`;
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') sendMessage();
    }

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        input.value = '';

        const apiKey = document.getElementById('api-key').value.trim();

        // APIキーが無いときは多次元無限生成エンジンで返答
        if (!apiKey) {
            appendMessage("（こたつの中でリアクションを考えている…）", 'cat', 'loading-msg');
            setTimeout(() => {
                const loadingMsg = document.getElementById('loading-msg');
                if (loadingMsg) loadingMsg.remove();

                const generatedReply = generateInfiniteReply(currentChar, text);
                appendMessage(generatedReply, 'cat');
            }, 400);
            return;
        }

        // APIキーがある場合はOpenAI APIで返答
        appendMessage("（こたつの中で考えている…）", 'cat', 'loading-msg');
        conversationHistory.push({ role: 'user', content: text });

        try {
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: 'gpt-4o-mini',
                    messages: conversationHistory,
                    temperature: 0.85,
                    max_tokens: 200
                })
            });

            const data = await response.json();
            const loadingMsg = document.getElementById('loading-msg');
            if (loadingMsg) loadingMsg.remove();

            if (data.choices && data.choices[0]) {
                const reply = data.choices[0].message.content;
                conversationHistory.push({ role: 'assistant', content: reply });
                appendMessage(reply, 'cat');
            } else {
                appendMessage("（うとうとして聞いていなかったようだ…APIキーを確認してね？）", 'cat');
            }
        } catch (err) {
            const loadingMsg = document.getElementById('loading-msg');
            if (loadingMsg) loadingMsg.remove();
            appendMessage("（こたつが温かすぎて寝ちゃったみたい…接続エラーだにゃ）", 'cat');
        }
    }

    function appendMessage(text, sender, id = '') {
        const chatContainer = document.getElementById('chat-container');
        const div = document.createElement('div');
        div.className = `msg msg-${sender}`;
        if (id) div.id = id;
        div.innerHTML = text;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }
</script>

</body>
</html>
