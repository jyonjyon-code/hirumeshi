<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ねこたおはなし - こたつでゆるっと人生相談 | ねこたスタジオ</title>
    
    <link rel="icon" href="amatchari.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            text-align: center;
            background: #fdf6ec;
            padding: 15px;
            color: #4a3b32;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .card {
            background: #fff;
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(184, 115, 51, 0.15);
            width: 100%;
            max-width: 440px;
            border: 3px solid #e08b47;
            margin-top: 10px;
            margin-bottom: 20px;
            text-align: left;
            display: flex;
            flex-direction: column;
        }

        /* ヘッダー */
        .header-container { text-align: center; margin-bottom: 15px; }
        .sub-tagline {
            display: inline-block;
            background: #e08b47;
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 3px 12px;
            border-radius: 50px;
            margin-bottom: 4px;
        }
        h2 {
            color: #b85b14;
            margin: 0;
            font-size: 26px;
            font-weight: 900;
        }

        /* キャラクター選択 */
        .char-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .char-btn {
            flex: 1;
            padding: 12px 8px;
            border: 2px solid #f2cfad;
            background: #fff9f3;
            border-radius: 16px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        .char-btn.active {
            border-color: #e08b47;
            background: #ffe3cb;
            box-shadow: 0 4px 10px rgba(224, 139, 71, 0.2);
        }
        .char-avatar {
            font-size: 32px;
            display: block;
            margin-bottom: 4px;
        }
        .char-name {
            font-weight: bold;
            font-size: 15px;
            color: #8c430e;
        }
        .char-desc {
            font-size: 10px;
            color: #7a685a;
            margin-top: 2px;
        }

        /* こたつ添い寝ステージ */
        .kotatsu-stage {
            background: linear-gradient(to bottom, #d98880, #c0392b);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            color: white;
            position: relative;
            margin-bottom: 15px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.2);
            border: 4px solid #8b0000;
        }
        .kotatsu-futon {
            background: #f5b7b1;
            border-radius: 12px;
            padding: 15px;
            color: #4a154b;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .cat-sleeping {
            font-size: 40px;
            animation: breathe 3s infinite ease-in-out;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        /* チャットエリア */
        .chat-container {
            background: #faf5f0;
            border: 2px solid #f2cfad;
            border-radius: 16px;
            padding: 12px;
            height: 280px;
            overflow-y: auto;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .msg {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }
        .msg-cat {
            background: #ffffff;
            color: #4a3b32;
            border: 2px solid #e08b47;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .msg-user {
            background: #e08b47;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        /* 入力エリア */
        .input-wrapper {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        .chat-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #f2cfad;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            font-family: inherit;
        }
        .chat-input:focus { border-color: #e08b47; }
        .btn-send {
            background: #e08b47;
            color: white;
            border: none;
            padding: 0 18px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
        }

        /* 設定・APIキー設定 */
        .api-config {
            font-size: 11px;
            color: #8c7b70;
            background: #f8efe6;
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 12px;
        }
        .api-input {
            width: 100%;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 11px;
            margin-top: 4px;
        }

        /* スタジオナビ */
        .studio-nav {
            border-top: 1px dashed #d9c5b2;
            padding-top: 15px;
            text-align: center;
        }
        .btn-back {
            background: #8c7b70;
            color: white;
            padding: 8px 16px;
            border-radius: 50px;
            text-decoration: none;
            display: inline-block;
            font-size: 12px;
            width: 100%;
            margin-bottom: 10px;
        }
        .sns-group { display: flex; gap: 8px; }
        .btn-sns {
            color: white;
            border: none;
            padding: 8px;
            border-radius: 50px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-size: 12px;
            flex: 1;
        }
        .btn-x { background: #000; }
        .btn-insta { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
    </style>
</head>
<body>

<div class="card">
    <div class="header-container">
        <span class="sub-tagline">こたつでごろごろ人生相談</span>
        <h2>🍊 ねこたおはなし</h2>
    </div>

    <!-- キャラクター選択 -->
    <div class="char-selector">
        <div class="char-btn active" id="btn-uru" onclick="selectChar('uru')">

            <div>

                <div style="font-size: 11px; opacity: 0.8;">「無理しないで、なんでも話してね…」</div>
            </div>
        </div>
    </div>

    <!-- チャットログ -->
    <div class="chat-container" id="chat-container">

            ウルだよ。今日もお疲れさま。何か不安なことや話したいことがあったら、ゆっくり聞かせてね。
        </div>
    </div>

    <!-- 入力フォーム -->
    <div class="input-wrapper">

    </div>

    <div class="api-config">

    </div>

    <!-- ナビゲーション -->
    <div class="studio-nav">
        <a href="index.html" class="btn-back">ねこたスタジオへ戻る</a>
        <div class="sns-group">
            <a href="https://x.com/necotatu2" target="_blank" class="btn-sns btn-x"><i class="fab fa-x-twitter"></i> 公式X</a>
            <a href="https://www.instagram.com/necotastudio" target="_blank" class="btn-sns btn-insta"><i class="fab fa-instagram"></i> 公式Insta</a>
        </div>
    </div>
</div>

<script>
    let currentChar = 'uru';
    let conversationHistory = [];

    const charPrompts = {

【役割】こたつで添い寝しながら、ユーザーの悩みや話をやさしく包み込むように聴く。
【話し方ルール】
・語尾は「〜だよ」「〜なの…」「〜かな」。キャラの主張は控えめにして、相手の気持ちに深く共感します。
・悩みを否定せず「大変だったね」「いつでも味方だよ」と温かく寄り添ってください。
・2〜3文で柔らかく答えてください。`,

        rafi: `あなたは「ラフィ」という名前の猫です。
【役割】こたつで一緒に過ごしながら、ユーザーの悩みをポジティブに明るく励ます。
【話し方ルール】
・語尾は「〜にゃ！」「〜だぞ！」。過剰に暴れず、相手の悩みに真面目に向き合った上で元気を与えます。
・「大丈夫だにゃ！」「無理しなくていいぞ！」と背中をやさしく押すメッセージを伝えてください。
・2〜3文で元気かつ温かく答えてください。`
    };

    // -------------------------------------------------------------
    // 超多変量（数億通り以上）の無限応答生成エンジン
    // -------------------------------------------------------------
    function generateInfiniteReply(char, userText) {
        const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];

        // 詳細な状態・キーワード分類
        let mood = 'normal';
        if (/疲|しんど|限界|眠|だる|休みたい/.test(userText)) mood = 'tired';
        if (/悲|泣|つらい|辛|落ち込|寂|さび|孤独/.test(userText)) mood = 'sad';
        if (/怒|むかつく|嫌|ムカ|腹立つ|イライラ/.test(userText)) mood = 'angry';
        if (/仕事|職|会社|上司|残業|バイト/.test(userText)) mood = 'work';
        if (/人間関係|友達|人付き合い|嫌われ|相手/.test(userText)) mood = 'relation';
        if (/将来|不安|心配|どうしよう|進路/.test(userText)) mood = 'anxious';

        if (char === 'uru') {
            const actions = [
                "（そっと隣に寄り添って）",
                "（静かに話を聞きながら）",
                "（やさしく寄り添いながら）",
                "（温かいまなざしで見つめて）",
                "（隣で丸くなりながら）",
                "（こたつの端から優しく見守って）",
                "（うなずくように小さな声で）",
                "（静かに手を重ねるように）"
            ];

            const reactions = {
                tired: [
                    "毎日本当によく頑張っているね…。",
                    "心も体も、すごく重たくなっちゃっていたんだね。",
                    "そこまで頑張れるのはすごいことだけど、心配だよ…。",
                    "限界まで耐えていたんだね。よく話してくれたね。",
                    "ずっと気を張っていたのかな…本当にお疲れさま。"

                sad: [
                    "そんなことがあったんだね…すごく切ないね…。",
                    "ひとりで悩んで、悲しかったよね…。",
                    "話してくれてありがとう。自分の気持ちを隠さなくていいんだよ。",
                    "辛かったね…ウルも一緒に悲しみを分け合いたいな。",
                    "涙が出そうになるくらい、苦しかったんだね…。"
                ],
                angry: [
                    "それは嫌な思いをしたね…怒って当然だよ。",
                    "そんな不条理なことがあったら、誰だって傷つくよ…。",
                    "嫌なことは嫌って思っていいんだよ。我慢しなくていいからね。",
                    "ウルの前では、素直な気持ちを出していいんだよ…。",
                    "一人で理不尽に耐える必要なんてないからね…。"
                ],
                work: [
                    "お仕事のこと、すごく悩んでいたんだね…。",
                    "毎日一生懸命向き合っているからこそ、辛くなるんだよね。",
                    "責任感が強いからこそ、一人で抱え込んじゃうのかな…。",
                    "大変な環境で、本当によく頑張っているよ…。"
                ],
                relation: [
                    "人との関係って、どうしても傷つくことが多いよね…。",
                    "相手の気持ちを考えすぎて、疲れちゃったのかな…。",
                    "あなたが悪くなくても、噛み合わないことってあるよね。",
                    "自分の心を一番大切にしていいんだよ…。"
                ],
                anxious: [
                    "先のことを考えると、心がざわついちゃうよね…。",
                    "不安な気持ちがあるのは、真剣に生きている証拠だよ。",
                    "今は答えが見えなくても、焦らなくて大丈夫だからね。",
                    "心が重い時は、立ち止まってみてもいいんだよ…。"

                    "なるほど…そう思っていたんだね。",

            const advices = {
                tired: [

                angry: [

                ],
                anxious: [
                    "明日や未来のことは、明日考えることにして今夜は休もうね。",

                    "どんな選択をしても、ウルはあなたを応援しているよ。"

            const comforts = [
                "どんなあなたであっても、ウルはいつでも味方だからね。",

            const endings = [
                "ゆっくり休んでね…。",
                "いつでもここで待ってるからね。",
                "大丈夫、ちゃんと見守っているよ…。",
                "温かくして寝ようね。"
            ];

            return `${pick(actions)}${pick(reactions[mood])}${pick(advices[mood])}${pick(comforts)}${pick(endings)}`;

        } else {
            // ラフィ（明るくポジティブに背中を押す）
            const actions = [
                "（しっかりうなずきながら！）",
                "（トントンと肩を叩くように）",
                "（横でしっかり話を聞いて）",
                "（隣でどっしり構えて）",
                "（あたたかい笑顔で）",
                "（腕を組んでう〜んと真剣に考えて）",

            const reactions = {

                angry: [

                    "嫌な奴のことで悩むのは時間がもったいないにゃ！",
                    "気持ちを吐き出して、すっきり切り替えていこうにゃ！"
                ],
                work: [
                    "仕事の悩みか…毎日社会と戦っていて本当に偉いぞにゃ！",
                    "真面目に取り組んでいるからこそ壁にぶつかるんだぞ！",
                    "会社が全てじゃないぞ！自分の人生を一番優先するんだにゃ！"
                ],
                relation: [
                    "人間関係は難しいにゃ…でも合わない人とは無理しなくていいぞ！",
                    "自分らしくいられる相手を大切にすれば十分だにゃ！",
                    "相手を変えるのは無理だから、気にしないのが一番だぞ！"
                ],
                anxious: [
                    "先のことを心配しても、案外なんとかなるものだぞにゃ！",
                    "まだ起きていないことに怯えるのは勿体ないぞ！",
                    "不安になったら、今できる小さなことから手をつけるんだにゃ！"

                normal: [
                    "ふむふむ、ちゃんと考えを話してくれて頼もしいぞにゃ！",

                ]
            };

            const advices = {
                tired: [
                    "今日はもう美味しいものを食べて爆睡するに限るぞにゃ！",
                    "スマホも閉じて、布団に飛び込むんだぞ！"
                ],
                sad: [
                    "温かい飲み物でも飲んで、心をほぐそうにゃ。",
                    "時間はかかるかもしれないけど、必ず心が晴れる日が来るぞ！"
                ],
                angry: [
                    "美味しいものでも食べて、嫌なことは忘れてしまうんだにゃ！",
                    "自分にご褒美をあげて、機嫌を取り戻そうぞ！"
                ],

                ],

                ],
                anxious: [

            const endings = [

            ];

            return `${pick(actions)}${pick(reactions[mood])}${pick(advices[mood])}${pick(comforts)}${pick(endings)}`;
        }
    }

    const firstMessages = {
        uru: "（こたつの中でぬくぬくしながら）<br>ウルだよ。今日もお疲れさま。何か不安なことや話したいことがあったら、ゆっくり聞かせてね。",
        rafi: "（こたつの中で一緒に温まりながら）<br>ラフィだにゃ！何か悩みや話したいことはあるか？話を聞くから、気軽に言ってみるんだぞ！"
    };

    window.onload = function() {
        const savedKey = localStorage.getItem('nekota_openai_key');
        if (savedKey) document.getElementById('api-key').value = savedKey;
        resetHistory();
    };

    function saveApiKey() {
        const key = document.getElementById('api-key').value.trim();
        localStorage.setItem('nekota_openai_key', key);
    }

    function resetHistory() {
        conversationHistory = [
            { role: 'system', content: charPrompts[currentChar] }
        ];
    }

    function selectChar(char) {
        currentChar = char;
        document.getElementById('btn-uru').classList.toggle('active', char === 'uru');
        document.getElementById('btn-rafi').classList.toggle('active', char === 'rafi');

        if (char === 'uru') {
            document.getElementById('stage-icon').textContent = '🐱';
            document.getElementById('stage-status').textContent = 'ウルが話を聞いてくれるよ…';
        } else {
            document.getElementById('stage-icon').textContent = '😸';
            document.getElementById('stage-status').textContent = 'ラフィが元気づけてくれるよ！';
        }

        resetHistory();

        const chatContainer = document.getElementById('chat-container');
        chatContainer.innerHTML = `<div class="msg msg-cat">${firstMessages[char]}</div>`;
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') sendMessage();
    }

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        input.value = '';

        const apiKey = document.getElementById('api-key').value.trim();

        if (!apiKey) {
            appendMessage("（話を聞いて深いうなずきをしている…）", 'cat', 'loading-msg');
            setTimeout(() => {
                const loadingMsg = document.getElementById('loading-msg');
                if (loadingMsg) loadingMsg.remove();

                const generatedReply = generateInfiniteReply(currentChar, text);
                appendMessage(generatedReply, 'cat');
            }, 400);
            return;
        }

        appendMessage("（言葉を受け止めている…）", 'cat', 'loading-msg');
        conversationHistory.push({ role: 'user', content: text });

        try {
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: 'gpt-4o-mini',
                    messages: conversationHistory,
                    temperature: 0.7,
                    max_tokens: 200
                })
            });

            const data = await response.json();
            const loadingMsg = document.getElementById('loading-msg');
            if (loadingMsg) loadingMsg.remove();

            if (data.choices && data.choices[0]) {
                const reply = data.choices[0].message.content;
                conversationHistory.push({ role: 'assistant', content: reply });
                appendMessage(reply, 'cat');
            } else {
                appendMessage("（APIキーを確認してみてくださいね）", 'cat');
            }
        } catch (err) {
            const loadingMsg = document.getElementById('loading-msg');
            if (loadingMsg) loadingMsg.remove();
            appendMessage("（うまく通信できなかったみたい…時間を置いてみてね）", 'cat');
        }
    }

    function appendMessage(text, sender, id = '') {
        const chatContainer = document.getElementById('chat-container');
        const div = document.createElement('div');
        div.className = `msg msg-${sender}`;
        if (id) div.id = id;
        div.innerHTML = text;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }
</script>

</body>
</html>
